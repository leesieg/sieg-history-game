    function advanceAvailable(world, country, key) {
      const advance = ADVANCES[key];
      if (!advance || !advance.can(world, country)) return false;
      return advance.aware(world, country);
    }

    function adoptAdvance(world, polity, key, viaPlayer = false) {
      const country = world.countries[polity];
      const advance = ADVANCES[key];
      if (!advance || !advanceAvailable(world, country, key)) return false;
      const cost = advance.cost || {};
      if ((cost.money || 0) > country.money || (cost.military || 0) > country.military || (cost.capital || 0) > (country.capital || 0)) return false;
      country.money -= cost.money || 0;
      country.military -= cost.military || 0;
      country.capital = (country.capital || 0) - (cost.capital || 0);
      advance.apply(world, country);
      registerDecision(country, `采纳「${advance.label}」`, advance.desc);
      pushChronicle(country, "advance", `${calendarLabel(world.turn)}：采纳${advance.label}`);
      pushWorldEvent(world, `${polity}采纳了${advance.label}`, "advance");
      addCountryLog(polity, `采纳「${advance.label}」。`, world);
      return true;
    }

    /* ===== 历史因果引擎 · 流层：大西洋探索 ===== */

    const EXPLORATION_MILESTONES = [
      { key: "madeira", label: "马德拉群岛", pts: 10, desc: "大西洋上的第一站：木材与糖。",
        reward(world, country) { country.money += 20; } },
      { key: "guinea", label: "几内亚海岸", pts: 25, desc: "沿非洲海岸南下，胡椒与象牙开始回流。",
        reward(world, country) { country.modifiers.push({ key: "guinea_trade", label: "几内亚贸易", quarters: 24, money: 6 }); } },
      { key: "gold_coast", label: "黄金海岸商站", pts: 40, desc: "埃尔米纳的黄金直入王室金库。",
        reward(world, country) { country.money += 40; country.modifiers.push({ key: "gold_coast", label: "黄金海岸", quarters: 24, money: 8 }); } },
      { key: "cape", label: "好望角", pts: 60, desc: "风暴角更名好望角——绕过旧世界的航路就在眼前。",

        reward(world, country) { unlockTradeRoute(world, "newworld", country.name); } }
    ];

    function bestAtlanticPort(world, polity) {
      const tiles = controlledTiles(polity, world);
      return tiles.filter(t => t.city && t.hydro === "coast" && t.lon < -5).sort((a, b) => sumPop(b) - sumPop(a))[0]
        || tiles.filter(t => t.city && t.lon < -5).sort((a, b) => sumPop(b) - sumPop(a))[0]
        || tiles.filter(t => t.city && t.hydro === "coast")[0]
        || tiles.find(t => t.city)
        || null;
    }

    function unlockTradeRoute(world, key, patron) {
      const route = TRADE_ROUTES.find(r => r.key === key);
      if (!route || !route.locked) return;
      const port = bestAtlanticPort(world, patron);
      route.locked = false;
      route.patron = patron;
      route.weight = key === "cape" ? 160 : 120;
      route.nodes = port ? [{ city: port.city, share: key === "newworld" ? .35 : .3, tileId: port.id }] : [];
      if (key === "newworld") TRADE_POOLS.silver = 120;
      const chain = key === "cape"
        ? ["东方商路的旧成本养肥了所有中间人", `${patron}的船队绕过了他们全部`, "黎凡特与黑海的流量将持续流失", "地中海的黄金时代开始谢幕"]
        : [`${patron}的船队抵达了未知大陆`, "白银将源源流入，但物价也将随之而起", "拥金而衰的悖论从此埋下"];
      pushWorldEvent(world, `${patron}开辟了${route.label}！`, "discovery", chain);
      const country = world.countries[patron];
      if (country) pushChronicle(country, "discovery", `${calendarLabel(world.turn)}：开辟${route.label}`);
    }

    function processExploration(world) {
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || country.eliminated || !country.technology.oceanGoingShips) continue;
        const atlantic = controlledTiles(polity, world).some(t => t.hydro === "coast" && t.lon < -5);
        if (!atlantic) continue;
        if ((country.pressures?.exploration || 0) >= 35) country.exploration.points += 1;
        for (const milestone of EXPLORATION_MILESTONES) {
          if (country.exploration.done.includes(milestone.key)) continue;
          if (country.exploration.points < milestone.pts) break;
          if (world.turn - (country.exploration.lastMilestoneTurn || -99) < 6) break;
          if ((milestone.key === "cape" || milestone.key === "newworld") && TRADE_ROUTES.find(r => r.key === milestone.key && !r.locked)) {
            country.exploration.done.push(milestone.key);
            continue;
          }
          country.exploration.done.push(milestone.key);
          country.exploration.lastMilestoneTurn = world.turn;
          milestone.reward(world, country);
          pushWorldEvent(world, `${polity}的航海家抵达${milestone.label}`, "discovery");
          pushChronicle(country, "discovery", `${calendarLabel(world.turn)}：抵达${milestone.label}`);
          if (polity === world.playerPolity) {
            addCountryLog(polity, `探索里程碑：${milestone.label}——${milestone.desc}`, world);

      }
    }

    function processEnlightenment(world) {
      if (!eraAtLeast("absolutism", world)) return;
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        if (world.turn % 2 === 0) {
          const burgherKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "merchants");
          const burgherPower = burgherKey ? country.estates[burgherKey].power : 25;
          const base = (country.technology.printing ? 1 : .3) * (1 + burgherPower / 80);
          country.ideas = clamp((country.ideas || 0) + base, 0, 100);
        }
        if (!country.revolt && (country.ideas || 0) >= 60 && (country.pressures?.fiscal || 0) >= 75) {
          const commonsKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "peasants") || "peasants";
          country.estates[commonsKey].satisfaction = Math.min(country.estates[commonsKey].satisfaction, -76);
          country.estates[commonsKey].defianceQuarters = 3;
          triggerRevolt(world, polity, commonsKey);
          if (country.revolt) {
            country.revolt.revolutionary = true;
            world.flags.firstRevolution = true;
            const chain = [
              `${polity}的国库早已被战争与宫廷掏空`,

            ];
            pushWorldEvent(world, `革命在${polity}爆发！`, "era", chain);
            for (const other of playableCountries(world)) {
              if (other === polity) continue;
              const neighbor = world.countries[other];
              if (neighbor && countriesShareBorder(polity, other, world)) {
                neighbor.ideas = clamp((neighbor.ideas || 0) + 15, 0, 100);
              }
            }
            if (polity === world.playerPolity) {
              world.pendingTransition = { title: "革命！", sub: calendarLabel(world.turn), chain };
            }
          }
        }
      }

    function processAdvancesAi(world) {
      for (const polity of playableCountries(world)) {
        if (polity === world.playerPolity) continue;
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        const militaryKeys = ["gunpowder", "standingArmy", "bastions"];
        const pressured = (country.pressures?.military || 0) >= 55;
        const adoptionOrder = pressured
          ? [...militaryKeys, ...Object.keys(ADVANCES).filter(k => !militaryKeys.includes(k))]
          : Object.keys(ADVANCES);
        for (const key of adoptionOrder) {
          const reserve = pressured && militaryKeys.includes(key) ? 40 : 120;
          if (advanceAvailable(world, country, key) && country.money >= (ADVANCES[key].cost.money || 0) + reserve) {
            adoptAdvance(world, polity, key);
            break;
          }
        }
        if (country.technology.oceanGoingShips && country.money >= 80 && (country.pressures?.exploration || 0) >= 35
          && (polityHash(polity) + world.turn) % 3 === 0) {
          const atlantic = controlledTiles(polity, world).some(t => t.hydro === "coast" && t.lon < -5);
          if (atlantic) {
            country.money -= 30;
            country.exploration.points += 4;
          }
        }
      }
    }

    /* ===== 决策回响 ===== */

    function decisionEchoes(country) {
      const echoes = [];
      const report = country.report;
      for (const entry of (country.ledger || []).slice(0, 5)) {
        const age = state.turn - entry.turn;
        const bits = [];
        const bare = entry.label.replace(/[《》]/g, "").replace(/^(议程|决议)/, "");
        for (const echo of (country.echoLog || [])) {
          if (echo.turn < entry.turn || state.turn - echo.turn > 4) continue;
          if (echo.reason.includes(bare) || bare.includes(echo.reason)) {
            bits.push(echo.kind === "estate" ? `${echo.label}满意 ${formatSigned(echo.amount)}` : `合法性 ${formatSigned(echo.amount)}`);
          }
        }
        if (report) {
          for (const part of [...report.moneyParts, ...report.foodParts, ...report.militaryParts]) {
            if (part.label !== "地块产出" && (part.label.includes(bare) || bare.includes(part.label))) {
              bits.push(`${part.label} ${formatSigned(part.amount)}`);
            }
          }
        }
        const mod = country.modifiers.find(m => m.label.includes(bare) || bare.includes(m.label));
        if (mod) bits.push(`持续效果余 ${mod.quarters} 季`);
        const status = bits.length ? bits.join("、") : age <= 1 ? "效果将在下季显现" : "已融入国策";
        echoes.push(`${age <= 0 ? "本季" : age === 1 ? "上季" : age + " 季前"}你定下「${entry.label}」→ ${status}`);
      }
      return echoes;
    }

    /* ===== 垂帘听政（速演） ===== */

    function regencyShouldInterrupt(world, snapshot) {
      if (world.gameOver) return "国家命运已定";
      if (world.playerEvents.length) return "紧急事件待裁断";
      if (world.pendingElection) return "需要选立新领导人";
      const sitNow = world.situations.map(sit => `${sit.key}:${sit.phase}`).join("|");
      if (sitNow !== snapshot.situations) return "情势有变";
      const warsNow = militaryWarsFor(world.playerPolity, world).length;
      if (warsNow !== snapshot.wars) return warsNow > snapshot.wars ? "我国卷入战争" : "战争落幕";
      const capitalTile = capital(world.playerPolity, world);
      if (capitalTile && capitalTile.occupier && capitalTile.occupier !== world.playerPolity) return "都城告急";
      return null;
    }

    function regencySnapshot(world) {
      return {
        situations: world.situations.map(sit => `${sit.key}:${sit.phase}`).join("|"),
        wars: militaryWarsFor(world.playerPolity, world).length
      };
    }

    function runGovernor(world) {
      const country = world.countries[world.playerPolity];
      if (!country || !country.governorAuto || !eraAtLeast("absolutism", world)) return;
      let acted = 0;
      while (country.actionPoints.administrative > 0 && acted < 3) {
        const territory = controlledTiles(world.playerPolity, world);
        const low = territory.filter(t => t.control < 55).sort((a, b) => a.control - b.control)[0];
        if (low) {
          country.actionPoints.administrative -= 1;
          low.control = clamp(low.control + 15);
          low.unrest = Math.max(0, low.unrest - 1);
          country.report?.events.push(`总督代理：整合${low.city || low.name}`);
          acted += 1;
          continue;
        }
        if (country.money >= 60) {
          const tile = territory.slice().sort((a, b) => sumPop(b) - sumPop(a)).find(t => aiPickBuilding(t));
          if (tile) {
            country.actionPoints.administrative -= 1;
            country.money -= 20;
            tile.buildings.push(aiPickBuilding(tile));
            country.report?.events.push(`总督代理：建设${tile.city || tile.name}`);
            acted += 1;
            continue;
          }
        }
        break;
      }
    }

    function runRegency(world, maxQuarters = 40) {
      const startTurn = world.turn;
      const country = world.countries[world.playerPolity];
      const before = { food: country.food, money: country.money, military: country.military, legitimacy: country.legitimacy };
      const eventsBefore = world.worldEvents.length ? world.worldEvents[0] : null;
      world.regency = true;
      let interrupt = null;
      let quarters = 0;
      while (quarters < maxQuarters) {
        const snapshot = regencySnapshot(world);
        endTurn();
        quarters += 1;
        interrupt = regencyShouldInterrupt(world, snapshot);
        if (interrupt) break;
      }
      world.regency = false;
      const startIndex = world.worldEvents.findIndex(e => e === eventsBefore);
      const newEvents = startIndex === -1 ? world.worldEvents.slice(0, 12) : world.worldEvents.slice(0, startIndex);
      return {
        quarters,
        fromTurn: startTurn,
        toTurn: world.turn,
        interrupt: interrupt || `垂帘期满（${maxQuarters} 季）`,
        events: newEvents.slice(0, 12),
        delta: {
          food: Math.round(country.food - before.food),
          money: Math.round(country.money - before.money),
          military: Math.round(country.military - before.military),
          legitimacy: Math.round(country.legitimacy - before.legitimacy)
        }
      };
    }

    function startRegencyUI() {
      if (state.gameOver) return toast("国家命运已定，无可垂帘。");
      if (state.playerEvents.length) return toast("先裁断紧急事件。");
      if (state.pendingElection) return toast("先选立领导人。");
      toast("垂帘听政开始：朝政交由常例运转，大事自会唤醒你。");
      setTimeout(() => {
        const report = runRegency(state, 40);
        render();
        openRegentReport(report);
        if (state.playerEvents.length) renderPlayerEvents();
      }, 30);
    }

    function showTransition(title, sub, chain) {
      document.getElementById("transitionTitle").textContent = title;
      document.getElementById("transitionSub").textContent = sub;
      document.getElementById("transitionBody").innerHTML = `
        <div class="gl-section"><h3>因果之链</h3>${chain.map(step => `<div class="gl-epic-line">${step}</div>`).join("")}</div>
        <div class="gl-section"><div style="font-size:13px;opacity:.85">这一变局已写入「商路」面板与列国纪闻——压力将在未来数季逐步显形。</div></div>
      `;
      document.getElementById("transitionWrap").classList.add("show");
    }

    function openRegentReport(report) {
      const calFrom = calendarForTurn(report.fromTurn);
      const calTo = calendarForTurn(report.toTurn);

        `${calFrom.year} 年${seasonName(calFrom.quarter)} — ${calTo.year} 年${seasonName(calTo.quarter)} · 共 ${report.quarters} 季`;
      const deltaRow = Object.entries({ 粮食: report.delta.food, 金钱: report.delta.money, 军需: report.delta.military, 合法性: report.delta.legitimacy })
        .map(([k, v]) => `<span class="gl-chip">${k} ${formatSigned(v)}</span>`).join("");
      document.getElementById("regentBody").innerHTML = `
        <div class="gl-section"><h3>唤醒缘由</h3><div class="gl-row gl-warn-red"><span>${report.interrupt}</span></div></div>
        <div class="gl-section"><h3>垂帘期间收支</h3><div>${deltaRow}</div></div>
        <div class="gl-section"><h3>期间大事</h3>${report.events.length ? report.events.map(e => `<div class="gl-row"><span>${e.text}</span><span>${calendarLabel(e.turn)}</span></div>`).join("") : '<div class="gl-row">列国无事。</div>'}</div>
      `;
      document.getElementById("regentWrap").classList.add("show");
    }

    /* ===== 历史因果引擎 · 流层：贸易路线 ===== */

    const TRADE_ROUTES = [
      { key: "levant", label: "黎凡特线", pool: "orient", weight: 120, from: "东方（香料与丝绸）",
        nodes: [{ city: "君士坦丁堡", share: .18 }, { city: "威尼斯", share: .22 }] },
      { key: "blacksea", label: "黑海线", pool: "orient", weight: 70, from: "东方·经卡法（图外）",
        nodes: [{ city: "君士坦丁堡", share: .12 }, { city: "热那亚", share: .20 }] },
      { key: "redsea", label: "红海-亚历山大线", pool: "orient", weight: 80, from: "东方·经红海",
        nodes: [{ city: "开罗", share: .10 }, { city: "亚历山大", share: .18 }, { city: "威尼斯", share: .10 }] },
      { key: "cape", label: "好望角线", pool: "orient", weight: 0, locked: true, from: "东方·绕过旧世界",
        nodes: [] },
      { key: "hansa", label: "汉萨线", pool: "north", weight: 90, from: "波罗的海毛皮与蜡",
        nodes: [{ city: "诺夫哥罗德", share: .12 }, { city: "马林堡", share: .10 }, { city: "罗斯基勒", share: .10 }, { city: "布鲁日", share: .14 }, { city: "伦敦", share: .14 }] },
      { key: "rhine", label: "香槟-莱茵线", pool: "west", weight: 70, from: "南北欧陆桥",
        nodes: [{ city: "威尼斯", share: .08 }, { city: "米兰", share: .10 }, { city: "特鲁瓦", share: .08 }, { city: "科隆", share: .10 }, { city: "布鲁日", share: .12 }] },
      { key: "atlantic", label: "大西洋沿岸线", pool: "west", weight: 50, from: "葡萄酒、盐与渔获",
        nodes: [{ city: "里斯本", share: .12 }, { city: "南特", share: .10 }, { city: "布鲁日", share: .12 }, { city: "伦敦", share: .08 }] },
      { key: "maghreb", label: "马格里布金路", pool: "south", weight: 50, from: "撒哈拉（图外）黄金",
        nodes: [{ city: "锡吉勒马萨", share: .15 }, { city: "非斯", share: .12 }, { city: "突尼斯", share: .12 }] },
      { key: "newworld", label: "新大陆线", pool: "silver", weight: 0, locked: true, silver: true, from: "美洲（图外）白银",
        nodes: [] },
      { key: "baltic_grain", label: "波罗的海粮道", pool: "north", weight: 0, locked: true, unlockEra: "faith", from: "东欧庄园的谷物",
        nodes: [{ city: "马林堡", share: .12 }, { city: "罗斯基勒", share: .10 }, { city: "布鲁日", share: .12 }] }
    ];

    const TRADE_POOLS = { orient: 260, north: 120, west: 110, south: 70, silver: 0 };

    const TRADE_ROUTE_COLORS = {
      levant: "#b0532f", blacksea: "#7d5b94", redsea: "#c2923b",
      cape: "#2f7d72", hansa: "#3a6ea5", rhine: "#6f8a3f",
      atlantic: "#4f7588", maghreb: "#a8783f", newworld: "#8e3f5f",
      baltic_grain: "#8a8a3f"
    };

    const TRADE_MAP_ENTRY = {
      levant: { side: "east", label: "东方" },
      blacksea: { side: "east", label: "东方" },
      redsea: { side: "southeast", label: "东方·红海" },
      maghreb: { side: "south", label: "撒哈拉" },
      cape: { side: "southwest", label: "好望角航路" },
      newworld: { side: "west", label: "美洲" }
    };

    function tradeEntryPoint(side, firstNode) {
      if (side === "east") return { x: VIEW.w - 8, y: firstNode.y };
      if (side === "southeast") return { x: VIEW.w - 60, y: VIEW.h - 8 };
      if (side === "south") return { x: firstNode.x, y: VIEW.h - 8 };
      if (side === "southwest") return { x: 8, y: VIEW.h - 40 };
      return { x: 8, y: firstNode.y };
    }

    function resolveTradeNodes(world) {
      for (const route of TRADE_ROUTES) {
        for (const node of route.nodes) {
          if (node.tileId !== undefined) continue;
          const tile = world.tiles.find(t => t.city === node.city);
          node.tileId = tile ? tile.id : null;
        }
      }
    }

    function hasOrientNode(polity, world = state) {
      return TRADE_ROUTES.some(route => route.pool === "orient" && !route.locked
        && route.nodes.some(node => node.tileId !== null && node.tileId !== undefined && world.tiles[node.tileId].controller === polity));
    }

    function tradePolicyOf(polity, world = state) {
      return world.countries[polity]?.tradePolicy || "normal";
    }

    function routeCostFactors(world, route) {
      const factors = [];
      let cost = 1;
      for (const node of route.nodes) {
        if (node.tileId === null) continue;
        const tile = world.tiles[node.tileId];
        const controller = tile.controller;
        const policy = tradePolicyOf(controller, world);
        if (policy === "high") { cost += .35; factors.push(`${tile.city}高关税 +35%`); }
        if (policy === "low") { cost -= .08; factors.push(`${tile.city}低关税 -8%`); }
        if (tile.occupier && tile.occupation >= 100) { cost += .4; factors.push(`${tile.city}被占领 +40%`); }
        else if (militaryWarsFor(controller, world).length) { cost += .15; factors.push(`${tile.city}卷入战争 +15%`); }
        if (tile.plagueHitTurn && world.turn - tile.plagueHitTurn < 8) { cost += .2; factors.push(`${tile.city}疫病 +20%`); }
        else if ((tile.devastation || 0) > 30) { cost += .15; factors.push(`${tile.city}残破 +15%`); }
      }
      const shock = world.trade?.shock;
      if (shock && shock.routes.includes(route.key) && world.turn < shock.until) {
        cost += shock.add;
        factors.push(`${shock.label} +${Math.round(shock.add * 100)}%`);
      }
      return { cost: Math.max(.6, cost), factors };
    }

    function processTrade(world) {
      resolveTradeNodes(world);
      const routes = {};
      const income = {};
      const detail = {};
      const poolCosts = {};
      for (const route of TRADE_ROUTES) {
        if (route.locked) { routes[route.key] = { flow: 0, cost: 1, factors: ["尚未开辟"] }; continue; }
        const { cost, factors } = routeCostFactors(world, route);
        routes[route.key] = { cost, factors };
        (poolCosts[route.pool] = poolCosts[route.pool] || []).push(cost);
      }
      for (const [pool, base] of Object.entries(TRADE_POOLS)) {
        const open = TRADE_ROUTES.filter(r => r.pool === pool && !r.locked);
        if (!open.length) continue;
        const avgCost = poolCosts[pool].reduce((a, b) => a + b, 0) / poolCosts[pool].length;
        const poolEff = (base + (world.trade?.poolBonus?.[pool] || 0)) * clamp(1 - (avgCost - 1) * .35, .55, 1.1);
        const weightSum = open.reduce((sum, r) => sum + r.weight / routes[r.key].cost, 0) || 1;
        for (const route of open) {
          routes[route.key].flow = Math.round(poolEff * (route.weight / routes[route.key].cost) / weightSum);
        }
      }
      for (const route of TRADE_ROUTES) {
        if (route.locked) continue;
        const flow = routes[route.key].flow;
        for (const node of route.nodes) {
          if (node.tileId === null) continue;
          const tile = world.tiles[node.tileId];
          const controller = tile.controller;
          const country = world.countries[controller];
          if (!country || country.eliminated) continue;
          const policy = tradePolicyOf(controller, world);
          const mult = policy === "high" ? 1.5 : policy === "low" ? .7 : 1;
          const gain = Math.round(flow * node.share * mult);
          if (!gain) continue;
          income[controller] = (income[controller] || 0) + gain;
          (detail[controller] = detail[controller] || []).push({ route: route.label, city: tile.city, amount: gain, silver: !!route.silver });
        }
      }
      const orientOpen = TRADE_ROUTES.filter(r => r.pool === "orient" && !r.locked);
      const orientCostIndex = orientOpen.length
        ? orientOpen.reduce((sum, r) => sum + routes[r.key].cost, 0) / orientOpen.length
        : 1;
      const prevIncome = world.trade?.income || {};
      world.trade = {
        routes, income, detail, orientCostIndex,
        shock: world.trade?.shock || null,
        poolBonus: world.trade?.poolBonus || {},
        prevIncome
      };
      for (const [polity, value] of Object.entries(income)) {
        const before = prevIncome[polity] || value;
        if (before >= 20 && value <= before * .65) {
          adjustEstateForCountry(world.countries[polity], "merchants", { satisfaction: -5 }, "商路收入骤减");
          if (polity === world.playerPolity) addCountryLog(polity, `商路收入骤减：${before} → ${value}。`, world);
        }
      }
    }

    function setTradePolicy(policy) {
      const country = activeCountry();
      if (country.tradePolicy === policy) return toast("已是当前关税档位。");
      if ((country.tradePolicyCooldown || 0) > state.turn) return toast(`关税刚调整过（余 ${country.tradePolicyCooldown - state.turn} 季）。`);
      if (!spend("administrative")) return;
      country.tradePolicy = policy;
      country.tradePolicyCooldown = state.turn + 4;
      const label = policy === "high" ? "高关税" : policy === "low" ? "低关税" : "常规关税";
      setLaw(country, "trade", label);
      registerDecision(country, `关税·${label}`, policy === "high" ? "竭泽而渔：单位抽成更高，但商路会绕开你" : policy === "low" ? "放水养鱼：抽成更低，但流量与商人都会感谢你" : "恢复常规抽成");
      adjustEstateForCountry(country, "merchants", { satisfaction: policy === "low" ? 6 : policy === "high" ? -6 : 0 }, `关税改为${label}`);
      addCountryLog(country.name, `本国商路节点改行${label}。`, state);
      render();
    }

    /* ===== 历史因果引擎 · 压力层 ===== */

    function computePressures(world, polity) {
      const country = world.countries[polity];
      if (!country) return { trade: 0, military: 0, fiscal: 0, exploration: 0 };
      const tradeIncome = world.trade?.income?.[polity] || 0;
      const productionMoney = Math.max(1, country.report ? Math.max(1, country.report.money - tradeIncome) : 30);
      const trade = clamp(Math.round(tradeIncome / (tradeIncome + Math.max(10, productionMoney)) * 100), 0, 100);
      let maxRatio = 0;
      const myStrength = Math.max(1, countryStrength(polity, world));
      for (const other of playableCountries(world)) {
        if (other === polity || !countriesShareBorder(polity, other, world)) continue;
        maxRatio = Math.max(maxRatio, countryStrength(other, world) / myStrength);
      }
      let military = clamp(Math.round((maxRatio - 1) * 70), 0, 100);
      const wars = militaryWarsFor(polity, world);
      if (wars.length) military = clamp(military + 15);
      let outgo = 0;
      for (const army of Object.values(world.warfare.armies)) {
        if (army.owner === polity && army.mercenaryWage) outgo += army.mercenaryWage;
      }
      for (const subject of subjectsFor(polity, world)) {
        if (subject.subject === polity) outgo += subject.tribute;
      }
      for (const mod of country.modifiers) {
        if ((mod.money || 0) < 0) outgo += -mod.money;
      }
      const moneyIn = Math.max(1, (country.report?.money || 30) + 1);
      let fiscal = clamp(Math.round(outgo / moneyIn * 100) + (country.money < 40 ? 25 : 0) + (wars.length ? 15 : 0), 0, 100);
      const atlantic = controlledTiles(polity, world).some(t => t.hydro === "coast" && t.lon < -5);
      const coastal = atlantic || controlledTiles(polity, world).some(t => t.hydro === "coast");
      const orientCost = world.trade?.orientCostIndex || 1;
      const exploration = clamp(Math.round(
        (atlantic ? 1 : coastal ? .25 : 0)
        * ((orientCost - 1) * 160 + (world.flags?.discoveryImpulse ? 30 : 0))
      ), 0, 100);
      const territory2 = controlledTiles(polity, world);
      const majority = dominantValue(territory2, t => t.religion);
      const heterodoxShare = territory2.length ? territory2.filter(t => t.religion !== majority).length / territory2.length : 0;
      const churchKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "church");
      const churchPower = churchKey ? country.estates[churchKey].power : 30;
      let faith = clamp(Math.round(heterodoxShare * 100 * (.4 + churchPower / 120)), 0, 100);
      if (world.flags?.peaceOfFaith) faith = Math.round(faith / 2);
      const ideas = clamp(Math.round(country.ideas || 0), 0, 100);
      return { trade, military, fiscal, exploration, faith, ideas };
    }

    function registerDecision(country, label, note) {
      if (!country.ledger) country.ledger = [];
      country.ledger.unshift({ turn: state.turn, label, note: note || "" });
      country.ledger = country.ledger.slice(0, 10);
    }

    function rebelTargetOf(owner) {
      return typeof owner === "string" && owner.startsWith("叛军·") ? owner.split("·")[1] : null;
    }

    function isMajorCountry(world, polity) {
      return controlledTiles(polity, world).length >= 5;
    }

    function processEstateLadder(world) {
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        for (const [key, estate] of Object.entries(country.estates)) {
          const stage = estateStageInfo(estate.satisfaction);
          const prev = estate.stageLevel || 0;
          estate.stageLevel = stage.level;
          if (stage.level >= 2 && prev < 2) {
            if (polity === world.playerPolity) {
              if (world.turn - (estate.lastUltimatumTurn || -99) >= 6) {
                estate.lastUltimatumTurn = world.turn;
                world.playerEvents.push({ type: "estate_ultimatum", polity, estateKey: key });
              }
            } else {
              aiResolveUnrest(world, country, key, estate);
            }
            pushWorldEvent(world, `${polity}：${estate.label}进入公开抗争`, "estate");
          }
          if (stage.level >= 3) {
            estate.defianceQuarters = (estate.defianceQuarters || 0) + 1;
            for (const tile of controlledTiles(polity, world)) {
              if (canonicalEstateKind(tile.dominantEstate) === canonicalEstateKind(key)) tile.unrest += 1;
            }
            if (estate.defianceQuarters >= 3 && !country.revolt) triggerRevolt(world, polity, key);
          } else {
            estate.defianceQuarters = 0;
          }
        }
      }
    }

    function aiResolveUnrest(world, country, key, estate) {
      if (country.money >= 40) {
        country.money -= 40;
        adjustEstateForCountry(country, key, { satisfaction: 20 }, "让步安抚");
      } else if (country.military >= 30) {
        country.military -= 30;
        adjustEstateForCountry(country, key, { satisfaction: 12 }, "武力弹压");
        changeLegitimacy(country, -5, "弹压国内阶层");
      }
    }

    function resolveEstateUltimatum(world, polity, estateKey, choice) {
      const country = world.countries[polity];
      const estate = country.estates[estateKey];
      if (!estate) return;
      if (choice === "concede") {
        country.money -= 40;
        adjustEstateForCountry(country, estateKey, { satisfaction: 25, power: 3 }, "接受阶层要求");
        addCountryLog(polity, `向${estate.label}让步，矛盾暂时缓和。`, world);
      } else if (choice === "suppress") {
        country.military -= 30;
        adjustEstateForCountry(country, estateKey, { satisfaction: 14 }, "强硬弹压");
        changeLegitimacy(country, -8, `弹压${estate.label}`);
        for (const tile of controlledTiles(polity, world)) {
          if (canonicalEstateKind(tile.dominantEstate) === canonicalEstateKind(estateKey)) tile.unrest += 2;
        }
        addCountryLog(polity, `弹压${estate.label}，怨恨潜入地方。`, world);
      } else {
        estate.defianceQuarters = (estate.defianceQuarters || 0) + 1;
        addCountryLog(polity, `对${estate.label}的抗争置之不理，事态可能恶化。`, world);
      }
      pushChronicle(country, "estate", `${calendarLabel(world.turn)}：${estate.label}抗争（${choice === "concede" ? "让步" : choice === "suppress" ? "弹压" : "搁置"}）`);
    }

    function triggerRevolt(world, polity, estateKey) {
      const country = world.countries[polity];
      const estate = country.estates[estateKey];
      const kind = canonicalEstateKind(estateKey);
      const owner = `叛军·${polity}·${estate.label}`;
      const baseTiles = controlledTiles(polity, world)
        .filter(tile => canonicalEstateKind(tile.dominantEstate) === kind)
        .sort((a, b) => b.estateControl - a.estateControl)
        .slice(0, 3);
      if (!baseTiles.length || !isMajorCountry(world, polity)) {
        changeLegitimacy(country, -12, `${estate.label}暴动`);
        for (const tile of controlledTiles(polity, world)) tile.unrest += 2;
        estate.satisfaction = -45;
        estate.defianceQuarters = 0;
        pushWorldEvent(world, `${polity}爆发${estate.label}暴动`, "revolt");
        return;
      }
      const soldiers = 1200 + Math.round(estate.power * 25);
      for (const tile of baseTiles) {
        const units = [armyUnit("infantry", "levy", soldiers, tile.id, estateKey)];
        if (kind === "nobles") units.push(armyUnit("cavalry", "levy", Math.round(soldiers / 3), tile.id, estateKey));
        addArmy(world, { owner, tileId: tile.id, name: `${estate.label}叛军·${tile.name}`, units });
      }
      country.revolt = { estateKey, owner, startedTurn: world.turn, capitalQuarters: 0 };
      estate.satisfaction = -50;
      estate.defianceQuarters = 0;
      pushChronicle(country, "revolt", `${calendarLabel(world.turn)}：${estate.label}举兵叛乱`);
      pushWorldEvent(world, `${polity}爆发${estate.label}叛乱，叛军直指${capital(polity, world)?.name || "都城"}`, "revolt");
      if (polity === world.playerPolity) {
        addCountryLog(polity, `${estate.label}举兵叛乱！叛军正向都城进军。`, world);
      }
    }

    function planRevoltOrders(world) {
      for (const army of Object.values(world.warfare.armies)) {
        const target = rebelTargetOf(army.owner);
        if (!target || army.status === "routed" || army.plannedPath.length) continue;
        const capitalTile = capital(target, world);
        if (capitalTile) planArmyRoute(world, army.id, capitalTile.id);
      }
    }

    function processRevolts(world) {
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || !country.revolt) continue;
        const revolt = country.revolt;
        const estate = country.estates[revolt.estateKey];
        for (const army of Object.values(world.warfare.armies)) {
          if (army.owner !== revolt.owner) continue;
          army.morale = clamp(army.morale - 2);
          if (army.status === "routed" || army.morale <= 5 || armyTotalSoldiers(army) < 300) {
            delete world.warfare.armies[army.id];
          }
        }
        const remaining = Object.values(world.warfare.armies).filter(army => army.owner === revolt.owner);
        if (!remaining.length) {
          country.revolt = null;
          country.stats.revoltsQuelled += 1;
          if (estate) estate.satisfaction = Math.max(estate.satisfaction, -35);
          changeLegitimacy(country, 6, "平定叛乱");
          pushChronicle(country, "revolt", `${calendarLabel(world.turn)}：叛乱被平定`);
          pushWorldEvent(world, `${polity}平定${estate ? estate.label : ""}叛乱`, "revolt");
          for (const tile of world.tiles) {
            if (tile.occupier === revolt.owner) { tile.occupier = null; tile.occupation = 0; }
          }
          continue;
        }
        const capitalTile = capital(polity, world);
        const capitalHeld = capitalTile && capitalTile.occupier === revolt.owner && capitalTile.occupation >= 100;
        revolt.capitalQuarters = capitalHeld ? (revolt.capitalQuarters || 0) + 1 : 0;
        if (revolt.capitalQuarters >= 2) {
          if (polity === world.playerPolity) {
            if (!world.playerEvents.some(event => event.type === "revolt_verdict")) {
              world.playerEvents.push({ type: "revolt_verdict", polity, estateKey: revolt.estateKey });
            }
          } else {
            acceptRevoltDemands(world, polity);
          }
        }
      }
    }

    function acceptRevoltDemands(world, polity) {
      const country = world.countries[polity];
      const revolt = country.revolt;
      if (!revolt) return;
      const estate = country.estates[revolt.estateKey];
      for (const [id, army] of Object.entries(world.warfare.armies)) {
        if (army.owner === revolt.owner) delete world.warfare.armies[id];
      }
      for (const tile of world.tiles) {
        if (tile.occupier === revolt.owner) { tile.occupier = null; tile.occupation = 0; }
      }
      if (estate) { estate.satisfaction = -10; estate.power = clamp(estate.power + 6, 0, 100); }
      country.government.centralPower = clamp(country.government.centralPower - 15, 0, 100);
      changeLegitimacy(country, -15, "向叛军屈服");
      country.revolt = null;
      pushChronicle(country, "revolt", `${calendarLabel(world.turn)}：接受叛军要求，中央权威受挫`);
      pushWorldEvent(world, `${polity}向${estate ? estate.label : ""}叛军妥协`, "revolt");
    }

    function checkCountryCollapse(world, polity) {
      const country = world.countries[polity];
      if (!country || country.eliminated) return;
      const territory = controlledTiles(polity, world);
      if (!territory.length) { eliminateCountry(world, polity, "领土尽失"); return; }
      const capitalTile = capital(polity, world);
      const capitalLost = capitalTile && capitalTile.occupier && capitalTile.occupier !== polity && capitalTile.occupation >= 100;
      if (capitalLost && country.legitimacy < 20) country.collapse += 1;
      else country.collapse = 0;
      if (country.collapse === 2 && polity === world.playerPolity) {
        addCountryLog(polity, "警告：首都沦陷且合法性崩溃，政权正在瓦解（再持续 2 季即灭亡）。", world);
      }
      if (country.collapse >= 4) eliminateCountry(world, polity, "首都沦陷、合法性崩溃");
    }

    function eliminateCountry(world, polity, causeText) {
      const country = world.countries[polity];
      if (!country || country.eliminated) return;
      country.eliminated = true;
      for (const [id, army] of Object.entries(world.warfare.armies)) {
        if (army.owner === polity || rebelTargetOf(army.owner) === polity) delete world.warfare.armies[id];
      }
      const tiles = world.tiles.filter(tile => !tile.isSea && tile.controller === polity);
      for (const tile of tiles) {
        let heir = tile.occupier && tile.occupier !== polity && !rebelTargetOf(tile.occupier) ? tile.occupier : null;
        if (!heir) {
          const adjacentOwners = worldNeighbors(world, tile.id)
            .map(id => world.tiles[id].controller)
            .filter(owner => owner && owner !== polity && owner !== "海域" && world.countries[owner] && !world.countries[owner].eliminated);
          heir = adjacentOwners.sort((a, b) => countryStrength(b, world) - countryStrength(a, world))[0] || null;
        }
        if (heir) {
          tile.controller = heir;
          tile.polity = heir;
          tile.occupier = null;
          tile.occupation = 0;
          tile.control = Math.min(tile.control, 30);
          tile.unrest += 2;
        }
      }
      world.diplomacy.wars = world.diplomacy.wars.filter(war => {
        war.attackers = war.attackers.filter(name => name !== polity);
        war.defenders = war.defenders.filter(name => name !== polity);
        if (war.participants) delete war.participants[polity];
        return war.attackers.length && war.defenders.length;
      });
      world.diplomacy.treaties = world.diplomacy.treaties.filter(treaty => !treaty.parties.includes(polity));
      world.diplomacy.subjects = world.diplomacy.subjects.filter(item => item.overlord !== polity && item.subject !== polity);
      world.diplomacy.missions = world.diplomacy.missions.filter(mission => mission.actor !== polity && mission.target !== polity);
      pushChronicle(country, "end", `${calendarLabel(world.turn)}：${causeText}，王统断绝`);
      pushWorldEvent(world, `${polity}灭亡：${causeText}`, "end");
      if (polity === world.playerPolity) {
        world.endingCause = causeText;
      }
    }

    function chooseAgenda(key) {

      if (!card) return;
      country.agenda = {

      for (const [polity, missions] of Object.entries(MISSIONS)) {
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        for (const mission of missions) {
          if (country.missionsDone.includes(mission.key)) continue;
          if (!mission.check(world, country)) continue;
          country.missionsDone.push(mission.key);
          mission.reward(country);
          pushChronicle(country, "mission", `${calendarLabel(world.turn)}：达成时代使命「${mission.label}」`);
          pushWorldEvent(world, `${polity}达成时代使命「${mission.label}」`, "mission");
          if (polity === world.playerPolity) {
            addCountryLog(polity, `时代使命「${mission.label}」达成！`, world);
          }
        }
      }
      const player = world.countries[world.playerPolity];
      if (player && !player.eliminated) {

    function edictCooldownLeft(country, edict) {
      const until = country.edictCooldowns[edict.key] || 0;
      return Math.max(0, until - state.turn);
    }

    function canEnactEdict(country, edict) {
      if (edict.available && !edict.available(country)) return { ok: false, why: "时机未到" };
      if (edictCooldownLeft(country, edict) > 0) return { ok: false, why: `冷却中（余 ${edictCooldownLeft(country, edict)} 季）` };
      const cost = edict.cost || {};
      if ((cost.money || 0) > country.money) return { ok: false, why: "金钱不足" };
      if ((cost.food || 0) > country.food) return { ok: false, why: "粮食不足" };
      if ((cost.military || 0) > country.military) return { ok: false, why: "军需不足" };
      if (country.actionPoints[edict.ap] <= 0) return { ok: false, why: `${ACTION_POINT_LABELS[edict.ap]}不足` };
      return { ok: true, why: "" };
    }

    function applyEdict(country, edict) {
      const cost = edict.cost || {};
      country.money -= cost.money || 0;
      country.food -= cost.food || 0;
      country.military -= cost.military || 0;
      country.edictCooldowns[edict.key] = state.turn + edict.cooldown;
      edict.apply(country);
    }

    function enactEdict(key) {
      const country = activeCountry();
      const edict = EDICTS.find(e => e.key === key);
      if (!edict) return;
      const able = canEnactEdict(country, edict);
      if (!able.ok) return toast(`无法颁布：${able.why}。`);
      if (!spend(edict.ap)) return;
      applyEdict(country, edict);
      registerDecision(country, `《${edict.label}》`, edict.desc);
      addCountryLog(country.name, `颁布敕令《${edict.label}》。`);
      markTutorialFlag("edictDone");
      refreshPolitics();
      render();
      checkEnd();
    }

    function forecastCountry(polity) {
      const country = state.countries[polity];
      const distanceMap = buildProximityMap(polity);
      const territory = controlledTiles(polity);
      let food = 0, money = 0, military = 0;
      for (const t of territory) {
        const o = output(t, polity, distanceMap);
        food += o.food; money += o.money; military += o.military;
      }
      const penalty = estateKindPenalty(country);
      food = Math.round(food * penalty.factor.food);
      money = Math.round(money * penalty.factor.money);
      military = Math.round(military * penalty.factor.military);
      const foodParts = [{ label: "地块产出", amount: food }];
      const moneyParts = [{ label: "地块产出", amount: money }];
      const militaryParts = [{ label: "地块产出", amount: military }];
      const armyUpkeep = Math.ceil(Object.values(state.warfare.armies)
        .filter(army => army.owner === polity)
        .reduce((total, army) => total + armyTotalSoldiers(army), 0) / 40);
      if (armyUpkeep) foodParts.push({ label: "军队维护", amount: -armyUpkeep });
      let mercWage = 0;
      for (const army of Object.values(state.warfare.armies)) {
        if (army.owner === polity && army.mercenaryWage) mercWage += army.mercenaryWage;
      }
      if (mercWage) moneyParts.push({ label: "佣兵军饷", amount: -mercWage });
      for (const treaty of treatiesFor(polity)) {
        if (treaty.type === "trade") moneyParts.push({ label: "贸易协定", amount: 10 });
      }
      for (const subject of subjectsFor(polity)) {
        if (subject.overlord === polity) moneyParts.push({ label: `${subject.subject}贡赋`, amount: subject.tribute });
        if (subject.subject === polity) moneyParts.push({ label: `向${subject.overlord}进贡`, amount: -subject.tribute });
      }
      for (const mod of country.modifiers) {
        if (mod.food) foodParts.push({ label: mod.label, amount: mod.food });
        if (mod.money) moneyParts.push({ label: mod.label, amount: mod.money });
        if (mod.military) militaryParts.push({ label: mod.label, amount: mod.military });
      }
      for (const part of (state.trade?.detail?.[polity] || [])) {
        moneyParts.push({ label: `商路·${part.route}`, amount: part.amount });
      }
      const legitimacyParts = [];
      const unrestHits = territory.filter(t => t.control < 45 && t.unrest + 1 >= 4).length;
      if (unrestHits) legitimacyParts.push({ label: "低控制地区动乱", amount: -Math.min(3, Math.ceil(unrestHits / 3)) });
      const primaryReligion = dominantValue(territory, t => t.religion);
      const heterodox = territory.filter(t => t.religion !== primaryReligion).length;
      if (heterodox >= 5) legitimacyParts.push({ label: "异教治理压力", amount: -Math.min(2, Math.floor(heterodox / 5)) });
      if (penalty.legitimacyDrain) legitimacyParts.push({ label: "教会不满", amount: -penalty.legitimacyDrain });
      const sum = parts => parts.reduce((total, part) => total + part.amount, 0);
      return {
        food: sum(foodParts), money: sum(moneyParts), military: sum(militaryParts),
        legitimacy: sum(legitimacyParts),
        foodParts, moneyParts, militaryParts, legitimacyParts,
        causes: penalty.causes
      };
    }

    function computeWarnings(country) {
      const warnings = [];
      for (const [key, estate] of Object.entries(country.estates)) {
        const stage = estateStageInfo(estate.satisfaction);
        if (stage.level >= 2) warnings.push({ level: "red", text: `${estate.label}正在${stage.label}（满意 ${Math.round(estate.satisfaction)}）`, pane: "estates" });
        else if (stage.level === 1) warnings.push({ level: "yellow", text: `${estate.label}不满（满意 ${Math.round(estate.satisfaction)}）`, pane: "estates" });
      }
      if (country.revolt) warnings.push({ level: "red", text: "叛军在国内活动，正向都城进军", pane: "military" });
      if (country.legitimacy < 25) warnings.push({ level: "red", text: `合法性危急（${Math.round(country.legitimacy)}）`, pane: "edicts" });
      else if (country.legitimacy < 45) warnings.push({ level: "yellow", text: `合法性偏低（${Math.round(country.legitimacy)}）`, pane: "edicts" });
      const forecast = forecastCountry(country.name);
      if (country.food < 0) warnings.push({ level: "red", text: "粮仓已空，饥馑正在伤害民心与合法性", pane: "edicts" });
      else if (country.food + forecast.food < 0) warnings.push({ level: "yellow", text: "按当前预算，下季粮食将出现赤字", pane: "state" });
      const capitalTile = capital(country.name);
      if (capitalTile && capitalTile.occupier && capitalTile.occupier !== country.name) warnings.push({ level: "red", text: "都城正被占领", pane: "military" });
      if (country.warfare.warExhaustion >= 50) warnings.push({ level: "yellow", text: `战争疲惫 ${Math.round(country.warfare.warExhaustion)}`, pane: "military" });
      const unrestCount = controlledTiles(country.name).filter(t => t.unrest >= 3).length;
      if (unrestCount >= 3) warnings.push({ level: "yellow", text: `${unrestCount} 个地区动乱积累`, pane: "state" });
      const pressures = country.pressures || {};
      if (pressures.trade >= 60) warnings.push({ level: "yellow", text: `国库 ${pressures.trade}％ 依赖商路，路线波动将直接冲击财政`, pane: "trade" });
      if (pressures.military >= 70) warnings.push({ level: "yellow", text: "邻国兵锋压境，军备落于人后", pane: "military" });
      if (pressures.fiscal >= 75) warnings.push({ level: "red", text: `财政高压（${pressures.fiscal}）：常态支出逼近收入`, pane: "trade" });
      if ((country.priceIndex || 1) >= 1.3) warnings.push({ level: "yellow", text: `物价指数 ${Math.round(country.priceIndex * 100)}：白银正在侵蚀实际岁入`, pane: "trade" });
      if ((pressures.faith || 0) >= 70) warnings.push({ level: "red", text: `信仰张力 ${pressures.faith}：异端与正信的裂缝正在撕开国家`, pane: "edicts" });
      else if ((pressures.faith || 0) >= 45) warnings.push({ level: "yellow", text: `信仰张力 ${pressures.faith}：改宗浪潮考验着统治`, pane: "edicts" });
      if ((pressures.ideas || 0) >= 60 && (pressures.fiscal || 0) >= 60) warnings.push({ level: "red", text: "启蒙思想与财政困境合流——这是革命的配方", pane: "state" });
      return warnings;
    }

    function advisorSuggestions(country) {
      const tips = [];
      const forecast = forecastCountry(country.name);
      const tutorialTask = currentTutorialTask();
      if (tutorialTask) tips.push({ icon: "📜", text: `宫廷导师：${tutorialTask.label}——${tutorialTask.desc}`, pane: tutorialTask.pane || "state" });
      if (country.food + forecast.food < 0) tips.push({ icon: "🌾", text: "王室总管：粮入不敷出。可复员征召兵、兴建农庄，或王室施赈以缓民怨。", pane: "edicts" });
      const angry = Object.entries(country.estates)
        .map(([key, estate]) => ({ key, estate, stage: estateStageInfo(estate.satisfaction) }))
        .filter(x => x.stage.level >= 1)
        .sort((a, b) => a.estate.satisfaction - b.estate.satisfaction)[0];
      if (angry) tips.push({ icon: "⚖️", text: `内务大臣：${angry.estate.label}怨气日深（满意 ${Math.round(angry.estate.satisfaction)}），敕令中备有安抚之策。`, pane: "edicts" });
      if (country.legitimacy < 45) tips.push({ icon: "👑", text: "御前司铎：合法性不稳，可行加冕巡游、敬奉教会，或整合地方以固王权。", pane: "edicts" });
      const wars = militaryWarsFor(country.name);
      if (wars.length) tips.push({ icon: "⚔️", text: "王国元帅：战事未休。留意军团士气与战争意志，必要时尽早议和。", pane: "military" });
      if (!country.agenda) tips.push({ icon: "🎯", text: "大法官：尚未选定国家议程。议程将给国家一个中期方向与奖励。", pane: "agenda" });
      const lowControl = controlledTiles(country.name).filter(t => t.control < 45).length;
      if (lowControl >= 2) tips.push({ icon: "🏛️", text: `司法长官：${lowControl} 个地区控制力不足，派驻行政官并整合可止动乱。`, pane: "state" });
      if (tips.length < 3) tips.push({ icon: "🗺️", text: "宫廷制图师：切换产出与人口地图模式，为下一处建设选址。", pane: "state" });
      return tips.slice(0, 3);
    }

    function renderPlayerEvents() {
      const event = state.playerEvents[0];

      if (!event) { wrap.classList.remove("show"); return; }
      const country = state.countries[event.polity];
      const estate = country.estates[event.estateKey];
      const actions = document.getElementById("redEventActions");
      document.getElementById("redEventSub").textContent = `${calendarLabel(state.turn)} · ${country.name}`;
      if (event.type === "estate_ultimatum") {
        document.getElementById("redEventTitle").textContent = `${estate.label}的最后通牒`;
        document.getElementById("redEventBody").innerHTML = `
          <div class="gl-section"><div>${estate.label}的不满已成公开抗争（满意 ${Math.round(estate.satisfaction)}，权力 ${Math.round(estate.power)}）。他们要求朝廷立即回应——置之不理，事态将滑向叛乱。</div></div>`;
        actions.innerHTML = `
          <button data-choice="ignore">置之不理</button>
          <button data-choice="suppress" ${country.military < 30 ? "disabled" : ""}>武力弹压（军需 30）</button>
          <button class="primary" data-choice="concede" ${country.money < 40 ? "disabled" : ""}>让步安抚（金钱 40）</button>`;
      } else if (event.type === "revolt_verdict") {
        document.getElementById("redEventTitle").textContent = "都城陷落：政权存亡之际";
        document.getElementById("redEventBody").innerHTML = `
          <div class="gl-section"><div>${estate ? estate.label : "叛军"}的军队已经占据都城。是放弃王座，还是接受他们开出的条件、以重挫的权威换取政权延续？</div></div>`;
        actions.innerHTML = `
          <button data-choice="abdicate">逊位退场（终局）</button>
          <button class="primary" data-choice="accept">接受叛军要求（核心权力与合法性重挫）</button>`;
      }
      for (const btn of actions.querySelectorAll("button")) {
        btn.onclick = () => resolvePlayerEvent(event, btn.dataset.choice);
      }
      wrap.classList.add("show");

    function resolvePlayerEvent(event, choice) {
      state.playerEvents.shift();
      if (event.type === "estate_ultimatum") {
        resolveEstateUltimatum(state, event.polity, event.estateKey, choice);
      } else if (event.type === "revolt_verdict") {
        if (choice === "abdicate") {
          eliminateCountry(state, event.polity, "政权被叛军倾覆");
          checkEnd();
        } else {
          acceptRevoltDemands(state, event.polity);
        }
      }
      render();
      if (state.playerEvents.length) renderPlayerEvents();
      else {
        document.getElementById("redEventWrap").classList.remove("show");
        if (state.pendingCouncil && !state.gameOver) openCouncil();
      }
    }
