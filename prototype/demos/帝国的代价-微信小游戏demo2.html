    function tileFill(t) {
      if (state.mapMode === "trade") {
        if (t.isSea) return "#8fb3bf";
        const isNode = TRADE_ROUTES.some(route => !route.locked && route.nodes.some(node => node.tileId === t.id));
        return isNode ? "#e7d391" : "#ded2ad";
      }
      if (state.mapMode === "religion") {
        if (t.isSea) return "#8fb3bf";
        return { "天主教": "#c9a44a", "新教": "#4f7588", "东正教": "#7d5b94", "伊斯兰教": "#4d8569" }[t.religion] || "#9a8f78";
      }
      if (state.mapMode === "terrain") return TERRAIN[t.terrain].color;
      if (state.mapMode === "political") return POLITY_COLORS[t.controller] || OWNER_COLORS.neutral;
      if (state.mapMode === "military") {
        const militaryController = t.occupation >= 100 ? t.occupier : t.controller;
        return POLITY_COLORS[militaryController] || OWNER_COLORS.neutral;
      }
      if (state.mapMode === "dynasty") return dynastyColorForTile(t);
      if (state.mapMode === "government") return governmentColorForTile(t);
      if (state.mapMode === "population") return populationColor(sumPop(t), t.isSea);
      if (state.mapMode === "estates") return t.isSea ? "#78a7b5" : estateColor(t.dominantEstate);
      return GOODS_COLORS[t.good] || "#d8cda8";
    }

    function populationColor(pop, isSea) {
      if (isSea) return "#78a7b5";
      if (pop <= 0) return "#f0ead6";
      if (pop <= 3) return "#d8d59d";
      if (pop <= 7) return "#b8c783";
      if (pop <= 11) return "#7fa760";
      return "#4f7f49";
    }

    function cityPoint(t) {
      if (t.cityLon === null || t.cityLat === null) return { x: t.x, y: t.y };
      return project(t.cityLon, t.cityLat);
    }

    function node(tag, attrs) {
      const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
      Object.entries(attrs).forEach(([k,v]) => el.setAttribute(k,v));
      return el;
    }

    function shouldLabel(t) {
      if (t.regionLabel) return true;
      return false;
    }

    function shortName(name) {
      return name.length > 5 ? name.slice(0,5) : name;
    }

    function unitColor(type) {
      return type === "army" ? "#c16b4a" : type === "admin" ? "#d9bd52" : "#72a3b4";
    }

    function moveTargets(active) {
      if (active.unit.type === "fleet") return state.tiles.filter(t => t.isSea || t.hydro === "coast").map(t => t.id);
      if (active.kind === "army") {
        return state.tiles
          .filter(tile => armyCanEnterTile(state, active.army, tile))
          .filter(tile => Number.isFinite(terrainMoveCost(state, active.army.tileId, tile.id)))
          .map(tile => tile.id);
      }
      return neighbors(active.tile.id).filter(id => !state.tiles[id].isSea);
    }

    function renderResources() {

      document.getElementById("resources").innerHTML = vals.map(([k, v, key]) => `<div class="res" data-res="${key}" title="点击查看下季预算明细" style="cursor:pointer"><small>${k} ${trendArrow(key)}</small><strong>${v}</strong></div>`).join("");

    function renderArmyCard() {
      const drawer = document.getElementById("armyDrawer");
      const head = document.getElementById("armyDrawerHead");
      const card = document.getElementById("armyCard");
      const active = selectedUnitData();
      const army = active?.kind === "army" ? active.army : null;
      if (!army) {
        drawer.classList.remove("open");
        head.innerHTML = "";
        card.innerHTML = "";
        return;
      }
      const tile = state.tiles[army.tileId];
      const composition = armyComposition(army);
      const service = armyServiceComposition(army);
      const readonly = army.owner !== state.playerPolity;
      const country = state.countries[army.owner];
      const mergeCandidates = army.supply < 50 || army.plannedPath.length ? [] : Object.values(state.warfare.armies).filter(candidate =>
        candidate.id !== army.id
        && candidate.owner === army.owner
        && candidate.tileId === army.tileId
        && candidate.status !== "routed"
        && candidate.status !== "retreating"
        && candidate.supply >= 50
        && !candidate.plannedPath.length
        && (candidate.mercenaryLoyalty === undefined) === (army.mercenaryLoyalty === undefined)
      );
      const missingSoldiers = army.units
        .filter(unit => unit.serviceType !== "mercenary")
        .reduce((sum, unit) => sum + Math.max(0, unit.maxSoldiers - unit.soldiers), 0);
      const levySoldiers = service.levy;
      const ruler = army.mercenaryLoyalty === undefined ? rulerGeneralProfile(state, army.owner) : null;
      const rulerAssigned = ruler && army.generalId === ruler.id;
      const statusLabel = {
        ready:"可行动",
        retreating:"撤退中",
        routed:"溃退"
      }[army.status] || army.status;
      head.innerHTML = `
        <strong>${army.name}</strong>
        <small>${army.owner} · ${tile.city || tile.name}</small>
      `;
      card.innerHTML = `
        <div class="grid2">
          <div class="pill">总兵力：${armyTotalSoldiers(army)}</div>
          <div class="pill">状态：${statusLabel}</div>
          <div class="pill">步兵：${composition.infantry}</div>
          <div class="pill">骑兵：${composition.cavalry}</div>
          <div class="pill">炮兵：${composition.artillery || "未解锁"}</div>
          <div class="pill">将领：${army.mercenaryLoyalty !== undefined ? "佣兵团自带首领" : army.generalId ? state.warfare.generals[army.generalId]?.name || "未知" : "未任命"}</div>
          <div class="pill">士气：${Math.round(army.morale)}</div>
          <div class="pill">组织度：${Math.round(army.organization)}</div>
          <div class="pill">补给：${Math.round(army.supply)}</div>
          <div class="pill">经验：${armyAverageExperience(army).toFixed(1)}</div>
          <div class="pill">核心卫队：${service.guard}</div>
          <div class="pill">职业军团：${service.professional}</div>
          <div class="pill">常备军：${service.standing}</div>
          <div class="pill">征召兵：${service.levy}</div>
          <div class="pill">雇佣兵：${service.mercenary}</div>
          ${army.mercenaryLoyalty === undefined ? "" : `<div class="pill">佣兵忠诚：${army.mercenaryLoyalty}</div>`}
        </div>
        <div class="army-route">${army.plannedPath.length
          ? `行军路线：${army.plannedPath.map(id => state.tiles[id].city || state.tiles[id].name).join(" → ")}`
          : "当前军令：原地待命。点击地图地块可规划季度行军路线。"}</div>
        ${readonly ? `
          <div class="proposal-score">外国军团，只读查看。</div>
        ` : `
          <h3>军令</h3>
          <div class="actions">
            <button type="button" data-army-order="hold">取消军令</button>
            <button type="button" data-army-order="defend">就地防守</button>
            <button type="button" data-army-order="forced_march" ${army.plannedPath.length ? "" : "disabled"}>强行军</button>
          </div>
          <h3>整编</h3>
          <div class="actions">
            <button type="button" data-army-manage="split" ${armyTotalSoldiers(army) < 2000 || army.supply < 50 || army.plannedPath.length ? "disabled" : ""}>拆分军团</button>
            <button type="button" data-army-manage="reinforce" ${missingSoldiers <= 0 || country.military < 10 ? "disabled" : ""}>补充兵员</button>
            <button type="button" data-army-manage="train" ${country.actionPoints.military < 1 || country.money < 10 || country.military < 10 ? "disabled" : ""}>训练军团</button>
            <button type="button" data-army-manage="demobilize" ${levySoldiers <= 0 ? "disabled" : ""}>复员征召兵</button>
          </div>
          ${mergeCandidates.length ? `
            <h3>同格合并</h3>
            <div class="actions">
              ${mergeCandidates.map(candidate => `
                <button type="button" data-army-merge="${candidate.id}">合并 ${candidate.name}</button>
              `).join("")}
            </div>
          ` : ""}
          <h3>将领</h3>
          ${army.mercenaryLoyalty === undefined ? `
            <div class="proposal-score">
              ${ruler.title}${ruler.name}：指挥 ${ruler.command} · 机动 ${ruler.maneuver} · 围城 ${ruler.siege}
            </div>
            <div class="actions">
              <button type="button" data-army-manage="${rulerAssigned ? "dismiss-general" : "assign-ruler"}">${rulerAssigned ? "撤下统治者" : "统治者领军"}</button>
            </div>
          ` : `<div class="proposal-score">佣兵团由契约内的自带首领指挥，不能任命本国将领。</div>`}
          ${army.mercenaryLoyalty === undefined ? "" : `
            <h3>佣兵契约</h3>
            <div class="proposal-score">季度军饷 ${army.mercenaryWage} · 契约剩余 ${Math.max(0, army.contractEndsTurn - state.turn)} 季 · 忠诚 ${army.mercenaryLoyalty}</div>
            <div class="actions">
              <button type="button" data-army-manage="renew-mercenary" ${country.money < army.mercenaryWage ? "disabled" : ""}>续约两年</button>
              <button type="button" data-army-manage="release-mercenary">结束契约</button>
            </div>
          `}
        `}
      `;
      for (const button of document.querySelectorAll("[data-army-order]")) {
        button.onclick = () => {
          if (!army || army.owner !== state.playerPolity) return;
          const order = button.dataset.armyOrder;
          army.order = order;
          if (order === "hold" || order === "defend") army.plannedPath = [];
          log(`${army.name}军令调整为${order === "hold" ? "待命" : order === "defend" ? "防守" : "强行军"}。`);
          render();
          openArmyDrawer();
        };
      }
      for (const button of document.querySelectorAll("[data-army-merge]")) {
        button.onclick = () => {
          try {
            mergeArmies(state, army.id, button.dataset.armyMerge);
            log(`${army.name}完成同格合并。`);
            render();
            openArmyDrawer();
          } catch (error) {
            toast(error.message);
          }
        };
      }
      for (const button of document.querySelectorAll("[data-army-manage]")) {
        button.onclick = () => {
          try {
            const action = button.dataset.armyManage;
            if (action === "split") {
              const split = splitArmy(state, army.id);
              log(`${army.name}拆分出${split.name}。`);
            }
            if (action === "reinforce") {
              const reinforced = reinforceArmy(state, army.id);
              log(`${army.name}补充 ${reinforced} 名兵员。`);
            }
            if (action === "train") {
              trainArmy(state, army.id);
              log(`${army.name}完成季度训练。`);
            }
            if (action === "demobilize") {
              const returned = demobilizeLevies(state, army.id);
              log(`${army.name}复员征召兵，${returned} POP 返回来源地。`);
            }
            if (action === "assign-ruler") {
              const appointedRuler = rulerGeneral(state, army.owner);
              assignGeneral(state, army.id, appointedRuler.id);
              log(`${appointedRuler.title}${appointedRuler.name}亲自统率${army.name}。`);
            }
            if (action === "dismiss-general") {
              dismissGeneral(state, army.id);
              log(`${ruler.title}${ruler.name}退出${army.name}指挥。`);
            }
            if (action === "renew-mercenary") {
              renewMercenaryContract(state, army.id);
              log(`${army.name}的契约延长两年。`);
            }
            if (action === "release-mercenary") {
              releaseMercenary(state, army.id);
              log(`${army.name}结束契约并离队。`);
            }
            render();
            if (state.warfare.armies[army.id]) openArmyDrawer();
          } catch (error) {
            toast(error.message);
          }
        };
      }
    }

    function tileBanner(terrain) {
      return `../../assets/terrain-banners/${terrain}.png`;
    }

    function dominantValue(tiles, getter) {
      const counts = new Map();
      for (const tile of tiles) {
        const value = getter(tile);
        if (!value || value === "无" || value === "海域") continue;
        counts.set(value, (counts.get(value) || 0) + 1);
      }
      return [...counts.entries()].sort((a, b) => b[1] - a[1])[0]?.[0] || "未知";
    }

    function countryIntroduction(polity) {
      const introduction = COUNTRY_INTRODUCTIONS[polity];
      if (!introduction) throw new Error(`国家缺少 1337 年历史介绍：${polity}`);
      return introduction;
    }

    function countrySnapshot(polity) {
      const tiles = controlledTiles(polity);
      const countryState = state.countries[polity];
      if (!countryState) throw new Error(`国家详情缺少国家状态：${polity}`);
      const cities = tiles.filter(tile => tile.city);
      const population = tiles.reduce((total, tile) => total + sumPop(tile), 0);
      const averageControl = tiles.length
        ? Math.round(tiles.reduce((total, tile) => total + tile.control, 0) / tiles.length)
        : 0;
      const goods = [...new Set(tiles.map(tile => GOODS[tile.good]?.[0]).filter(Boolean))].slice(0, 5);
      const relation = polity === state.playerPolity
        ? "玩家政权"
        : `${attitudeLabel(state.playerPolity, polity)} · ${attitudeLabel(polity, state.playerPolity)}`;
      return {
        polity,
        tiles,
        introduction: countryIntroduction(polity),
        capital: CAPITAL_BY_POLITY[polity] || "未设置",
        government: countryState.government.typeLabel,
        relation,
        territoryCount: tiles.length,
        cityCount: cities.length,
        population,
        averageControl,
        culture: dominantValue(tiles, tile => tile.culture),
        religion: dominantValue(tiles, tile => tile.religion),
        goods: goods.join("、") || "无"
      };
    }

    function leaderAge(leader, turn = state.turn) {
      return leader.birthYear ? calendarForTurn(turn).year - leader.birthYear : null;
    }

    function successionLabel(leader) {
      const labels = {
        hereditary: "世袭继承",
        court: "宫廷推举",
        elective_life: "终身选举",
        elective_term: `${leader.termYears} 年任期选举`,
        imperial_elective: "终身帝国选举",
        clan_elective: "汗族推举"
      };
      return labels[leader.succession] || "继承制度未设置";
    }

    function leaderCardHtml(countryState, turn = state.turn) {
      const leader = countryState.leader;
      const calendar = calendarForTurn(turn);
      const age = leaderAge(leader, turn);
      const tenure = Math.max(0, calendar.year - leader.tookOfficeYear);
      const termText = leader.termEndsAtTurn
        ? ` · 本届至 ${calendarForTurn(leader.termEndsAtTurn).year} 年${seasonName(calendarForTurn(leader.termEndsAtTurn).quarter)}`
        : "";
      return `
        <section class="leader-card">
          <header class="leader-card-head">
            <div class="leader-seal">${leader.name.slice(0, 1)}</div>
            <div>
              <h3>${leader.title} ${leader.name}</h3>
              <div>${leader.dynasty} · ${age === null ? "年龄不详" : `${age} 岁`} · 在位 ${tenure} 年</div>
            </div>
          </header>
          <div class="leader-abilities">
            ${[
              ["administrative", "行政"],
              ["diplomatic", "外交"],
              ["military", "军事"]
            ].map(([key, label]) => `
              <div class="leader-ability">
                <small>${label}能力</small>
                <strong>${leader.abilities[key]}</strong>
                <span>季度 +${leaderActionGain(leader.abilities[key])}</span>
              </div>
            `).join("")}
          </div>
          <div class="leader-succession">${successionLabel(leader)}${termText}</div>
        </section>
      `;
    }

    let countryModalPolity = null;
    let countryModalTab = "overview";

    function formatSigned(value) {
      return value > 0 ? `+${value}` : String(value);
    }

    function countryOverviewHtml(polity) {
      const country = countrySnapshot(polity);
      const countryState = state.countries[polity];
      const isPlayer = polity === state.playerPolity;
      return `
        ${leaderCardHtml(countryState)}
        <section class="country-summary-grid">
          <div class="country-summary-item"><small>首都</small><strong>${country.capital}</strong></div>
          <div class="country-summary-item"><small>地图地块</small><strong>${country.territoryCount}</strong></div>
          <div class="country-summary-item"><small>城市</small><strong>${country.cityCount}</strong></div>
          <div class="country-summary-item"><small>总 POP</small><strong>${country.population}</strong></div>
          <div class="country-summary-item"><small>平均控制力</small><strong>${country.averageControl}</strong></div>
          <div class="country-summary-item"><small>主流文化</small><strong>${country.culture}</strong></div>
          <div class="country-summary-item"><small>主流宗教</small><strong>${country.religion}</strong></div>
          <div class="country-summary-item"><small>主要产出</small><strong>${country.goods}</strong></div>
          ${isPlayer ? `
            <div class="country-summary-item"><small>${countryState.government.powerName}</small><strong>${Math.round(countryState.government.centralPower)}</strong></div>
            <div class="country-summary-item"><small>资本池</small><strong>${Math.round(countryState.capital || 0)}</strong></div>
          ` : ""}
        </section>
        ${isPlayer ? `
          <div class="country-modal-actions">
            <button class="primary" id="openCountrySwitch" type="button">切换国家</button>
          </div>
        ` : ""}
      `;
    }

    function relationMetricsHtml(viewer, target) {
      const relation = relationView(viewer, target);
      return `
        <div class="relation-metrics">
          <div class="relation-metric"><small>信任</small><strong>${relation.trust}</strong></div>
          <div class="relation-metric"><small>威胁</small><strong>${relation.threat}</strong></div>
          <div class="relation-metric"><small>恩义</small><strong>${formatSigned(relation.favor)}</strong></div>
          <div class="relation-metric"><small>领土矛盾</small><strong>${relation.territorialConflict}</strong></div>
          <div class="relation-metric"><small>制度冲突</small><strong>${relation.institutionalConflict}</strong></div>
          <div class="relation-metric"><small>战略利益</small><strong>${formatSigned(relation.strategicInterest)}</strong></div>
        </div>
      `;
    }

    function leaderRelationHtml(viewer, target) {
      const relation = leaderRelationView(viewer, target);
      return `
        <div class="leader-relation-grid">
          <div class="relation-metric"><small>友谊</small><strong>${relation.friendship}</strong></div>
          <div class="relation-metric"><small>尊重</small><strong>${relation.respect}</strong></div>
          <div class="relation-metric"><small>恐惧</small><strong>${relation.fear}</strong></div>
          <div class="relation-metric"><small>宿怨</small><strong>${relation.grudge}</strong></div>
          <div class="relation-metric"><small>亲属</small><strong>${relation.kinship ? "是" : "否"}</strong></div>
          <div class="relation-metric"><small>私人承诺</small><strong>${relation.promise || "无"}</strong></div>
        </div>
      `;
    }

    function proposalBreakdownHtml(evaluation) {
      if (!evaluation.available) return `<div class="proposal-score">${evaluation.reason}</div>`;
      return `
        <div class="proposal-score">接受意愿 ${evaluation.score} / ${evaluation.threshold} · ${evaluation.accepted ? "将接受" : "将拒绝"}</div>
        <div class="proposal-breakdown">${evaluation.parts.map(([label, value]) => `${label} ${formatSigned(value)}`).join(" · ")}</div>
      `;
    }

    function subjectSummaryHtml(subject, perspective) {
      const other = subject.overlord === perspective ? subject.subject : subject.overlord;
      const role = subject.overlord === perspective ? "宗主" : "附属";
      return `
        <div class="relation-row">
          <div>
            <strong>${SUBJECT_TYPES[subject.type].label} · ${other}</strong>
            <small>本国身份：${role} · 自主权 ${subject.autonomy} · 忠诚度 ${subject.loyalty} · 季度贡赋 ${subject.tribute}</small>
          </div>
          <span class="attitude-badge">${role}</span>
        </div>
      `;
    }

    function countryDiplomacyHtml(polity) {
      const player = state.playerPolity;
      const isPlayer = polity === player;
      const memberships = organizationMemberships(polity);
      const capacity = diplomaticCapacity(polity);
      const used = diplomaticCapacityUsed(polity);
      const missions = activeMissions(polity);
      const treaties = treatiesFor(polity);
      const subjects = subjectsFor(polity);

      if (isPlayer) {
        const relations = playableCountries()
          .filter(country => country !== player)
          .sort((a, b) => relationshipScore(player, b) - relationshipScore(player, a));
        return `
          <section class="mini-card">
            <h3 class="diplomacy-section-title">外交资源</h3>
            <div class="diplomacy-resource-grid">
              <div class="diplomacy-stat"><small>外交点</small><strong>${state.countries[polity].actionPoints.diplomatic}</strong></div>
              <div class="diplomacy-stat"><small>空闲使节</small><strong>${freeEnvoys(polity)} / ${state.countries[polity].diplomacy.envoys}</strong></div>
              <div class="diplomacy-stat"><small>外交容量</small><strong>${used} / ${capacity}</strong></div>
            </div>
          </section>
          <section class="mini-card">
            <h3 class="diplomacy-section-title">国家关系</h3>
            <div class="relation-list">
              ${relations.map(country => {
                const attitude = diplomaticAttitude(player, country);
                return `
                  <button class="relation-row" type="button" data-country-diplomacy="${country}">
                    <div><strong>${country}</strong><small>我方：${attitudeLabel(player, country)} · 对方：${attitudeLabel(country, player)}</small></div>
                    <span class="attitude-badge" style="background:${DIPLOMATIC_ATTITUDES[attitude].color};color:#fff7e3">${DIPLOMATIC_ATTITUDES[attitude].label}</span>
                  </button>
                `;
              }).join("")}
            </div>
          </section>
          <section class="mini-card">
            <h3 class="diplomacy-section-title">长期承诺</h3>
            ${treaties.length ? treaties.map(treaty => {
              const other = treaty.parties.find(party => party !== polity);
              return `<div class="relation-row"><div><strong>${TREATY_TYPES[treaty.type].label} · ${other}</strong><small>至 ${calendarLabel(treaty.endsTurn)} · 容量 ${TREATY_TYPES[treaty.type].capacity}</small></div></div>`;
            }).join("") : `<div class="diplomacy-empty">当前没有正式外交契约。</div>`}
            ${subjects.length ? subjects.map(subject => subjectSummaryHtml(subject, polity)).join("") : ""}
          </section>
          <section class="mini-card">
            <h3 class="diplomacy-section-title">国际组织身份</h3>
            ${memberships.length
              ? memberships.map(item => `<div class="relation-row"><div><strong>${item.organization.name}</strong><small>${item.role}</small></div></div>`).join("")
              : `<div class="diplomacy-empty">当前没有国际组织身份。</div>`}
          </section>
        `;
      }

      const relation = relationView(player, polity);
      const reverseRelation = relationView(polity, player);
      const personal = leaderRelationView(player, polity);
      const existingSubject = subjectBetween(player, polity);
      const playerMission = activeMissions(player).find(mission => mission.target === polity);
      const bilateralTreaties = treaties.filter(treaty => treaty.parties.includes(player));

      return `
        <section class="mini-card">
          <h3 class="diplomacy-section-title">双边态度</h3>
          <div class="diplomacy-resource-grid">
            <div class="diplomacy-stat"><small>我方态度</small><strong>${attitudeLabel(player, polity)}</strong></div>
            <div class="diplomacy-stat"><small>对方态度</small><strong>${attitudeLabel(polity, player)}</strong></div>
            <div class="diplomacy-stat"><small>是否交战</small><strong>${areAtWar(player, polity) ? "是" : "否"}</strong></div>
          </div>
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">${polity}对本国的判断</h3>
          ${relationMetricsHtml(polity, player)}
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">领导人私人关系</h3>
          ${leaderRelationHtml(polity, player)}
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">使节与领导人行动</h3>
          <div class="diplomatic-action-list">
            <div class="diplomatic-action">
              <div><strong>${playerMission ? "使节正在执行任务" : "改善关系"}</strong><small>${playerMission ? `${playerMission.type === "calm_subject" ? "安抚附属国" : "改善关系"} · 每季度结算` : "外交点 1，占用 1 名使节"}</small></div>
              <button type="button" ${playerMission ? `data-withdraw-mission="${playerMission.id}"` : `data-start-mission="improve"`}>${playerMission ? "撤回" : "派遣"}</button>
            </div>
            <div class="diplomatic-action"><div><strong>赠礼</strong><small>金钱 2、外交点 1 · 提高信任与友谊</small></div><button type="button" data-leader-action="gift">执行</button></div>
            <div class="diplomatic-action"><div><strong>私人会晤</strong><small>外交点 1 · 提高友谊与尊重</small></div><button type="button" data-leader-action="meeting">执行</button></div>
            <div class="diplomatic-action"><div><strong>公开威慑</strong><small>外交点 1 · 提高恐惧，也会积累宿怨</small></div><button type="button" data-leader-action="threaten">执行</button></div>
          </div>
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">正式契约</h3>
          ${bilateralTreaties.length ? bilateralTreaties.map(treaty => `
            <div class="diplomatic-action">
              <div><strong>${TREATY_TYPES[treaty.type].label}</strong><small>${TREATY_TYPES[treaty.type].effect} · 至 ${calendarLabel(treaty.endsTurn)}</small></div>
              <button type="button" data-end-treaty="${treaty.id}">退出</button>
            </div>
          `).join("") : `<div class="diplomacy-empty">双方当前没有正式契约。</div>`}
          <div class="diplomatic-action-list">
            ${Object.entries(TREATY_TYPES).map(([type, definition]) => {
              const evaluation = proposalEvaluation(player, polity, type);
              return `
                <div class="diplomatic-action">
                  <div>
                    <strong>${definition.label}</strong>
                    <small>${definition.effect} · 外交点 ${definition.actionCost} · 容量 ${definition.capacity}</small>
                    ${proposalBreakdownHtml(evaluation)}
                  </div>
                  <button type="button" data-propose-treaty="${type}" ${evaluation.available ? "" : "disabled"}>提案</button>
                </div>
              `;
            }).join("")}
          </div>
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">权利结构</h3>
          ${existingSubject ? `
            ${subjectSummaryHtml(existingSubject, player)}
            <div class="chip-row">
              ${Object.entries(existingSubject.terms).map(([key, value]) => `<span class="chip">${{
                diplomacy:"外交", war:"宣战", military:"军事", finance:"财政", market:"市场", succession:"继承"
              }[key]}：${value}</span>`).join("")}
            </div>
          ` : `
            <div class="diplomatic-action-list">
              ${Object.entries(SUBJECT_TYPES).map(([type, definition]) => {
                const evaluation = proposalEvaluation(player, polity, type);
                return `
                  <div class="diplomatic-action">
                    <div>
                      <strong>要求成为${definition.label}</strong>
                      <small>自主权 ${definition.autonomy} · 初始忠诚 ${definition.loyalty} · 外交点 ${definition.actionCost}</small>
                      ${proposalBreakdownHtml(evaluation)}
                    </div>
                    <button type="button" data-propose-subject="${type}" ${evaluation.available ? "" : "disabled"}>提出</button>
                  </div>
                `;
              }).join("")}
            </div>
          `}
          ${existingSubject?.overlord === player ? `
            <div class="diplomatic-action-list">
              <div class="diplomatic-action">
                <div><strong>调整从属条款</strong><small>收紧会提高贡赋并降低忠诚；放宽则相反。</small></div>
                <div>
                  <button type="button" data-subject-control="${existingSubject.id}:tighten">收紧</button>
                  <button type="button" data-subject-control="${existingSubject.id}:loosen">放宽</button>
                </div>
              </div>
            </div>
            <button class="diplomacy-inline-button" type="button" data-start-mission="calm_subject" ${playerMission ? "disabled" : ""}>派使节安抚附属国</button>
          ` : ""}
        </section>
        <section class="mini-card">
          <h3 class="diplomacy-section-title">国际组织身份</h3>
          ${memberships.length
            ? memberships.map(item => `<div class="relation-row"><div><strong>${item.organization.name}</strong><small>${item.role} · 完整组织玩法尚未开放</small></div></div>`).join("")
            : `<div class="diplomacy-empty">当前没有国际组织身份。</div>`}
        </section>
      `;
    }

    function bindCountryDiplomacyActions(polity) {
      const body = document.getElementById("countryModalBody");
      for (const button of body.querySelectorAll("[data-country-diplomacy]")) {
        button.onclick = () => openCountryDetails(button.dataset.countryDiplomacy, "diplomacy");
      }
      for (const button of body.querySelectorAll("[data-start-mission]")) {
        button.onclick = () => startDiplomaticMission(polity, button.dataset.startMission);
      }
      for (const button of body.querySelectorAll("[data-withdraw-mission]")) {
        button.onclick = () => withdrawDiplomaticMission(button.dataset.withdrawMission);
      }
      for (const button of body.querySelectorAll("[data-leader-action]")) {
        button.onclick = () => performLeaderDiplomacy(polity, button.dataset.leaderAction);
      }
      for (const button of body.querySelectorAll("[data-propose-treaty]")) {
        button.onclick = () => proposeTreaty(polity, button.dataset.proposeTreaty);
      }
      for (const button of body.querySelectorAll("[data-end-treaty]")) {
        button.onclick = () => terminateTreaty(button.dataset.endTreaty);
      }
      for (const button of body.querySelectorAll("[data-propose-subject]")) {
        button.onclick = () => proposeSubject(polity, button.dataset.proposeSubject);
      }
      for (const button of body.querySelectorAll("[data-subject-control]")) {
        button.onclick = () => {
          const [id, direction] = button.dataset.subjectControl.split(":");
          adjustSubjectControl(id, direction);
        };
      }
    }

    function renderCountryModal() {
      const polity = countryModalPolity;
      if (!polity) return;
      const country = countrySnapshot(polity);
      document.getElementById("countryModalFlag").style.background = POLITY_COLORS[polity] || OWNER_COLORS.neutral;
      document.getElementById("countryModalFlag").textContent = POLITY_EMBLEMS[polity] || "旗";
      document.getElementById("countryModalTitle").textContent = polity;
      document.getElementById("countryModalSubtitle").textContent = `${country.government} · ${country.relation}`;
      document.getElementById("countryModalBody").innerHTML = `
        <nav class="country-tabs" aria-label="国家详情页面">
          <button class="country-tab ${countryModalTab === "overview" ? "active" : ""}" type="button" data-country-tab="overview">概览</button>
          <button class="country-tab ${countryModalTab === "diplomacy" ? "active" : ""}" type="button" data-country-tab="diplomacy">外交</button>
        </nav>
        ${countryModalTab === "overview" ? countryOverviewHtml(polity) : countryDiplomacyHtml(polity)}
      `;
      for (const button of document.querySelectorAll("[data-country-tab]")) {
        button.onclick = () => {
          countryModalTab = button.dataset.countryTab;
          renderCountryModal();
        };
      }
      const switchButton = document.getElementById("openCountrySwitch");
      if (switchButton) switchButton.onclick = () => openCountrySelector(false);
      if (countryModalTab === "diplomacy") bindCountryDiplomacyActions(polity);
    }

    function openCountryDetails(polity, tab = "overview") {
      if (!polity || polity === "海域") return;
      countryModalPolity = polity;
      countryModalTab = tab;
      renderCountryModal();
      const wrap = document.getElementById("countryModalWrap");
      wrap.classList.add("show");
      wrap.setAttribute("aria-hidden", "false");
      document.getElementById("countryModalClose").focus();
    }

    function closeCountryDetails() {
      const wrap = document.getElementById("countryModalWrap");
      wrap.classList.remove("show");
      wrap.setAttribute("aria-hidden", "true");
      countryModalPolity = null;
    }

    function renderLeaderElection() {
      const wrap = document.getElementById("leaderElectionWrap");
      const election = state.pendingElection;
      if (!election) {
        wrap.classList.remove("show");
        wrap.setAttribute("aria-hidden", "true");
        return;
      }
      const country = state.countries[election.polity];
      document.getElementById("leaderElectionTitle").textContent = `${election.polity}领导人选举`;
      document.getElementById("leaderElectionSubtitle").textContent = election.reason;
      document.getElementById("leaderCandidates").innerHTML = election.candidates.map((candidate, index) => {
        const estate = candidate.supportEstate ? country.estates[candidate.supportEstate] : null;
        return `
          <section class="leader-candidate">
            <h3>${candidate.title} ${candidate.name}</h3>
            <div>${candidate.dynasty}</div>
            <div>主要支持：${estate?.label || "国家会议"}</div>
            <div class="leader-abilities">
              ${[
                ["administrative", "行政"],
                ["diplomatic", "外交"],
                ["military", "军事"]
              ].map(([key, label]) => `
                <div class="leader-ability">
                  <small>${label}</small>
                  <strong>${candidate.abilities[key]}</strong>
                  <span>+${leaderActionGain(candidate.abilities[key])}</span>
                </div>
              `).join("")}
            </div>
            <button type="button" data-elect-leader="${index}">选择此人</button>
          </section>
        `;
      }).join("");
      for (const button of document.querySelectorAll("[data-elect-leader]")) {
        button.onclick = () => {
          const leader = completeLeaderElection(state, Number(button.dataset.electLeader));
          render();
          toast(`${leader.title}${leader.name}就任`);
        };
      }
      wrap.classList.add("show");
      wrap.setAttribute("aria-hidden", "false");
    }

    let pendingCountry = null;
    let countrySelectionRequired = false;

          <div class="country-preview-stat"><small>军需</small><strong>${countryState.military}</strong></div>
          <div class="country-preview-stat"><small>合法性</small><strong>${countryState.legitimacy}</strong></div>
          <div class="country-preview-stat"><small>地图地块</small><strong>${selected.territoryCount}</strong></div>
          <div class="country-preview-stat"><small>城市</small><strong>${selected.cityCount}</strong></div>
          <div class="country-preview-stat"><small>总 POP</small><strong>${selected.population}</strong></div>
          <div class="country-preview-stat"><small>平均控制力</small><strong>${selected.averageControl}</strong></div>
          <div class="country-preview-stat"><small>主流文化</small><strong>${selected.culture}</strong></div>
          <div class="country-preview-stat"><small>主流宗教</small><strong>${selected.religion}</strong></div>
          <div class="country-preview-stat"><small>主要产出</small><strong>${selected.goods}</strong></div>
          <div class="country-preview-stat"><small>${countryState.government.powerName}</small><strong>${Math.round(countryState.government.centralPower)}</strong></div>
        </section>
      `;

    function selectCountryChoice(polity, shouldCenter = true) {
      pendingCountry = polity;
      for (const button of document.querySelectorAll("[data-country-choice]")) {
        const isSelected = button.dataset.countryChoice === polity;
        button.classList.toggle("selected", isSelected);
        button.setAttribute("aria-pressed", String(isSelected));
        if (isSelected && shouldCenter && button.scrollIntoView) {
          button.scrollIntoView({ behavior: "smooth", block: "nearest", inline: "center" });
        }
      }
      renderCountryPreview();
    }

    function renderCountrySelector() {
      const query = document.getElementById("countrySearch").value.trim().toLowerCase();
      const countries = playableCountries()
        .map(name => ({ name, state: state.countries[name], snapshot: countrySnapshot(name) }))
        .filter(item => !query
          || item.name.toLowerCase().includes(query)
          || item.state.government.typeLabel.toLowerCase().includes(query)
          || item.snapshot.capital.toLowerCase().includes(query));
      if (!countries.some(item => item.name === pendingCountry)) {
        pendingCountry = countries[0]?.name || null;
      }
      document.getElementById("countryList").innerHTML = countries.map(item => `
        <button class="country-choice ${pendingCountry === item.name ? "selected" : ""}" type="button" data-country-choice="${item.name}" aria-pressed="${pendingCountry === item.name}">
          <span class="country-choice-flag" style="background:${POLITY_COLORS[item.name] || OWNER_COLORS.neutral}">${POLITY_EMBLEMS[item.name] || "旗"}</span>
          <strong>${item.name}</strong>
        </button>
      `).join("") || `<div class="country-empty">没有搜索结果</div>`;
      for (const button of document.querySelectorAll("[data-country-choice]")) {
        button.onclick = () => selectCountryChoice(button.dataset.countryChoice);
      }
      if (pendingCountry) selectCountryChoice(pendingCountry, true);
      else renderCountryPreview();
    }

    function scrollCountryChoices(direction) {
      const list = document.getElementById("countryList");
      list.scrollBy({ left: direction * Math.max(240, list.clientWidth * .72), behavior: "smooth" });
    }

    function openCountrySelector(initial = false) {
      countrySelectionRequired = initial;
      pendingCountry = state.playerPolity;
      closeCountryDetails();
      document.getElementById("countrySearch").value = "";
      document.getElementById("countrySelectTitle").textContent = initial ? "选择开局国家" : "切换扮演国家";
      const closeButton = document.getElementById("countrySelectClose");
      closeButton.hidden = initial;
      document.getElementById("countrySelectConfirm").textContent = initial ? "开始扮演" : "确认切换";
      const wrap = document.getElementById("countrySelectWrap");
      wrap.classList.add("show");
      wrap.setAttribute("aria-hidden", "false");
      renderCountrySelector();
      document.getElementById("countrySearch").focus();
    }

    function closeCountrySelector() {
      if (countrySelectionRequired) return;
      const wrap = document.getElementById("countrySelectWrap");
      wrap.classList.remove("show");
      wrap.setAttribute("aria-hidden", "true");
      pendingCountry = null;
    }

    function switchCountry(polity) {
      const cap = setPlayerCountry(state, polity);
      state.viewCenter = { x: cap.x, y: cap.y };
      countrySelectionRequired = false;
      pendingCountry = null;
      document.getElementById("countrySelectWrap").classList.remove("show");
      document.getElementById("countrySelectWrap").setAttribute("aria-hidden", "true");
      document.getElementById("drawer").classList.remove("open");
      document.getElementById("tileDrawer").classList.remove("open");
      for (const button of document.querySelectorAll(".hud-tab")) button.classList.remove("active");
      log(`玩家开始控制${polity}。`);
      render();
      toast(`当前国家：${polity}`);
    }

    function armyComposition(army) {
      const totals = { infantry:0, cavalry:0, artillery:0 };
      for (const unit of army.units) totals[unit.combatType] += unit.soldiers;
      return totals;
    }

    function armyServiceComposition(army) {
      const totals = { guard:0, professional:0, standing:0, levy:0, mercenary:0 };
      for (const unit of army.units) totals[unit.serviceType] += unit.soldiers;
      return totals;
    }

    function militaryWarsFor(polity, world = state) {
      return world.diplomacy.wars.filter(war =>
        war.attackers.includes(polity) || war.defenders.includes(polity)
      );
    }

          state.selectedTile = army.tileId;

      for (const button of document.querySelectorAll("[data-mobilize]")) {

            : capital(state.playerPolity, state);

          try {
            mobilizeArmy(state, state.playerPolity, tile.id, button.dataset.mobilize);

          const [warId, type] = button.dataset.peace.split(":");
          const terms = type === "reparations"

            log("和平条约已经签署。");
            render();
          } catch (error) {
            toast(error.message);
          }
        };
      }
    }

    function canPay(cost) {
      const country = activeCountry();
      if ((cost.money || 0) > country.money) return false;
      if ((cost.military || 0) > country.military) return false;
      if ((cost.legitimacy || 0) > country.legitimacy) return false;
      return true;
    }

    function pay(cost) {
      const country = activeCountry();
      country.money -= cost.money || 0;
      country.military -= cost.military || 0;
      if (cost.legitimacy) changeLegitimacy(country, -cost.legitimacy, "政治改革代价");
    }

    function advanceReform(key) {
      const country = activeCountry();
      const government = country.government;
      const cfg = REFORM_SLOTS[key];
      if (!cfg) return;
      if (!canPay(cfg.cost)) return toast("资源不足，无法推进改革。");
      const actionType = key === "military" ? "military" : ["political","maritime"].includes(key) ? "diplomatic" : "administrative";
      if (!spend(actionType)) return;
      pay(cfg.cost);
      government.reforms[key] = clamp((government.reforms[key] || 0) + 1, 0, 5);
      if (key === "administrative") {
        government.stateCapacity.admin = clamp(government.stateCapacity.admin + 6);
        government.centralPower = clamp(government.centralPower + 3);
        adjustEstate("nobles", { satisfaction:-7 }, "行政改革收权");
        for (const t of controlledTiles()) t.control = clamp(t.control + 3);
      }
      if (key === "fiscal") {
        government.stateCapacity.fiscal = clamp(government.stateCapacity.fiscal + 6);
        country.money += 20;
        adjustEstate("merchants", { power:3, satisfaction:8 }, "财政改革惠商");
      }
      if (key === "military") {
        government.stateCapacity.military = clamp(government.stateCapacity.military + 6);
        country.military += 10;
        adjustEstate("peasants", { satisfaction:-7 }, "军事改革征发");
        adjustEstate("nobles", { power:2 }, "军事改革倚重贵族");
      }
      if (key === "religious") {
        changeLegitimacy(country, 4, "宗教改革");
        adjustEstate("church", { power:2, satisfaction:8 }, "宗教改革尊教");
      }
      if (key === "political") {
        government.centralPower = clamp(government.centralPower + 2);
        adjustEstate("nobles", { satisfaction:-7 }, "政治改革动摇旧制");
        if (government.type === "monarchy" && government.reforms.political >= 2 && !government.assembly.unlocked) {
          government.assembly.support = 35;
        }
      }
      if (key === "maritime") {
        government.stateCapacity.fiscal = clamp(government.stateCapacity.fiscal + 3);
        country.money += countPlayerPorts();
        adjustEstate("merchants", { power:2, satisfaction:8 }, "海洋改革惠商");
        adjustEstate("nobles", { satisfaction:-7 }, "海洋改革冷落贵族");
      }
      refreshPolitics();
      registerDecision(country, `${cfg.label}改革·等级${government.reforms[key]}`, cfg.effect);
      log(`${cfg.label}改革推进到等级 ${government.reforms[key]}。`);
      markTutorialFlag("reformDone");
      render();
      checkEnd();
    }

    function concedeAssembly() {
      const government = activeCountry().government;
      if (!government.assembly.unlocked) return toast("会议尚未解锁。");
      if (!spend("diplomatic")) return;
      government.assembly.support = clamp(government.assembly.support + 15);
      adjustEstate("merchants", { power:2 }, "议会让步");
      adjustEstate("peasants", { satisfaction:-7 }, "议会让步加征于民");
      log(`${government.assembly.type}中作出让步，支持率 +15。`);
      render();
    }

    function passAssemblyAgenda() {
      const country = activeCountry();
      const government = country.government;
      const assembly = government.assembly;
      if (!assembly.unlocked) return toast("会议尚未解锁。");
      const agenda = ASSEMBLY_AGENDAS.find(a => a.key === assembly.agenda) || ASSEMBLY_AGENDAS[0];
      if (assembly.support < agenda.support) return toast("支持率不足。");
      if (!spend("diplomatic")) return;
      if (agenda.key === "tax") country.money += 30;
      if (agenda.key === "levy") country.military += 20;
      if (agenda.key === "land") {
        for (const t of controlledTiles()) t.control = clamp(t.control + 6);
        adjustEstate("nobles", { satisfaction:-7 }, "土地改革议案");
      }
      if (agenda.key === "tolerance") {
        changeLegitimacy(country, 3, "宗教宽容议案");
        adjustEstate("church", { satisfaction:-7 }, "宗教宽容议案");
      }
      if (agenda.key === "transition") {
        government.centralPower = clamp(government.centralPower - 5);
        government.reforms.political = clamp(government.reforms.political + 1, 0, 5);
      }
      assembly.support = Math.max(20, assembly.support - agenda.support + 18);
      const nextIndex = (ASSEMBLY_AGENDAS.findIndex(a => a.key === agenda.key) + 1) % ASSEMBLY_AGENDAS.length;
      assembly.agenda = ASSEMBLY_AGENDAS[nextIndex].key;
      log(`${assembly.type}通过《${agenda.label}》：${agenda.benefit}，代价是${agenda.concession}。`);
      render();
      checkEnd();
    }

    function enactDecision(key) {
      const country = activeCountry();
      const decision = DECISIONS.find(d => d.key === key);
      if (!decision) return;
      if (!decision.can(country, state)) return toast(decision.why);
      if (!spend("administrative")) return;
      decision.apply(country, state);
      registerDecision(country, `决议《${decision.label}》`, decision.desc);
      refreshPolitics();
      render();
      checkEnd();
    }

    function changeGovernment(type, message) {
      const country = activeCountry();
      const oldGovernment = country.government;
      country.government = createGovernment(type);
      country.government.centralPower = oldGovernment.type === type ? oldGovernment.centralPower : 52;
      country.estates = createEstates(type);
      if (oldGovernment.type !== type) configureLeaderForGovernment(country, type, state.turn);
      pushChronicle(country, "government", `${calendarLabel(state.turn)}：${message}`);
      pushWorldEvent(state, `${country.name}：${message}`, "government");
      log(message);
    }

    function canonicalEstateKind(key) {
      if (["nobles","patricians","orders","clans","warriors","port_nobles","princes"].includes(key)) return "nobles";
      if (["merchants","citizens","guilds","companies","cities","oligarchs"].includes(key)) return "merchants";
      if (["church","clergy","shamans","imperial_church","legate"].includes(key)) return "church";
      if (["peasants","commons","faithful","herders","sailors"].includes(key)) return "peasants";
      return key;
    }

    function countPlayerPorts() {
      return controlledTiles().filter(t => t.buildings.includes("port")).length;
    }

    function refreshPolitics(polity = state.playerPolity) {
      const country = state.countries[polity];
      const territory = controlledTiles(polity);
      for (const t of territory) {
        t.localDemand = localDemandFor(t);
      }
      for (const [key, estate] of Object.entries(country.estates)) {
        const kind = canonicalEstateKind(key);
        const tilePower = territory
          .filter(t => canonicalEstateKind(t.dominantEstate) === kind)
          .reduce((sum, t) => sum + t.estateControl / 12, 0);
        const base = ESTATE_LIBRARY[key]?.basePower || estate.power;
        const tradeBonus = kind === "merchants"
          ? Math.min(14, Math.round((state.trade?.income?.[polity] || 0) / 6))
          : 0;
        estate.power = clamp(Math.round(base * 0.68 + tilePower + estate.privileges.length * 3 + tradeBonus), 0, 100);
      }
      const highest = Math.max(...Object.values(country.estates).map(e => e.power));
      const reformBonus = (country.government.reforms.administrative + country.government.reforms.political) * 2;
      country.government.centralPower = clamp(country.government.centralPower + reformBonus / 10 - Math.max(0, highest - 55) / 18, 0, 100);
      country.government.legitimacy = clamp(country.legitimacy, 0, 100);
    }

    function openArmyDrawer() {
      const active = selectedUnitData();

      document.getElementById("tileDrawer").classList.remove("open");
      document.getElementById("armyDrawer").classList.add("open");

      document.getElementById("armyDrawer").classList.remove("open");

      render();
    }

    function onTile(id) {
      markTutorialFlag("tileSeen");
      if (gesture.skipClick) {
        gesture.skipClick = false;
        return;
      }
      const active = selectedUnitData();
      if (active?.kind === "army" && active.army.owner === state.playerPolity && id !== active.army.tileId) {
        const path = planArmyRoute(state, active.army.id, id);
        if (!path.length) return toast("无法规划到该地块的陆上路线。");
        state.selectedTile = active.army.tileId;
        log(`${active.army.name}已规划前往${state.tiles[id].name}，将在季度结算时行动。`);
        render();
        openArmyDrawer();
        return;
      }
      if (active?.kind !== "army" && active && moveTargets(active).includes(id)) return moveUnit(active, id);
      state.selectedTile = id;
      state.selectedUnit = null;
      render();
      openTileDrawer();
    }

    function moveUnit(active, id) {
      if (active.kind === "army") throw new Error("军团必须通过季度军令移动");
      const country = activeCountry();
      const target = state.tiles[id];
      if (active.unit.type !== "fleet" && target.isSea) return toast("陆上单位不能进入海域。");
      if (!target.isSea && target.controller !== state.playerPolity
        && !areHostile(state.playerPolity, target.controller)
        && !hasMilitaryAccess(state.playerPolity, target.controller)) {
        return toast(`没有进入${target.controller}的军事通行权。`);
      }
      if (!spend("military")) return;
      active.tile.units = active.tile.units.filter(u => u.id !== active.unit.id);
      target.units.push(active.unit);
      state.selectedTile = target.id;
      log(`${active.unit.type === "admin" ? "行政官" : "舰队"}移动到${target.name}。`);
      render();
      openTileDrawer();
      checkEnd();
    }

    function actionRecruit() {
      const country = activeCountry();
      const t = state.tiles[state.selectedTile];
      if (t.isSea) return toast("海域不能征兵。");
      if (t.controller !== state.playerPolity) return toast("只能在本国地块征兵。");
      if (country.military < 10) return toast("军需不足。");
      if (!spend("military")) return;
      country.military -= 10;
      try {
        mobilizeArmy(state, state.playerPolity, t.id, "infantry");
      } catch (error) {
        country.actionPoints.military += 1;
        country.military += 10;
        return toast(error.message);
      }
      log(`${t.name}动员 1000 名征召步兵，军需 -10，平民满意下降。`);
      render();
      checkEnd();
    }

    function actionAdmin() {
      const country = activeCountry();
      const t = state.tiles[state.selectedTile];
      if (t.isSea) return toast("海域不能任命行政官。");
      if (t.controller !== state.playerPolity) return toast("只能在本国地块任命行政官。");
      if (country.money < 20) return toast("金钱不足。");
      if (!spend("administrative")) return;
      country.money -= 20;
      t.units.push({ id: state.nextUnit++, type:"admin", owner:state.playerPolity });
      log(`${t.name}任命行政官，金钱 -20。`);
      render();
    }

    function actionRoad() {
      const country = activeCountry();
      const t = state.tiles[state.selectedTile];
      if (t.isSea) return toast("海域不能修路。");
      if (t.controller !== state.playerPolity) return toast("道路必须从本国地块开始。");
      if (country.money < 10) return toast("金钱不足。");
      const target = neighbors(t.id).find(n => state.tiles[n].controller === state.playerPolity && !state.tiles[n].isSea && !state.roads.has(roadKey(t.id,n)));
      if (target === undefined) return toast("没有可连接的相邻己方陆地。");
      if (!spend("administrative")) return;
      country.money -= 10;
      state.roads.add(roadKey(t.id,target));
      t.control = clamp(t.control + 10);
      log(`${t.name}修路，邻近度改善，控制力 +10。`);
      render();
    }

    function actionBuild() {
      const country = activeCountry();
      const t = state.tiles[state.selectedTile];
      if (t.isSea) return toast("海域不能建设建筑。");
      if (t.controller !== state.playerPolity) return toast("只能在本国地块建设。");
      if (country.money < 20) return toast("建设需要 20 金钱。");
      let b = "farm";
      if (t.hydro === "coast" && !t.buildings.includes("port")) b = "port";
      else if (["iron","gold","salt"].includes(t.good) && !t.buildings.includes("mine")) b = "mine";
      else if (sumPop(t) >= 7 && !t.buildings.includes("market")) b = "market";
      else if (!t.buildings.includes("fort")) b = "fort";
      if (t.buildings.includes(b)) return toast("此地缺少合适的新建设槽。");
      if (!spend("administrative")) return;
      country.money -= 20;
      t.buildings.push(b);
      if (b === "market") {
        t.dominantEstate = "merchants";
        t.estateHolding = "guildhall";
        adjustEstate("merchants", { satisfaction:8, power:2 }, "兴建市场");
      }
      if (b === "fort") {
        t.dominantEstate = "nobles";
        t.estateHolding = "manor";
        adjustEstate("nobles", { satisfaction:8, power:2 }, "兴建要塞");
      }
      if (b === "monastery") {
        t.dominantEstate = "church";
        t.estateHolding = "church_land";
        adjustEstate("church", { satisfaction:8, power:2 }, "兴建修道院");
      }
      t.estateControl = clamp(t.estateControl + 10);
      t.localDemand = localDemandFor(t);
      log(`${t.name}建设${BUILDINGS[b].label}，产出结构改变。`);
      markTutorialFlag("built");
      render();
    }

    function actionIntegrate() {
      const country = activeCountry();
      const t = state.tiles[state.selectedTile];
      if (t.isSea) return toast("海域不能整合。");
      if (t.controller !== state.playerPolity) return toast("只能整合本国地块。");
      if (!t.units.some(u => u.type === "admin" && u.owner === state.playerPolity)) return toast("需要本国行政官在此地块。");
      if (!spend("administrative")) return;
      const territory = controlledTiles();
      const primaryCulture = dominantValue(territory, tile => tile.culture);
      const primaryReligion = dominantValue(territory, tile => tile.religion);
      const diff = (t.culture !== primaryCulture ? 5 : 0) + (t.religion !== primaryReligion ? 5 : 0);
      t.control = clamp(t.control + 30 - diff);
      t.unrest = Math.max(0, t.unrest - 2);
      if (t.control >= 70) changeLegitimacy(country, 3, "地方整合见效");
      log(`${t.name}整合推进，控制力变为 ${Math.round(t.control)}。`);
      markTutorialFlag("integrated");
      render();
      checkEnd();
    }

    const mapSvg = document.getElementById("mapSvg");
    const gesture = {
      pointers: new Map(),
      lastPoint: null,
      lastCenter: null,
      lastDistance: null,
      moved: false,
      skipClick: false
    };

    mapSvg.addEventListener("wheel", event => {
      event.preventDefault();
      const multiplier = event.deltaMode === WheelEvent.DOM_DELTA_LINE ? 16 : 1;
      if (event.ctrlKey || event.metaKey) {
        const focus = focusFromClient(event.currentTarget, event.clientX, event.clientY);
        setZoom(state.zoom * Math.exp(-event.deltaY * multiplier * 0.0035), focus);
        return;
      }
      const dx = (event.shiftKey ? event.deltaY : event.deltaX) * multiplier;
      const dy = (event.shiftKey ? 0 : event.deltaY) * multiplier;
      const box = event.currentTarget.getBoundingClientRect();
      const viewW = VIEW.w / state.zoom;
      const viewH = VIEW.h / state.zoom;
      panView(dx / box.width * viewW, dy / box.height * viewH);
    }, { passive: false });
    mapSvg.addEventListener("pointerdown", event => {
      if (event.button !== undefined && event.button !== 0) return;
      mapSvg.classList.add("dragging");
      gesture.pointers.set(event.pointerId, { x:event.clientX, y:event.clientY });
      gesture.lastPoint = { x:event.clientX, y:event.clientY };
      gesture.moved = false;
      refreshMultiTouchGesture();
    });
    mapSvg.addEventListener("pointermove", event => {
      if (!gesture.pointers.has(event.pointerId)) return;
      event.preventDefault();
      gesture.pointers.set(event.pointerId, { x:event.clientX, y:event.clientY });
      if (gesture.pointers.size >= 2) {
        event.preventDefault();
        const [a, b] = [...gesture.pointers.values()];
        const center = { x:(a.x + b.x) / 2, y:(a.y + b.y) / 2 };
        const distance = Math.hypot(a.x - b.x, a.y - b.y);
        if (gesture.lastCenter && gesture.lastDistance) {
          const focus = focusFromClient(mapSvg, center.x, center.y);
          setZoom(state.zoom * (distance / gesture.lastDistance), focus);
          panByScreenDelta(center.x - gesture.lastCenter.x, center.y - gesture.lastCenter.y);
          gesture.skipClick = true;
          gesture.moved = true;
        }
        gesture.lastCenter = center;
        gesture.lastDistance = distance;
        return;
      }
      if (gesture.lastPoint) {
        const dx = event.clientX - gesture.lastPoint.x;
        const dy = event.clientY - gesture.lastPoint.y;
        if (Math.hypot(dx, dy) > 4) {
          event.preventDefault();
          panByScreenDelta(dx, dy);
          gesture.skipClick = true;
          gesture.moved = true;
        }
      }
      gesture.lastPoint = { x:event.clientX, y:event.clientY };
    });
    for (const type of ["pointerup", "pointercancel", "pointerleave"]) {
      mapSvg.addEventListener(type, event => {
        gesture.pointers.delete(event.pointerId);
        if (gesture.pointers.size === 0) {
          mapSvg.classList.remove("dragging");
          gesture.lastPoint = null;
          gesture.lastCenter = null;
          gesture.lastDistance = null;
          if (gesture.moved) setTimeout(() => { gesture.skipClick = false; }, 0);
          gesture.moved = false;
        } else {
          refreshMultiTouchGesture();
        }
      });
    }
    mapSvg.ondblclick = () => {
      state.zoom = 1;
      state.viewCenter = { x: VIEW.w / 2, y: VIEW.h / 2 };
      applyZoomViewBox();
      renderZoom();
    };

    function refreshMultiTouchGesture() {
      if (gesture.pointers.size < 2) {
        gesture.lastCenter = null;
        gesture.lastDistance = null;
        return;
      }
      const [a, b] = [...gesture.pointers.values()];
      gesture.lastCenter = { x:(a.x + b.x) / 2, y:(a.y + b.y) / 2 };
      gesture.lastDistance = Math.hypot(a.x - b.x, a.y - b.y);
    }

    /* ================= 游戏层（P0/P1）：因果·情势·阶梯·目标·AI ================= */

    function pushWorldEvent(world, text, kind = "world", chain = null) {
      world.worldEvents.unshift({ turn: world.turn, kind, text, chain });
      world.worldEvents = world.worldEvents.slice(0, 40);
    }

    function pushChronicle(country, type, text) {
      country.chronicle.push({ turn: state.turn, type, text });
      if (country.chronicle.length > 80) country.chronicle.shift();
    }

    function changeLegitimacy(country, amount, reason) {
      if (!amount) return;
      const before = country.legitimacy;
      country.legitimacy = clamp(country.legitimacy + amount, 0, 100);
      const applied = Math.round((country.legitimacy - before) * 10) / 10;
      if (!applied) return;
      if (country.report) country.report.legitimacy.push({ amount: applied, reason });
      if (!country.echoLog) country.echoLog = [];
      country.echoLog.unshift({ turn: state?.turn || 0, kind: "legitimacy", label: "合法性", reason, amount: applied });
      country.echoLog = country.echoLog.slice(0, 30);
      if (country.name === state.playerPolity && Math.abs(applied) >= 3) {
        addCountryLog(country.name, `合法性${applied > 0 ? "+" : ""}${applied}：${reason}。`);
      }
    }

    function beginCountryReport(country) {
      country.report = {
        turn: state.turn,
        foodParts: [], moneyParts: [], militaryParts: [],
        legitimacy: [], estates: [], events: [],
        food: 0, money: 0, military: 0
      };
    }

    function estateStageInfo(satisfaction) {
      if (satisfaction <= -75) return { level: 3, label: "公开对抗", color: "#8e3f37" };
      if (satisfaction <= -55) return { level: 2, label: "抗争", color: "#a45d4b" };
      if (satisfaction <= -30) return { level: 1, label: "不满", color: "#b47a4c" };
      if (satisfaction >= 40) return { level: -1, label: "拥戴", color: "#4d8569" };
      return { level: 0, label: "安定", color: "#699678" };
    }

    function estateKindPenalty(country) {
      const factor = { food: 1, money: 1, military: 1 };
      let legitimacyDrain = 0;
      const causes = [];
      for (const [key, estate] of Object.entries(country.estates)) {
        const stage = estateStageInfo(estate.satisfaction);
        if (stage.level <= 0) continue;
        const kind = canonicalEstateKind(key);
        const mult = stage.level === 1 ? .85 : stage.level === 2 ? .7 : .5;
        if (kind === "peasants") { factor.food = Math.min(factor.food, mult); causes.push(`${estate.label}${stage.label}：粮食产出 ×${mult}`); }
        else if (kind === "merchants") { factor.money = Math.min(factor.money, mult); causes.push(`${estate.label}${stage.label}：金钱产出 ×${mult}`); }
        else if (kind === "nobles") { factor.military = Math.min(factor.military, mult); causes.push(`${estate.label}${stage.label}：军需产出 ×${mult}`); }
        else if (kind === "church") { legitimacyDrain += stage.level; causes.push(`${estate.label}${stage.label}：合法性每季 -${stage.level}`); }
      }
      return { factor, legitimacyDrain, causes };
    }

    function applyQuarterModifiers(country) {
      const kept = [];
      for (const mod of country.modifiers) {
        if (mod.food) { country.food += mod.food; country.report?.foodParts.push({ label: mod.label, amount: mod.food }); }
        if (mod.money) { country.money += mod.money; country.report?.moneyParts.push({ label: mod.label, amount: mod.money }); }
        if (mod.military) { country.military += mod.military; country.report?.militaryParts.push({ label: mod.label, amount: mod.military }); }
        if (mod.explore && country.exploration) country.exploration.points += mod.explore;
        mod.quarters -= 1;
        if (mod.quarters > 0) kept.push(mod);
        else if (country.name === state.playerPolity) addCountryLog(country.name, `${mod.label}效果结束。`);
      }
      country.modifiers = kept;
    }

    function hasModifier(country, key) {
      return country.modifiers.some(mod => mod.key === key);
    }

    function publicMorale(country) {
      const entries = Object.values(country.estates);
      const totalPower = entries.reduce((sum, e) => sum + e.power, 0) || 1;
      const weighted = entries.reduce((sum, e) => sum + e.satisfaction * e.power, 0) / totalPower;
      return Math.round(clamp(50 + weighted / 2, 0, 100));
    }

    function snapshotTrends(world) {
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country) continue;
        country.trend.push({
          turn: world.turn,
          food: country.food, money: country.money, military: country.military,
          legitimacy: country.legitimacy, morale: publicMorale(country)
        });
        if (country.trend.length > 9) country.trend.shift();
      }
    }

    function trendDelta(country, key) {
      if (!country.trend.length) return 0;
      const base = country.trend[Math.max(0, country.trend.length - 4)];
      const latest = { food: country.food, money: country.money, military: country.military, legitimacy: country.legitimacy, morale: publicMorale(country) };
      return Math.round(latest[key] - base[key]);
    }


    /* ===== 历史因果引擎 · 转折层：纪元状态机 ===== */

    const ERAS = [
      { key: "feudal", label: "封建纪元",
        rules: ["封建征召与教会权威构成秩序的骨架", "黑死病、战争财政与商路动荡正在松动基石"] },
      { key: "discovery", label: "发现纪元",
        rules: ["远洋探索与新航线开始改写贸易格局", "火药与活字印刷沿商路扩散", "采纳进步是政治决策：总有人要为新时代买单"] },
      { key: "faith", label: "信仰纪元",
        rules: ["新教信仰沿印刷与不满扩散，改宗地图每局不同", "跨信仰战争的门槛大幅降低", "镇压、宽容或改宗国教——每条路都有人买单"] },
      { key: "absolutism", label: "王权纪元",
        rules: ["大和会确立的主权规则约束列国", "常备军与财政国家成为军备竞赛的入场券", "启蒙思想开始在城市与印刷机之间流动"] },
      { key: "revolution", label: "革命纪元",
        rules: ["财政破产与思想渗透的合流即是革命", "革命会跨越国境传染", "镇压只能延迟，改革才能疏导"] },
      { key: "industrial", label: "工业纪元",
        rules: ["蒸汽机重写产出曲线：大分流开始", "采纳者与旁观者的差距将逐年拉大", "这是终局纪元——为你的国家立传吧"] }
    ];

    function currentEra(world = state) {
      return ERAS[world.eraIndex || 0];
    }

    function eraAtLeast(key, world = state) {
      return (world.eraIndex || 0) >= ERAS.findIndex(era => era.key === key);
    }

    function advanceEra(world, key, chain) {
      const index = ERAS.findIndex(era => era.key === key);
      if (index <= (world.eraIndex || 0)) return;
      world.eraIndex = index;
      const era = ERAS[index];
      for (const route of TRADE_ROUTES) {
        if (route.unlockEra === key && route.locked) {
          route.locked = false;
          route.weight = 60;
          pushWorldEvent(world, `${route.label}开通：城市化的西欧吃上了东欧庄园的谷物`, "trade", [
            "西欧的城市越来越多张嘴，本地田地喂不饱它们",
            "东欧的再版农奴制庄园恰好有粮可卖",
            "但泽的粮船与厄勒海峡的关税，成了波罗的海新的心跳"
          ]);
        }
      }
      pushWorldEvent(world, `纪元更替：${era.label}开启`, "era", chain);
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        country.report?.events.push(`${era.label}开启`);
      }
      const player = world.countries[world.playerPolity];
      if (player) pushChronicle(player, "era", `${calendarLabel(world.turn)}：${era.label}开启`);
      let extra = [];
      if (key === "industrial") {
        const board = playableCountries(world)
          .map(polity => ({ polity, score: Math.round((world.countries[polity]?.money || 0) + (world.countries[polity]?.technology.steamEngine ? 400 : 0)) }))
          .sort((a, b) => b.score - a.score)
          .slice(0, 5);
        extra = ["—— 大分流榜 ——", ...board.map((entry, i) => `${i + 1}. ${entry.polity}（${entry.score}）`)];
      }
      world.pendingTransition = {
        title: `纪元更替 · ${era.label}`,
        sub: calendarLabel(world.turn),
        chain: [...chain, "—— 新纪元的规则 ——", ...era.rules, ...extra]
      };
    }

    function checkEras(world) {
      const era = currentEra(world);
      if (era.key === "feudal") {
        const shipsAndSails = playableCountries(world).filter(p => world.countries[p]?.technology.oceanGoingShips).length;
        const milestones = playableCountries(world).reduce((sum, p) => sum + (world.countries[p]?.exploration.done.length || 0), 0);
        if (world.flags.constantinopleFallen) {
          advanceEra(world, "discovery", [
            "君士坦丁堡的陷落抬高了整个旧商路的成本",
            "绕过旧世界，从念头变成了国策",
            "火药证明了城墙的极限，印刷正在证明抄经房的极限"
          ]);
        } else if (shipsAndSails >= 1 && milestones >= 2) {
          advanceEra(world, "discovery", [
            "即使君士坦丁堡仍在，东方商路的成本也养肥了所有中间人",
            "大西洋的船队已经用里程碑证明：绕过他们是可能的",
            "求知与集权的时代由航海家而非征服者揭幕"
          ]);
        }
      } else if (era.key === "faith") {
        if (world.flags.peaceOfFaith) {
          advanceEra(world, "absolutism", [
            "精疲力竭的列国在和会上承认：信仰无法用火与剑统一",
            "主权、条约与常驻使节成为新的国际语言",
            "下一场竞赛是常备军与国库的竞赛"
          ]);
        }
      } else if (era.key === "absolutism") {
        if (world.flags.firstRevolution) {
          advanceEra(world, "revolution", [
            "破产的财政遇上了启蒙的小册子",
            "第一场革命已经爆发，而思想不需要护照",
            "每一顶王冠都开始重新计算自己的合法性"
          ]);
        }
      } else if (era.key === "revolution") {
        const steam = playableCountries(world).filter(p => world.countries[p]?.technology.steamEngine).length;
        if (steam >= 3) {
          advanceEra(world, "industrial", [
            "蒸汽机从奇技淫巧变成了国力的倍率",
            "采纳它的国家与没有采纳的国家，从此不在同一条曲线上",
            "大分流开始了"
          ]);
        }
      }
      // faith 纪元入口由宗教改革情势触发（见 processConditionalSituations）
    }

    /* ===== 历史因果引擎 · 转折层：战略驱动与条件情势 ===== */

    const STRATEGIC_DRIVES = {
      "奥斯曼贝伊国": {
        victim: "拜占庭帝国",
        targetCity: "君士坦丁堡",
        warName: "海峡之战",
        minYear: 1389,
        minTiles: 7,
        ratio: 1.25,
        doneFlag: "constantinopleFallen",
        chain: [
          "奥斯曼的战士阶层需要新的征服与战利品",
          "博斯普鲁斯两岸的关税与威望无可替代",
          "第二罗马的城墙之后，是整个东方贸易的钥匙"
        ]
      }
    };

    function aiStrategicWar(world, polity, country) {
      const drive = STRATEGIC_DRIVES[polity];
      if (!drive || world.flags[drive.doneFlag]) return false;
      const victim = world.countries[drive.victim];
      if (!victim || victim.eliminated) return false;
      if (areAtWar(polity, drive.victim, world)) return false;
      if (world.diplomacy.truces.some(t => t.parties.includes(polity) && t.parties.includes(drive.victim) && world.turn < t.endsTurn)) return false;
      const year = calendarForTurn(world.turn).year;
      const tiles = controlledTiles(polity, world).length;
      if (!(year >= drive.minYear || (year >= drive.minYear - 19 && tiles >= drive.minTiles + 7))) return false;
      if (countryStrength(drive.victim, world) * drive.ratio > countryStrength(polity, world)) return false;
      const targetTile = world.tiles.find(t => t.city === drive.targetCity && t.controller === drive.victim);
      if (!targetTile) return false;
      world.diplomacy.wars.push({
        id: `war-${world.diplomacy.nextId++}`,
        name: drive.warName,
        attackers: [polity],
        defenders: [drive.victim],
        warLeaderAttack: polity,
        warLeaderDefense: drive.victim,
        primaryGoal: { tileId: targetTile.id, label: `夺取${drive.targetCity}`, claimant: polity },
        secondaryDemands: [],
        startedTurn: world.turn,
        truceUntilTurn: null,
        score: 0,
        participants: {
          [polity]: { side: "attacker", contribution: 0, warWill: 92 },
          [drive.victim]: { side: "defender", contribution: 0, warWill: 88 }
        }
      });
      const view = relationView(drive.victim, polity, world);
      view.threat = clamp(view.threat + 35);
      pushWorldEvent(world, `${polity}向${drive.victim}宣战：剑指${drive.targetCity}`, "war", drive.chain);
      addCountryLog(polity, `发动${drive.warName}。`, world);
      addCountryLog(drive.victim, `${polity}的大军压向${drive.targetCity}！`, world);
      pushChronicle(world.countries[drive.victim], "battle", `${calendarLabel(world.turn)}：${polity}兵临${drive.targetCity}`);
      if (drive.victim === world.playerPolity || polity === world.playerPolity) {
        toast(`${drive.warName}爆发！`);
      }
      return true;
    }

    /* ===== 历史因果引擎 · 流层：人口流（劳力分岔） ===== */

    function laborStructure(polity, world = state) {
      const tiles = controlledTiles(polity, world);
      if (!tiles.length) return { west: 0, east: 0 };
      const west = tiles.filter(t => (t.pop.burghers || 0) >= 2 || t.control < 50).length / tiles.length;
      const east = tiles.filter(t => canonicalEstateKind(t.dominantEstate) === "nobles" && t.estateControl >= 45).length / tiles.length;
      return { west, east };
    }

    function setLaw(country, lawKey, value) {
      if (country.government && country.government.laws) country.government.laws[lawKey] = value;
    }

    function applyLaborPath(world, country, path) {
      if (country.laborSettled) return;
      country.laborSettled = path;
      setLaw(country, "land", path === "free" ? "自由农地" : "再版农奴制");
      if (path === "free") {
        adjustEstateForCountry(country, "peasants", { satisfaction: 12 }, "劳役松动");
        adjustEstateForCountry(country, "nobles", { satisfaction: -8, power: -4 }, "庄园劳役难以为继");
        country.modifiers.push({ key: "labor_free", label: "自由劳力·人口恢复", quarters: 16, food: 6 });
        pushChronicle(country, "era", `${calendarLabel(world.turn)}：大疫之后，农奴制开始松动`);
        pushWorldEvent(world, `${country.name}：劳力稀缺让农民第一次有了议价权，劳役正在松动`, "era", [
          "黑死病带走了三成劳力，空出的田地在等人耕种",
          "逃往城市的农民找得到工钱，留下的农民敢于谈条件",
          "领主们咒骂着提高了工钱——西欧式的自由劳力之路由此开始"
        ]);
      } else {
        adjustEstateForCountry(country, "nobles", { satisfaction: 10, power: 6 }, "再版农奴制");
        adjustEstateForCountry(country, "peasants", { satisfaction: -12 }, "被锁进庄园的世代");
        country.modifiers.push({ key: "labor_serf", label: "庄园谷物", quarters: 16, food: 10 });
        for (const tile of controlledTiles(country.name, world)) tile.control = clamp(tile.control + 4);
        pushChronicle(country, "era", `${calendarLabel(world.turn)}：以法令把农民锁回庄园`);
        pushWorldEvent(world, `${country.name}：领主们用法令应对劳力稀缺——再版农奴制确立`, "era", [
          "黑死病带走了三成劳力，领主的庄园同样缺人",
          "但这里的贵族足够强，强到可以用法令禁止农民离开",
          "谷物将源源外运，而东欧式的再版农奴制也由此埋下长债"
        ]);
      }
    }

    function majorityReligion(polity, world = state) {
      return dominantValue(controlledTiles(polity, world), t => t.religion);
    }

    function convertedShare(polity, world = state) {
      const tiles = controlledTiles(polity, world);
      if (!tiles.length) return 0;
      return tiles.filter(t => t.religion === "新教").length / tiles.length;
    }

    function fireReformation(world) {
      world.flags.reformation = true;
      const seeds = world.tiles.filter(t => !t.isSea && t.name === "萨克森").slice(0, 2);
      for (const tile of seeds) {
        tile.religion = "新教";
        tile.unrest += 1;
      }
      const chain = [
        "印刷机让每个识字者都读到了对教廷的控诉",
        "积怨已久的诸侯与市民在新教义里找到了旗帜",
        `${seeds.length ? seeds[0].name : "神圣罗马帝国腹地"}率先改宗，火种正沿商路与邻壤蔓延`,
        "每个君主都要回答：镇压、宽容，还是干脆改宗国教？"
      ];
      pushWorldEvent(world, "宗教改革爆发：新教义点燃了旧世界", "era", chain);
      world.situations.push({ key: "reformation", index: 0, phase: "active", label: "宗教改革", sinceTurn: world.turn, data: {} });
      advanceEra(world, "faith", chain);
      world.eraFaithStart = world.turn;
    }

    function processReformation(world) {
      if (!world.flags.reformation) return;
      const budget = {};
      for (const tile of world.tiles) {
        if (tile.isSea || tile.religion !== "天主教") continue;
        const country = world.countries[tile.controller];
        if (!country || country.eliminated) continue;
        if ((budget[tile.controller] || 0) >= 2) continue;
        const printing = country.technology.printing ? 2 : 0;
        const urban = (tile.pop.burghers || 0) >= 3 ? 1 : 0;
        const churchKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "church");
        const sat = churchKey ? country.estates[churchKey].satisfaction : 0;
        const discontent = sat <= -15 ? 2 : sat <= 0 ? 1 : 0;
        const sameRealm = id => !world.flags.peaceOfFaith || world.tiles[id].controller === tile.controller;
        const neighborConverted = worldNeighbors(world, tile.id).some(id => world.tiles[id].religion === "新教" && sameRealm(id)) ? 2 : 0;
        const score = printing + urban + discontent + neighborConverted;
        if (score >= 4) {
          tile.religion = "新教";
          tile.unrest += 1;
          budget[tile.controller] = (budget[tile.controller] || 0) + 1;
          country.report?.events.push(`${tile.city || tile.name}改宗新教`);
          if (tile.controller === world.playerPolity) {
            addCountryLog(tile.controller, `${tile.city || tile.name}的市民接受了新教义。`, world);
          }
        }
      }
    }

    function processConditionalSituations(world) {
      if (!world.flags.reformation && eraAtLeast("discovery", world)) {
        const year = calendarForTurn(world.turn).year;
        const printers = playableCountries(world).filter(p => world.countries[p]?.technology.printing).length;
        if (year >= 1455 && printers >= 3) {
          const aggrieved = playableCountries(world).some(polity => {
            const country = world.countries[polity];
            if (!country || country.eliminated || controlledTiles(polity, world).length < 4) return false;
            if (majorityReligion(polity, world) !== "天主教") return false;
            const churchKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "church");
            return churchKey && country.estates[churchKey].satisfaction <= -10;
          });
          if (aggrieved) fireReformation(world);
        }
      }
      if (currentEra(world).key === "faith" && !world.flags.peaceOfFaith) {
        const elapsed = world.turn - (world.eraFaithStart || world.turn);
        if ((world.faithWarCount >= 2 && elapsed >= 24) || elapsed >= 70) {
          world.flags.peaceOfFaith = true;
          for (const war of [...world.diplomacy.wars]) {
            if (!war.participants) continue;
            const a = war.warLeaderAttack, d = war.warLeaderDefense;
            if (majorityReligion(a, world) !== majorityReligion(d, world)) {
              const parties = [...new Set([...war.attackers, ...war.defenders])];
              world.diplomacy.wars = world.diplomacy.wars.filter(item => item.id !== war.id);
              world.diplomacy.truces.push({ id: `truce-${world.diplomacy.nextId++}`, parties, startsTurn: world.turn, endsTurn: world.turn + 28 });
            }
          }
          const chain = [
            "几代人的信仰战争耗尽了每一座国库与每一代壮丁",
            "精疲力竭的列国坐到了同一张谈判桌前",
            "和会立下三条新规：",
            "一、教随国定——君主有权决定本国信仰，外力不得干涉",
            "二、条约神圣——单方面毁约者将付出加倍的信誉代价",
            "三、常驻使节——列国外交容量 +1，谈判取代征伐成为常态"
          ];
          pushWorldEvent(world, "诸国和会落幕：主权时代的规则诞生了", "era", chain);
          world.situations.push({ key: "peace_congress", index: 0, phase: "done", label: "诸国和会", sinceTurn: world.turn, data: {} });
          const reformationRecord = world.situations.find(sit => sit.key === "reformation" && sit.phase === "active");
          if (reformationRecord) reformationRecord.phase = "done";
        }
      }
      if (!world.flags.constantinopleFallen) {
        const tile = world.tiles.find(t => t.city === "君士坦丁堡");
        if (tile && tile.controller !== "拜占庭帝国") {
          world.flags.constantinopleFallen = true;
          world.flags.discoveryImpulse = true;
          const conqueror = tile.controller;
          if (world.trade) {
            world.trade.shock = { until: world.turn + 12, routes: ["levant", "blacksea"], add: .5, label: "君堡易主动荡" };
          }
          const chain = [

    /* ===== 历史因果引擎 · 流层：进步扩散 ===== */

    const ADVANCES = {
