<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23243335'/%3E%3Cpath d='M32 8 39 25 57 25 43 36 48 56 32 44 16 56 21 36 7 25 25 25Z' fill='%23d6bd78'/%3E%3C/svg%3E">
  <title>帝国的代价 Demo2 - 游戏层版</title>
  <style>
    :root {
      --ink: #1f211b;
      --paper: #efe3c6;
      --panel: #fff7e3;
      --line: #493f2c;
      --sea: #86b1bd;
      --sea2: #6f9eac;
      --player: #1f6672;
      --enemy: #9a4433;
      --gold: #c99a31;
      --dark: #243335;
      --shadow: rgba(31, 32, 26, .24);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(rgba(20, 16, 10, .16), rgba(20, 16, 10, .22)),
        url("../../assets/age-of-discovery-portolan-wallpaper.png") center / cover no-repeat fixed,
        #2b2116;
      color: var(--ink);
      font-family: "Songti SC", "STSong", "Noto Serif SC", Georgia, serif;
    }

    button { font: inherit; color: inherit; }

    .app {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .board {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .topbar {
      position: fixed;
      z-index: 6;
      top: 84px;
      left: 50%;
      transform: translateX(-50%);
      min-width: min(420px, calc(100vw - 440px));
      padding: 10px 16px;
      border: 1px solid rgba(239,227,198,.36);
      background: linear-gradient(180deg, rgba(32,43,42,.92), rgba(23,30,29,.88));
      color: #f5edce;
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
      text-align: center;
      pointer-events: none;
    }

    h1 {
      margin: 0;
      font-size: 27px;
      line-height: 1;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 5px;
      font-size: 13px;
      color: #d6c28d;
    }

    .command-points {
      display: grid;
      grid-template-columns: repeat(3, minmax(42px, 1fr));
      gap: 4px;
    }

    .command-point {
      min-width: 0;
      padding: 4px 6px;
      border: 1px solid rgba(239,227,198,.24);
      background: rgba(255,247,227,.08);
      text-align: center;
    }

    .command-point small,
    .command-point strong {
      display: block;
    }

    .command-point small {
      color: #d6c28d;
      font-size: 9px;
    }

    .command-point strong {
      color: #fff7e3;
      font-size: 17px;
      line-height: 1.05;
    }

    .map-shell {
      position: fixed;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 54%, rgba(126,168,181,.16), transparent 50%),
        rgba(39, 48, 44, .2);
    }

    .modebar {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .zoombar {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .modebtn {
      min-width: 74px;
      min-height: 34px;
      border: 1px solid rgba(239,227,198,.34);
      background: rgba(248,236,201,.92);
      font-weight: 900;
      cursor: pointer;
    }

    .modebtn.active {
      background: #223a3d;
      color: #fff7e3;
      border-color: #d6bd78;
    }

    .zoombtn {
      width: 34px;
      height: 34px;
      border: 1px solid rgba(239,227,198,.34);
      background: rgba(248,236,201,.92);
      font-weight: 900;
      cursor: pointer;
    }

    .zoomread {
      min-width: 58px;
      text-align: center;
      font-weight: 900;
      font-size: 13px;
      color: #f5edce;
    }

    svg {
      display: block;
      width: 100vw;
      height: 100vh;
      background: rgba(126,168,181,.22);
      cursor: grab;
      touch-action: none;
      user-select: none;
    }

    svg.dragging {
      cursor: grabbing;
    }

    .map-fog {
      fill: rgba(38, 28, 16, .34);
      pointer-events: none;
    }

    .map-base {
      fill: rgba(126, 168, 181, .86);
      pointer-events: none;
    }

    .coastline {
      fill: rgba(236, 220, 171, .42);
      stroke: rgba(73,63,44,.45);
      stroke-width: 1.4;
      pointer-events: none;
      display: none;
    }

    .hex {
      stroke: rgba(50,44,31,.26);
      stroke-width: .75;
      cursor: pointer;
      transition: filter .12s ease, stroke-width .12s ease;
    }

    .hex:hover { filter: brightness(1.12); stroke-width: 1.8; }
    .hex.selected { stroke: #123f49; stroke-width: 4.6; }
    .hex.reach { stroke: #fff0a4; stroke-width: 3.4; }
    .hex.player { stroke: #f0ce68; stroke-width: 1.65; }
    .hex.enemy { stroke: rgba(154,68,51,.82); stroke-width: 1.15; }
    .hex.neutral { stroke-dasharray: 4 5; }
    .hex.sea { stroke: rgba(35,51,55,.18); }
    .hex.sieged { stroke: #7a3d2e; stroke-width: 2; stroke-dasharray: 2 3; }
    .hex.occupied { stroke: #2f1714; stroke-width: 2.2; stroke-dasharray: 3 2; }

    .hex-label {
      pointer-events: none;
      text-anchor: middle;
      font-size: 9.5px;
      font-weight: 900;
      fill: #201f19;
      paint-order: stroke;
      stroke: rgba(255,247,227,.92);
      stroke-width: 3.2;
      stroke-linejoin: round;
    }

    .hex-label.sea-text {
      fill: #173840;
      stroke: rgba(205,232,235,.72);
    }

    .city-dot {
      pointer-events: none;
      fill: #2b261a;
      stroke: rgba(255,247,227,.94);
      stroke-width: 2;
    }

    .capital-star {
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: central;
      font-size: 20px;
      font-weight: 900;
      fill: #f3c94f;
      paint-order: stroke;
      stroke: #2b261a;
      stroke-width: 3.4;
      stroke-linejoin: round;
    }

    .unit {
      cursor: pointer;
      stroke: #2b261a;
      stroke-width: 1.8;
    }

    .unit.active { stroke: #fff2a8; stroke-width: 4.4; }

    .unit-text {
      pointer-events: none;
      text-anchor: middle;
      dominant-baseline: central;
      font-size: 12px;
      font-weight: 900;
      fill: #201f19;
    }

    .road {
      stroke: #6d5133;
      stroke-width: 4;
      stroke-linecap: round;
      opacity: .8;
      pointer-events: none;
    }

    .label-major {
      pointer-events: none;
      font-size: 20px;
      font-weight: 900;
      fill: rgba(34, 32, 25, .22);
      letter-spacing: 0;
      text-anchor: middle;
      paint-order: stroke;
      stroke: rgba(255,247,227,.34);
      stroke-width: 4;
    }

    .legend {
      max-width: min(520px, calc(100vw - 360px));
      max-height: 82px;
      overflow: auto;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px;
      border: 1px solid rgba(239,227,198,.28);
      background: rgba(18,25,24,.74);
      color: #f5edce;
      font-size: 12px;
    }

    .legend.collapsed {
      display: none;
    }

    .legend-toggle {
      min-height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(239,227,198,.34);
      background: rgba(248,236,201,.92);
      font-weight: 900;
      cursor: pointer;
    }

    .sw {
      width: 12px;
      height: 12px;
      display: inline-block;
      border: 1px solid #3b3323;
      vertical-align: -2px;
      margin-right: 4px;
    }

    .hud-left {
      position: fixed;
      z-index: 8;
      top: 14px;
      left: 14px;
      display: flex;
      flex-wrap: nowrap;
      gap: 6px;
      max-width: min(520px, calc(100vw - 560px));
      overflow-x: auto;
      scrollbar-width: none;
      padding: 7px;
      border: 1px solid rgba(239,227,198,.34);
      background: linear-gradient(180deg, rgba(29,40,39,.94), rgba(18,25,24,.9));
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
    }

    .hud-left::-webkit-scrollbar {
      display: none;
    }

    .hud-tab, .drawer-close {
      border: 1px solid rgba(239,227,198,.32);
      background: rgba(248,236,201,.9);
      font-weight: 900;
      cursor: pointer;
    }

    .hud-tab {
      min-width: 52px;
      min-height: 34px;
      padding: 0 8px;
    }

    .player-country-flag {
      flex: 0 0 48px;
      width: 48px;
      height: 34px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,247,227,.72);
      box-shadow:
        inset 0 0 0 2px rgba(0,0,0,.18),
        0 4px 12px rgba(0,0,0,.28);
      color: #fff7e3;
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      text-shadow: 0 1px 3px rgba(0,0,0,.82);
      cursor: pointer;
    }

    .player-country-flag:hover,
    .player-country-flag:focus-visible {
      outline: 2px solid #f1d98e;
      outline-offset: 2px;
    }

    .hud-tab.active {
      background: #223a3d;
      color: #fff7e3;
      border-color: #d6bd78;
    }

    .hud-resources {
      position: fixed;
      z-index: 8;
      top: 14px;
      right: 14px;
      width: min(520px, calc(100vw - 390px));
      min-width: 420px;
      border: 1px solid rgba(239,227,198,.34);
      background: linear-gradient(180deg, rgba(29,40,39,.94), rgba(18,25,24,.9));
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
      color: #f5edce;
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: stretch;
    }

    .army-drawer {
      position: fixed;
      z-index: 9;
      top: 88px;
      right: 14px;
      width: min(420px, calc(100vw - 28px));
      max-height: min(590px, calc(100vh - 112px));
      border: 1px solid rgba(239,227,198,.38);
      background: rgba(255,247,227,.97);
      box-shadow: 0 22px 46px rgba(0,0,0,.34);
      transform: translateX(calc(100% + 28px));
      transition: transform .2s cubic-bezier(.16,1,.3,1);
      overflow: hidden;
    }

    .army-drawer.open {
      transform: translateX(0);
    }

    .army-drawer-head {
      min-height: 54px;
      padding: 10px 52px 10px 12px;
      display: grid;
      align-content: center;
      gap: 2px;
      color: #f5edce;
      background: linear-gradient(180deg, rgba(38,51,49,.98), rgba(24,32,31,.96));
      border-bottom: 1px solid rgba(101,80,45,.5);
    }

    .army-drawer-head strong {
      font-size: 16px;
    }

    .army-drawer-head small {
      color: #d6c28d;
    }

    .army-drawer-body {
      max-height: calc(100vh - 166px);
      padding: 12px;
      overflow: auto;
    }

    #armyDrawerClose {
      position: absolute;
      z-index: 2;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
    }

    .army-route {
      padding: 9px 10px;
      border: 1px solid rgba(101,80,45,.28);
      background: rgba(239,227,198,.55);
      font-size: 12px;
      line-height: 1.45;
    }

    .action-points-wrap {
      display: grid;
      grid-template-columns: auto;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-right: 1px solid rgba(239,227,198,.22);
      font-size: 11px;
      color: #d6c28d;
      font-weight: 900;
    }

    .map-controls {
      position: fixed;
      z-index: 8;
      right: 14px;
      bottom: 14px;
      display: grid;
      gap: 8px;
      justify-items: end;
      padding: 8px;
      border: 1px solid rgba(239,227,198,.34);
      background: linear-gradient(180deg, rgba(29,40,39,.94), rgba(18,25,24,.9));
      box-shadow: 0 12px 28px rgba(0,0,0,.32);
    }

    .drawer {
      position: fixed;
      z-index: 7;
      top: 64px;
      left: 14px;
      width: min(392px, calc(100vw - 28px));
      max-height: calc(100vh - 92px);
      display: grid;
      grid-template-rows: auto 1fr;
      border: 1px solid rgba(239,227,198,.38);
      background: rgba(255,247,227,.95);
      box-shadow: 0 22px 46px rgba(0,0,0,.34);
      transform: translateX(calc(-100% - 28px));
      transition: transform .18s ease;
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 2px solid var(--line);
      background: #d8bd7d;
    }

    .drawer-close {
      width: 34px;
      height: 34px;
      background: #fff0c8;
      font-size: 20px;
      line-height: 1;
    }

    .drawer-pane {
      display: none;
      overflow: auto;
      padding: 12px;
      min-height: 0;
    }

    .drawer-pane.active {
      display: block;
    }

    .event-list {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .event-item {
      border: 1px solid rgba(73,63,43,.65);
      background: #f8ecc9;
      padding: 8px;
    }

    .panel-stack {
      display: grid;
      gap: 10px;
    }

    .mini-card {
      border: 1px solid rgba(73,63,43,.64);
      background: #f8ecc9;
      padding: 9px;
      display: grid;
      gap: 7px;
      font-size: 13px;
    }

    .mini-card h3 {
      margin: 0;
      font-size: 15px;
      line-height: 1.15;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }

    .stat-box {
      border: 1px solid rgba(73,63,43,.44);
      background: rgba(255,247,227,.72);
      padding: 7px;
      min-width: 0;
    }

    .stat-box small {
      display: block;
      font-size: 11px;
      color: #685335;
      font-weight: 900;
    }

    .stat-box strong {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .meter {
      height: 10px;
      border: 1px solid rgba(73,63,43,.58);
      background: rgba(63,49,29,.18);
      overflow: hidden;
    }

    .meter span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #b07a42, #d9bd52);
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .chip {
      border: 1px solid rgba(73,63,43,.48);
      background: rgba(255,247,227,.72);
      padding: 3px 6px;
      font-size: 12px;
      font-weight: 900;
    }

    .decision-card {
      border: 1px solid rgba(73,63,43,.64);
      background: #f8ecc9;
      padding: 9px;
      display: grid;
      gap: 7px;
    }

    .decision-card.locked {
      opacity: .72;
    }

    .decision-card button,
    .mini-card button {
      min-height: 34px;
      border: 1px solid var(--line);
      background: #fff0c8;
      font-weight: 900;
      cursor: pointer;
    }

    .decision-card button:disabled,
    .mini-card button:disabled {
      cursor: not-allowed;
      opacity: .5;
    }

    .actions {
      padding: 0;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .action, .primary, .ghost {
      border: 2px solid var(--line);
      background: #fff0c8;
      box-shadow: 0 4px 0 #735d32;
      font-weight: 900;
      cursor: pointer;
    }

    .action {
      min-height: 56px;
      line-height: 1.14;
      font-size: 14px;
    }

    .action:disabled {
      opacity: .44;
      cursor: not-allowed;
    }

    .resources {
      display: flex;
      flex-wrap: nowrap;
      gap: 4px;
      padding: 5px;
    }
    .resources .res { flex: 1 1 0; text-align: center; }

    .res {
      border: 1px solid rgba(239,227,198,.24);
      background: rgba(255,247,227,.08);
      padding: 3px 5px;
      min-width: 0;
    }

    .res small {
      display: block;
      color: #d6c28d;
      font-size: 10px;
      white-space: nowrap;
    }

    .res strong {
      font-size: 15px;
      line-height: 1.05;
      color: #fff7e3;
    }

    .panel {
      padding: 12px;
      border-bottom: 2px solid var(--line);
      background: var(--panel);
    }

    h2 {
      margin: 0 0 9px;
      font-size: 18px;
      letter-spacing: 0;
    }

    .tile-card {
      display: grid;
      gap: 8px;
      font-size: 13px;
    }

    .tile-drawer {
      position: fixed;
      z-index: 7;
      left: 14px;
      bottom: 14px;
      width: min(464px, calc(100vw - 28px));
      max-height: min(600px, calc(100vh - 96px));
      display: block;
      border: 1px solid rgba(239,227,198,.38);
      background: rgba(255,247,227,.96);
      box-shadow: 0 22px 46px rgba(0,0,0,.34);
      transform: translateY(calc(100% + 28px));
      transition: transform .18s ease;
      overflow: hidden;
    }

    .tile-drawer.open {
      transform: translateY(0);
    }

    .tile-drawer-body {
      overflow: auto;
      max-height: inherit;
    }

    #tileDrawerClose {
      position: absolute;
      z-index: 4;
      top: 8px;
      right: 8px;
      box-shadow: 0 6px 16px rgba(0,0,0,.28);
    }

    .tile-hero {
      position: relative;
      min-height: 154px;
      padding: 14px;
      color: #fff7e3;
      background-size: cover;
      background-position: center;
      display: grid;
      align-content: end;
      overflow: hidden;
    }

    .tile-hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(17,22,20,.78), rgba(17,22,20,.38) 62%, rgba(17,22,20,.16)),
        linear-gradient(180deg, rgba(17,22,20,.1), rgba(17,22,20,.72));
      pointer-events: none;
    }

    .tile-hero-content {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 8px;
    }

    .tile-title {
      font-size: 24px;
      font-weight: 900;
      line-height: 1.08;
      paint-order: stroke;
      text-shadow: 0 2px 10px rgba(0,0,0,.55);
    }

    .tile-region {
      font-size: 12px;
      color: #ead7a2;
      font-weight: 900;
    }

    .tile-hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .hero-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 28px;
      max-width: 100%;
      padding: 4px 7px;
      border: 1px solid rgba(255,247,227,.42);
      background: rgba(20,27,26,.62);
      color: #fff7e3;
      font-size: 12px;
      font-weight: 900;
      backdrop-filter: blur(3px);
    }

    button.hero-chip {
      font-family: inherit;
    }

    .polity-link {
      cursor: pointer;
    }

    .polity-link:hover,
    .polity-link:focus-visible {
      border-color: #f1d98e;
      background: rgba(34,58,61,.88);
      outline: none;
    }

    .polity-flag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      height: 16px;
      border: 1px solid rgba(255,247,227,.72);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.18);
      color: #fff7e3;
      font-size: 11px;
      line-height: 1;
      text-shadow: 0 1px 2px rgba(0,0,0,.7);
    }

    .tile-detail-grid {
      padding: 10px;
    }

    .grid2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }

    .pill {
      border: 1px solid rgba(73,63,43,.65);
      background: #f8ecc9;
      padding: 4px 6px;
      min-width: 0;
    }

    .estate {
      display: grid;
      grid-template-columns: 52px 1fr 32px;
      gap: 8px;
      align-items: center;
      margin: 7px 0;
      font-size: 13px;
    }

    .bar {
      height: 12px;
      border: 1px solid var(--line);
      background: #d4c394;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: #7f9d63;
    }

    .bar.mid span { background: #c99a31; }
    .bar.low span { background: #a64f3a; }

    .log {
      padding: 10px;
      min-height: 260px;
      max-height: 420px;
      overflow: auto;
      background: #27302c;
      color: #f5edce;
      font-family: "SF Mono", Menlo, Consolas, monospace;
      font-size: 12px;
    }

    .log div { margin-bottom: 8px; }

    .footer {
      margin-top: 10px;
      padding: 0;
      background: transparent;
      display: grid;
      grid-template-columns: 94px 1fr;
      gap: 8px;
    }

    .primary, .ghost { min-height: 48px; }
    .primary {
      background: var(--dark);
      color: #fff7e3;
      box-shadow: 0 4px 0 #11191b;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: none;
      max-width: min(520px, calc(100vw - 24px));
      padding: 10px 14px;
      border: 2px solid #fff7e3;
      background: var(--dark);
      color: #fff7e3;
      z-index: 10;
      box-shadow: 0 14px 26px rgba(0,0,0,.28);
    }

    .toast.show { display: block; }

    .modal-wrap {
      position: fixed;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(32,32,25,.72);
      z-index: 20;
    }

    .modal-wrap.show { display: flex; }
    .modal {
      width: min(520px, 100%);
      border: 2px solid var(--line);
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 22px 60px rgba(0,0,0,.36);
    }

    .modal h2 {
      font-size: 28px;
      margin-bottom: 8px;
    }

    .modal p { color: #5d5136; }

    .country-modal-wrap {
      position: fixed;
      inset: 0;
      z-index: 18;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(19,25,23,.66);
      backdrop-filter: blur(3px);
    }

    .country-modal-wrap.show {
      display: flex;
    }

    .country-modal {
      width: min(560px, 100%);
      max-height: min(680px, calc(100vh - 36px));
      overflow: auto;
      border: 2px solid var(--line);
      background: #f6e8bf;
      box-shadow: 0 24px 64px rgba(0,0,0,.5);
    }

    .country-modal-head {
      position: relative;
      min-height: 150px;
      display: grid;
      grid-template-columns: 92px 1fr;
      gap: 16px;
      align-items: end;
      padding: 22px;
      color: #fff7e3;
      background:
        linear-gradient(90deg, rgba(17,22,20,.84), rgba(17,22,20,.48)),
        url("../../assets/age-of-discovery-portolan-wallpaper.png") center / cover;
    }

    .country-modal-head::after {
      content: "";
      position: absolute;
      inset: 0;
      border-bottom: 2px solid rgba(239,227,198,.45);
      pointer-events: none;
    }

    .country-modal-flag {
      position: relative;
      z-index: 1;
      width: 92px;
      height: 62px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255,247,227,.84);
      box-shadow: inset 0 0 0 3px rgba(0,0,0,.18), 0 8px 20px rgba(0,0,0,.34);
      font-size: 30px;
      font-weight: 900;
      text-shadow: 0 2px 4px rgba(0,0,0,.8);
    }

    .country-modal-title {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .country-modal-title h2 {
      margin: 0 42px 4px 0;
      color: #fff7e3;
      font-size: 26px;
      line-height: 1.12;
    }

    .country-modal-title div {
      color: #ead7a2;
      font-size: 13px;
      font-weight: 900;
    }

    .country-modal-close {
      position: absolute;
      z-index: 3;
      top: 10px;
      right: 10px;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,247,227,.64);
      background: rgba(18,25,24,.78);
      color: #fff7e3;
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }

    .country-modal-body {
      padding: 12px;
    }

    .country-summary-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
    }

    .country-summary-item {
      min-width: 0;
      padding: 8px;
      border: 1px solid rgba(73,63,43,.48);
      background: rgba(255,247,227,.7);
    }

    .country-summary-item small {
      display: block;
      color: #685335;
      font-size: 11px;
      font-weight: 900;
    }

    .country-summary-item strong {
      display: block;
      overflow-wrap: anywhere;
      font-size: 16px;
      line-height: 1.2;
    }

    .leader-card {
      margin-bottom: 10px;
      border: 1px solid rgba(73,63,43,.56);
      background: #e8d29a;
    }

    .leader-card-head {
      display: grid;
      grid-template-columns: 54px minmax(0, 1fr);
      gap: 10px;
      align-items: center;
      padding: 10px;
      border-bottom: 1px solid rgba(73,63,43,.38);
    }

    .leader-seal {
      width: 54px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 2px solid #fff7e3;
      border-radius: 50%;
      background: #385d60;
      color: #fff7e3;
      font-size: 21px;
      font-weight: 900;
      box-shadow: 0 4px 10px rgba(54,42,22,.24);
    }

    .leader-card-head h3 {
      margin: 0 0 3px;
      font-size: 18px;
    }

    .leader-card-head div {
      color: #685335;
      font-size: 12px;
      font-weight: 900;
    }

    .leader-abilities {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 1px;
      background: rgba(73,63,43,.28);
    }

    .leader-ability {
      padding: 8px;
      background: rgba(255,247,227,.82);
      text-align: center;
    }

    .leader-ability small,
    .leader-ability strong {
      display: block;
    }

    .leader-ability small {
      color: #685335;
      font-size: 10px;
      font-weight: 900;
    }

    .leader-ability strong {
      margin-top: 2px;
      font-size: 19px;
    }

    .leader-ability span {
      color: #385d60;
      font-size: 10px;
      font-weight: 900;
    }

    .leader-succession {
      padding: 8px 10px;
      color: #4d422f;
      font-size: 12px;
      font-weight: 800;
    }

    .leader-election-wrap {
      position: fixed;
      inset: 0;
      z-index: 26;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(17,22,20,.86);
      backdrop-filter: blur(5px);
    }

    .leader-election-wrap.show {
      display: flex;
    }

    .leader-election-dialog {
      width: min(760px, 100%);
      max-height: calc(100vh - 32px);
      overflow: auto;
      border: 2px solid var(--line);
      background: #f6e8bf;
      box-shadow: 0 28px 70px rgba(0,0,0,.58);
    }

    .leader-election-head {
      padding: 14px 16px;
      border-bottom: 2px solid var(--line);
      background: #d8bd7d;
    }

    .leader-election-head h2 {
      margin: 0 0 3px;
    }

    .leader-election-head div {
      color: #594b31;
      font-size: 12px;
      font-weight: 900;
    }

    .leader-candidates {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      padding: 12px;
    }

    .leader-candidate {
      min-width: 0;
      padding: 10px;
      border: 1px solid rgba(73,63,43,.62);
      background: rgba(255,247,227,.74);
    }

    .leader-candidate h3 {
      margin: 0 0 4px;
      font-size: 16px;
    }

    .leader-candidate > div {
      color: #685335;
      font-size: 11px;
      font-weight: 800;
    }

    .leader-candidate .leader-abilities {
      margin: 10px 0;
    }

    .leader-candidate button {
      width: 100%;
      min-height: 40px;
      border: 1px solid #24484c;
      background: #385d60;
      color: #fff7e3;
      font-weight: 900;
      cursor: pointer;
    }

    .country-modal-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .country-modal-actions button {
      min-width: 132px;
      min-height: 42px;
    }

    .country-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      margin-bottom: 10px;
      border: 1px solid rgba(73,63,43,.56);
      background: rgba(73,63,43,.32);
    }

    .country-tab {
      min-height: 38px;
      border: 0;
      background: rgba(255,247,227,.78);
      font-weight: 900;
      cursor: pointer;
    }

    .country-tab.active {
      background: #385d60;
      color: #fff7e3;
    }

    .diplomacy-resource-grid,
    .relation-metrics,
    .leader-relation-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
    }

    .diplomacy-stat,
    .relation-metric {
      min-width: 0;
      padding: 7px;
      border: 1px solid rgba(73,63,43,.48);
      background: rgba(255,247,227,.72);
    }

    .diplomacy-stat small,
    .relation-metric small {
      display: block;
      color: #685335;
      font-size: 10px;
      font-weight: 900;
    }

    .diplomacy-stat strong,
    .relation-metric strong {
      display: block;
      margin-top: 2px;
      overflow-wrap: anywhere;
      font-size: 16px;
    }

    .relation-list,
    .diplomatic-action-list {
      display: grid;
      gap: 7px;
    }

    .relation-row,
    .diplomatic-action {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(73,63,43,.52);
      background: rgba(255,247,227,.72);
      text-align: left;
    }

    button.relation-row {
      cursor: pointer;
    }

    .relation-row strong,
    .diplomatic-action strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .relation-row small,
    .diplomatic-action small {
      display: block;
      margin-top: 2px;
      color: #685335;
      font-size: 10px;
      font-weight: 800;
    }

    .attitude-badge {
      min-width: 48px;
      padding: 4px 6px;
      border: 1px solid rgba(73,63,43,.46);
      background: #d8bd7d;
      text-align: center;
      font-size: 11px;
      font-weight: 900;
    }

    .diplomatic-action button,
    .diplomacy-inline-button {
      min-height: 34px;
      border: 1px solid #24484c;
      background: #385d60;
      color: #fff7e3;
      font-weight: 900;
      cursor: pointer;
    }

    .diplomatic-action button:disabled,
    .diplomacy-inline-button:disabled {
      cursor: not-allowed;
      opacity: .46;
    }

    .proposal-score {
      margin-top: 5px;
      color: #385d60;
      font-size: 11px;
      font-weight: 900;
    }

    .proposal-breakdown {
      margin-top: 4px;
      color: #685335;
      font-size: 10px;
      line-height: 1.45;
    }

    .diplomacy-section-title {
      margin: 2px 0 7px;
      font-size: 15px;
    }

    .diplomacy-empty {
      padding: 9px;
      border: 1px dashed rgba(73,63,43,.5);
      color: #685335;
      background: rgba(255,247,227,.46);
      font-size: 12px;
    }

    .country-select-wrap {
      position: fixed;
      inset: 0;
      z-index: 22;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(17,22,20,.82);
      backdrop-filter: blur(5px);
    }

    .country-select-wrap.show {
      display: flex;
    }

    .country-select-dialog {
      width: min(920px, 100%);
      max-height: calc(100vh - 32px);
      display: grid;
      grid-template-rows: auto auto auto minmax(0, 1fr) auto;
      border: 2px solid var(--line);
      background: #f6e8bf;
      box-shadow: 0 28px 70px rgba(0,0,0,.58);
    }

    .country-select-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 13px 15px;
      border-bottom: 2px solid var(--line);
      background: #d8bd7d;
    }

    .country-select-head h2 {
      margin: 0;
    }

    .country-select-tools {
      padding: 10px 12px;
      border-bottom: 1px solid rgba(73,63,43,.42);
    }

    .country-search {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      background: #fff7e3;
      padding: 0 11px;
      color: #28251d;
      font: inherit;
      font-weight: 800;
    }

    .country-carousel {
      min-width: 0;
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) 38px;
      gap: 7px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid rgba(73,63,43,.42);
      background: #e4cc91;
    }

    .country-carousel-arrow {
      width: 38px;
      height: 72px;
      border: 1px solid rgba(73,63,43,.62);
      background: rgba(255,247,227,.78);
      color: #243335;
      font-size: 28px;
      font-weight: 900;
      cursor: pointer;
    }

    .country-carousel-arrow:hover,
    .country-carousel-arrow:focus-visible {
      background: #fff7e3;
      outline: 2px solid #385d60;
      outline-offset: -2px;
    }

    .country-list {
      min-width: 0;
      overflow-x: auto;
      overflow-y: hidden;
      display: flex;
      gap: 8px;
      padding: 2px;
      scroll-snap-type: x mandatory;
      scrollbar-width: thin;
      scrollbar-color: #7f6844 transparent;
    }

    .country-choice {
      flex: 0 0 108px;
      width: 108px;
      min-height: 76px;
      display: grid;
      grid-template-rows: 38px auto;
      gap: 5px;
      justify-items: center;
      align-content: center;
      padding: 6px;
      border: 1px solid rgba(73,63,43,.62);
      background: rgba(255,247,227,.72);
      color: #28251d;
      text-align: center;
      cursor: pointer;
      scroll-snap-align: center;
    }

    .country-choice:hover,
    .country-choice:focus-visible {
      border-color: #385d60;
      background: #fff7e3;
      outline: none;
    }

    .country-choice.selected {
      border: 2px solid #23464a;
      background: #e7d39d;
      box-shadow: inset 0 0 0 2px rgba(255,247,227,.7);
    }

    .country-choice-flag {
      width: 58px;
      height: 38px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,247,227,.82);
      color: #fff7e3;
      font-size: 17px;
      font-weight: 900;
      text-shadow: 0 1px 3px rgba(0,0,0,.75);
    }

    .country-choice strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .country-choice strong {
      font-size: 12px;
      line-height: 1.15;
    }

    .country-empty {
      min-width: 100%;
      display: grid;
      place-items: center;
      color: #685335;
      font-weight: 900;
    }

    .country-preview {
      min-height: 0;
      overflow: auto;
      padding: 16px;
      background:
        linear-gradient(90deg, rgba(255,247,227,.94), rgba(244,225,178,.9)),
        #f6e8bf;
    }

    .country-preview-head {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 14px;
      align-items: center;
    }

    .country-preview-flag {
      width: 82px;
      height: 54px;
      display: grid;
      place-items: center;
      border: 2px solid rgba(255,247,227,.84);
      box-shadow: 0 5px 12px rgba(54,42,22,.24);
      color: #fff7e3;
      font-size: 25px;
      font-weight: 900;
      text-shadow: 0 1px 3px rgba(0,0,0,.8);
    }

    .country-preview-title h3 {
      margin: 0 0 4px;
      font-size: 24px;
    }

    .country-preview-title div {
      color: #685335;
      font-size: 13px;
      font-weight: 900;
    }

    .country-introduction {
      margin: 14px 0;
      padding: 12px 0;
      border-top: 1px solid rgba(73,63,43,.34);
      border-bottom: 1px solid rgba(73,63,43,.34);
      color: #342e22;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.7;
    }

    .country-preview-stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .country-preview-stat {
      min-width: 0;
      padding: 8px 9px;
      border-left: 3px solid #385d60;
      background: rgba(255,247,227,.58);
    }

    .country-preview-stat small,
    .country-preview-stat strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .country-preview-stat small {
      color: #685335;
      font-size: 11px;
      font-weight: 900;
    }

    .country-preview-stat strong {
      margin-top: 3px;
      font-size: 14px;
      line-height: 1.25;
    }

    .country-select-footer {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 10px 12px;
      border-top: 2px solid var(--line);
      background: #e6d29c;
    }

    .country-select-footer span {
      min-width: 0;
      font-size: 13px;
      font-weight: 900;
    }

    .country-select-footer button {
      min-width: 132px;
      min-height: 42px;
    }

    .country-select-footer button:disabled {
      opacity: .48;
      cursor: not-allowed;
    }

    @media (max-width: 980px) {
      .hud-left {
        max-width: calc(100vw - 28px);
      }

      .topbar {
        top: 60px;
        min-width: min(420px, calc(100vw - 28px));
      }

      .hud-resources {
        top: auto;
        right: 10px;
        bottom: 128px;
        width: min(344px, calc(100vw - 20px));
        min-width: 0;
      }

      .army-drawer {
        top: auto;
        right: 10px;
        bottom: 244px;
        max-height: calc(100vh - 318px);
      }

      .army-drawer-body {
        max-height: calc(100vh - 372px);
      }

      .drawer {
        top: 108px;
        max-height: calc(100vh - 222px);
      }

      .tile-drawer {
        left: 10px;
        bottom: 10px;
        max-height: calc(100vh - 130px);
      }

      .map-controls {
        right: 10px;
        bottom: 10px;
        max-width: calc(100vw - 20px);
      }

      .legend { max-width: calc(100vw - 38px); }
    }

    @media (max-width: 540px) {
      .topbar { display: none; }
      .hud-left {
        left: 8px;
        right: 8px;
        top: 8px;
        max-width: none;
        overflow-x: auto;
      }

      .hud-tab { min-width: 52px; }
      .drawer {
        left: 8px;
        top: 58px;
        width: calc(100vw - 16px);
        max-height: calc(100vh - 206px);
      }

      .tile-drawer {
        left: 8px;
        bottom: 8px;
        width: calc(100vw - 16px);
        max-height: calc(100vh - 150px);
      }

      .army-drawer {
        left: 8px;
        right: 8px;
        bottom: 194px;
        width: auto;
        max-height: calc(100vh - 260px);
      }

      .army-drawer-body {
        max-height: calc(100vh - 314px);
      }

      .resources { gap: 3px; }
      .res { padding: 6px; }
      .res small { font-size: 10px; }
      .res strong { font-size: 13px; }
      .actions { grid-template-columns: repeat(2, 1fr); }
      .country-modal-head {
        grid-template-columns: 74px 1fr;
        padding: 16px;
      }
      .country-modal-flag {
        width: 74px;
        height: 50px;
        font-size: 24px;
      }
      .country-summary-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .diplomacy-resource-grid,
      .relation-metrics,
      .leader-relation-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .diplomatic-action { grid-template-columns: minmax(0, 1fr); }
      .diplomatic-action > button,
      .diplomatic-action > div:last-child { width: 100%; }
      .leader-candidates { grid-template-columns: 1fr; }
      .country-select-wrap { padding: 8px; }
      .country-select-dialog { max-height: calc(100vh - 16px); }
      .country-carousel {
        grid-template-columns: 32px minmax(0, 1fr) 32px;
        padding: 8px;
      }
      .country-carousel-arrow {
        width: 32px;
        height: 68px;
      }
      .country-choice {
        flex-basis: 92px;
        width: 92px;
      }
      .country-preview { padding: 12px; }
      .country-preview-head { grid-template-columns: 64px minmax(0, 1fr); }
      .country-preview-flag {
        width: 64px;
        height: 44px;
      }
      .country-preview-title h3 { font-size: 19px; }
      .country-preview-stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .country-select-footer { grid-template-columns: 1fr auto; }
      .country-select-footer {
        grid-template-columns: 1fr;
      }
      .country-select-footer button {
        width: 100%;
      }
    }
    /* ===== 游戏层界面 ===== */
    .gl-overlay { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(20,16,10,.58); z-index: 60; padding: 14px; }
    .gl-overlay.show { display: flex; }
    .gl-dialog { width: min(680px, 96vw); max-height: 86vh; overflow: auto; background: var(--panel); border: 2px solid var(--line); border-radius: 14px; box-shadow: 0 18px 50px var(--shadow); padding: 14px 16px; }
    .gl-dialog h2 { margin: 2px 0 4px; }
    .gl-sub { opacity: .75; font-size: 13px; margin-bottom: 8px; }
    .gl-section { border: 1px solid rgba(73,63,44,.35); border-radius: 10px; padding: 8px 10px; margin: 8px 0; background: var(--paper); }
    .gl-section h3 { margin: 0 0 6px; font-size: 14px; }
    .gl-row { display: flex; justify-content: space-between; gap: 8px; padding: 2px 0; font-size: 13px; }
    .gl-warn-red { color: #8e3f37; font-weight: 700; }
    .gl-warn-yellow { color: #9a6b22; font-weight: 600; }
    .gl-good { color: #4d8569; }
    .gl-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; justify-content: flex-end; }
    .gl-actions button { border: 1.5px solid var(--line); border-radius: 9px; padding: 8px 14px; background: var(--paper); cursor: pointer; }

    let state;

    function project(lon, lat) {
      return {
        x: VIEW.pad + (lon - BOUNDS.lonMin) / (BOUNDS.lonMax - BOUNDS.lonMin) * (VIEW.w - VIEW.pad * 2),
        y: VIEW.pad + (BOUNDS.latMax - lat) / (BOUNDS.latMax - BOUNDS.latMin) * (VIEW.h - VIEW.pad * 2)
      };
    }

    function unproject(x, y) {
      return {
        lon: BOUNDS.lonMin + (x - VIEW.pad) / (VIEW.w - VIEW.pad * 2) * (BOUNDS.lonMax - BOUNDS.lonMin),
        lat: BOUNDS.latMax - (y - VIEW.pad) / (VIEW.h - VIEW.pad * 2) * (BOUNDS.latMax - BOUNDS.latMin)
      };
    }

    function pointInPoly(point, poly) {
      const [x,y] = point;
      let inside = false;
      for (let i=0, j=poly.length-1; i<poly.length; j=i++) {
        const xi=poly[i][0], yi=poly[i][1], xj=poly[j][0], yj=poly[j][1];
        const hit = ((yi > y) !== (yj > y)) && (x < (xj-xi) * (y-yi) / (yj-yi) + xi);
        if (hit) inside = !inside;
      }
      return inside;
    }

    function inAny(point, polys) {
      return polys.some(poly => pointInPoly(point, poly));
    }

    function nearestSeed(lon, lat, preferSea) {
      let best = null;
      let bestD = Infinity;
      for (const s of regionSeeds) {
        if (preferSea && s[3] !== "sea") continue;
        if (!preferSea && s[3] === "sea") continue;
        const dx = (lon - s[1]) * Math.cos(lat * Math.PI / 180);
        const dy = lat - s[2];
        const d = dx*dx + dy*dy;
        if (d < bestD) { bestD = d; best = s; }
      }
      return best || regionSeeds[0];
    }

    function terrainFor(lon, lat, seed, isSea) {
      if (isSea) return "sea";
      if (lat > 56) return lon > 10 ? "forest" : "hills";
      if (lat < 34 && lon < 25) return "desert";
      if ((lon > 5 && lon < 17 && lat > 43 && lat < 48) || (lon > 35 && lat > 39)) return "mountains";
      if (lon > 17 && lon < 28 && lat > 45 && lat < 52) return "steppe";
      if (seed) return seed[3];
      return "plains";
    }

    function climateFor(lon, lat, isSea) {
      if (isSea) return "ocean";
      if (lat > 55) return "cold";
      if (lat < 34) return "arid";
      if (lat < 45) return "mediterranean";
      return "temperate";
    }

    function generateTiles() {
      const tiles = [];
      const dx = HEX_R * 1.5;
      const dy = HEX_R * Math.sqrt(3);
      let id = 0;
      for (let row = 0, y = 30; y < VIEW.h - 18; row++, y += dy) {
        for (let x = 30 + (row % 2) * dx / 2; x < VIEW.w - 18; x += dx) {
          const geo = unproject(x, y);
          const strait = isGibraltarStrait(geo.lon, geo.lat);
          const constantinopleTarget = isConstantinopleTargetTile(geo.lon, geo.lat);
          const land = constantinopleTarget || (!strait && inAny([geo.lon, geo.lat], landPolygons));
          const sea = !constantinopleTarget && (strait || !land);
          if (!land && !sea) continue;
          const seed = nearestSeed(geo.lon, geo.lat, sea);
          const terrain = terrainFor(geo.lon, geo.lat, seed, sea);
          const climate = climateFor(geo.lon, geo.lat, sea);
          const polity = sea ? "海域" : seed[12];
          const controller = sea ? "海域" : sovereignPolity(polity);
          const initialAlignment = sea ? "neutral" : seed[11];
          const coastal = sea ? "sea" : nearSea(geo.lon, geo.lat) ? "coast" : nearRiver(geo.lon, geo.lat) ? "river" : "inland";
          const name = sea ? seaName(geo.lon, geo.lat) : seed[0];
          const pop = sea ? { peasants:0, burghers:0, nobles:0, clergy:0 } : jitterPop(seed[9], geo.lon, geo.lat);
          const buildings = sea ? [] : [...seed[10]];
          const tilePolitics = { isSea: sea, terrain, hydro: sea ? "sea" : coastal, pop, buildings };
          const dominantEstate = dominantEstateFor(tilePolitics);
          tiles.push({
            id: id++,
            x, y, lon: geo.lon, lat: geo.lat, row,
            name,
            terrain,
            climate,
            hydro: sea ? "sea" : coastal,
            good: sea ? "fish" : seed[6],
            culture: sea ? "海域" : seed[7],
            religion: sea ? "无" : seed[8],
            polity,
            controller,
            city: "",
            cityLon: null,
            cityLat: null,
            isCapitalArea: false,
            capitalMarker: false,
            pop,
            buildings,
            control: initialAlignment === "player" ? 70 : initialAlignment === "enemy" ? 55 : 65,
            unrest: initialAlignment === "enemy" ? 2 : 0,
            dominantEstate,
            estateControl: sea ? 0 : clamp(28 + sumPop({ pop }) * 3 + buildings.length * 7, 10, 88),
            estateHolding: dominantEstate ? holdingForEstate(dominantEstate, tilePolitics) : null,
            localDemand: "",
            tempPenalty: 0,
            occupier: null,
            occupation: 0,
            devastation: 0,
            warLosses: 0,
            isSea: sea,
            units: []
          });
        }
      }
      for (const tile of tiles) if (!tile.isSea) tile.localDemand = localDemandFor(tile);
      return tiles;
    }

    function jitterPop(base, lon, lat) {
      const factor = Math.max(.55, Math.min(1.12, 1 - Math.hypot(lon, lat - 48) / 92));
      return {
        peasants: Math.max(1, Math.round(base[0] * factor)),
        burghers: Math.max(0, Math.round(base[1] * factor)),
        nobles: Math.max(0, Math.round(base[2] * factor)),
        clergy: Math.max(0, Math.round(base[3] * factor))
      };
    }

    function nearSea(lon, lat) {
      const p = [lon, lat];
      return seaPolygons.some(poly => poly.some(([x,y]) => Math.hypot((lon-x)*Math.cos(lat*Math.PI/180), lat-y) < 1.8));
    }

    function isGibraltarStrait(lon, lat) {
      return lon > -6.25 && lon < -4.65 && lat > 35.65 && lat < 36.55;
    }

    function isConstantinopleTargetTile(lon, lat) {
      return lon > 26.9 && lon < 27.75 && lat > 39.35 && lat < 40.05;
    }

    function nearRiver(lon, lat) {
      return Math.abs(lat - 48.8) < 1.1 && lon > 1 && lon < 18 ||
             Math.abs(lat - 45.2) < 1.1 && lon > 6 && lon < 22 ||
             Math.abs(lon - 31) < 1.1 && lat > 27 && lat < 32;
    }

    function seaName(lon, lat) {
      if (lat > 51) return "北海";
      if (lon > 27 && lat > 40) return "黑海";
      if (lon < 0 && lat > 43) return "比斯开湾";
      if (lon > 25) return "东地中海";
      if (lon > 10) return "中地中海";
      return "西地中海";
    }

    function createGovernment(type = "monarchy") {
      const cfg = GOVERNMENT_TYPES[type];
      return {
        type,
        typeLabel: cfg.label,
        powerName: cfg.powerName,
        centralPower: type === "monarchy" ? 62 : 55,
        legitimacy: 70,
        stateCapacity: { admin: 45, fiscal: 42, military: 55 },
        reforms: {
          administrative: 1,
          fiscal: 1,
          military: 1,
          religious: 1,
          political: 1,
          maritime: 0
        },
        laws: {
          land: "贵族地产",
          tax: "封建贡赋",
          military: "贵族军役",
          religion: "国教制度",
          trade: "行会垄断",
          succession: "长子继承"
        },
        assembly: {
          unlocked: cfg.assemblyDefaultUnlocked,
          type: cfg.assemblyType,
          support: cfg.assemblyDefaultUnlocked ? 46 : 0,
          agenda: cfg.assemblyDefaultUnlocked ? "tax" : null
        }
      };
    }

    function createEstates(type = "monarchy") {
      const cfg = GOVERNMENT_TYPES[type];
      return Object.fromEntries(cfg.estateKeys.map(key => {
        const e = ESTATE_LIBRARY[key];
        return [key, {
          label: e.label,
          power: e.basePower,
          satisfaction: e.satisfaction * 10,
          privileges: [...e.privileges],
          stageLevel: 0,
          defianceQuarters: 0,
          lastUltimatumTurn: -99
        }];
      }));
    }

    function sovereignPolity(polity) {
      return POLITY_PARENT[polity] || polity;
    }

    function playableCountries(world = state) {
      return [...new Set(world.tiles
        .filter(tile => !tile.isSea && tile.controller && tile.controller !== "海域")
        .map(tile => tile.controller))]
        .sort((a, b) => a.localeCompare(b, "zh-Hans-CN"));
    }

    function controlledTiles(polity = state.playerPolity, world = state) {
      return world.tiles.filter(tile => !tile.isSea && tile.controller === polity);
    }

    function activeCountry(world = state) {
      return world.countries[world.playerPolity];
    }

    function setPlayerCountry(world, polity) {
      if (!world.countries[polity]) throw new Error(`无法切换到未知国家：${polity}`);
      const cap = capital(polity, world);
      if (!cap) throw new Error(`国家缺少首都或领土地块：${polity}`);
      world.playerPolity = polity;
      world.selectedUnit = null;
      world.selectedTile = cap.id;
      return cap;
    }

    function calendarForTurn(turn) {
      const offset = Math.max(0, turn - 1);
      return {
        year: 1337 + Math.floor(offset / 4),
        quarter: offset % 4 + 1
      };
    }

    function seasonName(quarter) {
      const season = ["春", "夏", "秋", "冬"][quarter - 1];
      if (!season) throw new Error(`无效季度：${quarter}`);
      return season;
    }

    function calendarLabel(turn) {
      const calendar = calendarForTurn(turn);
      return `${calendar.year}年${seasonName(calendar.quarter)}`;
    }

    function turnForDate(year, quarter = 1) {
      return (year - 1337) * 4 + quarter;
    }

    function leaderActionGain(ability) {
      return 1 + Math.floor(clamp(ability, 0, 6) / 2);
    }

    function createLeaderFromRecord(polity, record, historyIndex, currentTurn = 1) {
      const config = LEADERS_BY_POLITY[polity];
      if (!config) throw new Error(`国家缺少领导人配置：${polity}`);
      return {
        name: record.name,
        dynasty: record.dynasty,
        title: record.title,
        birthYear: record.birthYear,
        tookOfficeYear: record.startYear,
        tookOfficeTurn: Math.max(1, turnForDate(record.startYear, 1)),
        historicalEndAtTurn: turnForDate(record.endYear, record.endQuarter),
        abilities: { ...record.abilities },
        succession: config.succession,
        termYears: config.termYears || null,
        termEndsAtTurn: config.termYears
          ? Math.max(currentTurn + 1, turnForDate(record.startYear, 1) + config.termYears * 4)
          : null,
        historyIndex,
        supportEstate: null
      };
    }

    function createInitialLeader(polity) {
      const config = LEADERS_BY_POLITY[polity];
      if (!config?.history?.length) throw new Error(`国家缺少 1337 年领导人：${polity}`);
      return createLeaderFromRecord(polity, config.history[0], 0, 1);
    }

    function grantQuarterlyActionPoints(country) {
      const abilities = country.leader.abilities;
      for (const type of ["administrative", "diplomatic", "military"]) {
        country.actionPoints[type] = Math.min(10, country.actionPoints[type] + leaderActionGain(abilities[type]));
      }
    }

    function stableLeaderNumber(polity, turn, salt = 0) {
      let hash = 2166136261;
      const text = `${polity}:${turn}:${salt}`;
      for (let i = 0; i < text.length; i++) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return hash >>> 0;
    }

    function generatedLeader(world, polity, candidateIndex = 0, inheritedDynasty = null) {
      const config = LEADERS_BY_POLITY[polity];
      const country = world.countries[polity];
      const calendar = calendarForTurn(world.turn);
      const names = GENERATED_LEADER_NAMES[config.culture] || GENERATED_LEADER_NAMES.frankish;
      const seed = stableLeaderNumber(polity, world.turn, candidateIndex);
      const electiveDynasties = GENERATED_ELECTIVE_DYNASTIES[config.culture] || GENERATED_ELECTIVE_DYNASTIES.default;
      const estateKeys = Object.keys(country.estates);
      const title = country.leader?.title || config.history[0].title;
      const dynasty = inheritedDynasty || electiveDynasties[seed % electiveDynasties.length];
      return {
        name: names[seed % names.length],
        dynasty,
        title,
        birthYear: calendar.year - (28 + seed % 28),
        tookOfficeYear: calendar.year,
        tookOfficeTurn: world.turn,
        historicalEndAtTurn: null,
        abilities: {
          administrative: 1 + stableLeaderNumber(polity, world.turn, candidateIndex + 11) % 6,
          diplomatic: 1 + stableLeaderNumber(polity, world.turn, candidateIndex + 23) % 6,
          military: 1 + stableLeaderNumber(polity, world.turn, candidateIndex + 37) % 6
        },
        succession: config.succession,
        termYears: config.termYears || null,
        termEndsAtTurn: config.termYears ? world.turn + config.termYears * 4 : null,
        historyIndex: -1,
        supportEstate: estateKeys[candidateIndex % estateKeys.length] || null
      };
    }

    function isElectionSuccession(succession) {
      return ["elective_life", "elective_term", "imperial_elective", "clan_elective"].includes(succession);
    }

    function configureLeaderForGovernment(country, governmentType, currentTurn) {
      const defaults = {
        monarchy: { title:"国王", succession:"hereditary", termYears:null },
        republic: { title:"执政官", succession:"elective_term", termYears:4 },
        theocracy: { title:"大祭司", succession:"elective_life", termYears:null },
        tribal: { title:"大汗", succession:"clan_elective", termYears:null },
        merchant_republic: { title:"总督", succession:"elective_term", termYears:4 },
        empire: { title:"皇帝", succession:"imperial_elective", termYears:null }
      };
      const config = defaults[governmentType];
      if (!config) throw new Error(`未知政体的领导人规则：${governmentType}`);
      Object.assign(country.leader, {
        title: config.title,
        succession: config.succession,
        termYears: config.termYears,
        termEndsAtTurn: config.termYears ? currentTurn + config.termYears * 4 : null,
        historicalEndAtTurn: null,
        historyIndex: -1
      });
    }

    function installLeader(world, polity, leader, reason) {
      const country = world.countries[polity];
      if (world.diplomacy) decayLeaderRelations(world, polity);
      const rulerGeneralId = `ruler-general:${polity}`;
      for (const army of Object.values(world.warfare?.armies || {})) {
        if (army.generalId === rulerGeneralId) army.generalId = null;
      }
      if (world.warfare?.generals) delete world.warfare.generals[rulerGeneralId];
      country.leader = leader;
      if (world.turn > 1) {
        const electionLike = leader.succession ? isElectionSuccession(leader.succession) : false;
        changeLegitimacy(country, electionLike ? -3 : -6, `君主更替：${reason}`);
        pushChronicle(country, "leader", `${calendarLabel(world.turn)}：${reason}，${leader.title}${leader.name}就任`);
        pushWorldEvent(world, `${polity}：${leader.title}${leader.name}就任（${reason}）`, "leader");
      }
      country.log.unshift(`${calendarLabel(world.turn)} · ${reason}：${leader.title}${leader.name}就任。`);
      country.log = country.log.slice(0, 14);
    }

    function electionCandidates(world, polity, historicalCandidate = null) {
      const candidates = [0, 1, 2].map(index => generatedLeader(world, polity, index));
      if (historicalCandidate) candidates[0] = historicalCandidate;
      return candidates;
    }

    function candidateScore(country, candidate) {
      const abilities = candidate.abilities;
      const estate = candidate.supportEstate ? country.estates[candidate.supportEstate] : null;
      return abilities.administrative + abilities.diplomatic + abilities.military
        + (estate?.power || 0) / 12 + (estate?.satisfaction || 0);
    }

    function startElection(world, polity, reason, historicalCandidate = null) {
      const candidates = electionCandidates(world, polity, historicalCandidate);
      if (world.playerPolity === polity) {
        world.pendingElection = { polity, reason, candidates };
        return null;
      }
      const country = world.countries[polity];
      const winner = [...candidates].sort((a, b) => candidateScore(country, b) - candidateScore(country, a))[0];
      installLeader(world, polity, winner, reason);
      return winner;
    }

    function completeLeaderElection(world, candidateIndex) {
      const election = world.pendingElection;
      if (!election) throw new Error("当前没有待处理的领导人选举");
      const leader = election.candidates[candidateIndex];
      if (!leader) throw new Error("无效的领导人候选人");
      installLeader(world, election.polity, leader, election.reason);
      world.pendingElection = null;
      return leader;
    }

    function dynamicLeadershipReason(world, polity) {
      const country = world.countries[polity];
      const leader = country.leader;
      const calendar = calendarForTurn(world.turn);
      const age = leader.birthYear ? calendar.year - leader.birthYear : null;
      const roll = stableLeaderNumber(polity, world.turn, 91) % 1000;
      if (age !== null && age >= 60 && roll < Math.min(60, (age - 59) * 3)) return "领导人去世";
      if (country.legitimacy <= 2 && country.government.centralPower <= 35 && roll < 90) return "宫廷政变";
      return null;
    }

    function processLeadership(world, polity) {
      const country = world.countries[polity];
      const leader = country.leader;
      const config = LEADERS_BY_POLITY[polity];
      if (world.pendingElection?.polity === polity) return null;

      const termExpired = leader.termEndsAtTurn && world.turn >= leader.termEndsAtTurn;
      const historyEnded = leader.historicalEndAtTurn && world.turn >= leader.historicalEndAtTurn;
      const dynamicReason = dynamicLeadershipReason(world, polity);
      if (!termExpired && !historyEnded && !dynamicReason) return null;

      if (historyEnded && leader.historyIndex >= 0 && config.history[leader.historyIndex + 1]) {
        const nextIndex = leader.historyIndex + 1;
        const successor = createLeaderFromRecord(polity, config.history[nextIndex], nextIndex, world.turn);
        if (isElectionSuccession(leader.succession)) {
          return startElection(world, polity, "历史任期结束选举", successor);
        }
        installLeader(world, polity, successor, "历史换代");
        return successor;
      }

      const reason = termExpired ? "任期届满选举" : dynamicReason || "领导人换代";
      if (isElectionSuccession(leader.succession)) return startElection(world, polity, reason);

      const inheritedDynasty = ["hereditary", "court"].includes(leader.succession) ? leader.dynasty : null;
      const successor = generatedLeader(world, polity, 0, inheritedDynasty);
      installLeader(world, polity, successor, reason);
      return successor;
    }

    function createCountryState(name, tiles) {
      const territory = tiles.filter(tile => !tile.isSea && tile.controller === name);
      if (!territory.length) throw new Error(`国家没有可控制地块：${name}`);
      const governmentType = INITIAL_GOVERNMENT_BY_POLITY[name];
      if (!governmentType) throw new Error(`国家缺少初始政体配置：${name}`);
      const population = territory.reduce((total, tile) => total + sumPop(tile), 0);
      const markets = territory.filter(tile => tile.buildings.includes("market")).length;
      const ports = territory.filter(tile => tile.buildings.includes("port")).length;
      const forts = territory.filter(tile => tile.buildings.includes("fort")).length;
      const leader = createInitialLeader(name);
      return {
        name,
        leader,
        actionPoints: {
          administrative: leaderActionGain(leader.abilities.administrative),
          diplomatic: leaderActionGain(leader.abilities.diplomatic),
          military: leaderActionGain(leader.abilities.military)
        },
        food: Math.max(40, Math.round(population / 1.2) + 20),
        money: Math.max(40, (markets + ports + 3) * 10),
        military: Math.max(30, (forts + Math.round(population / 18) + 2) * 10),
        legitimacy: 62,
        government: createGovernment(governmentType),
        estates: createEstates(governmentType),
        diplomacy: {
          envoys: 2
        },
        technology: {
          artillery: false,
          oceanGoingShips: false,
          printing: false,
          standingArmy: false,
          steamEngine: false,
          bastions: false,
          accounting: false,
          triangleTrade: false,
          railways: false
        },
        warfare: {
          warExhaustion: 0,
          mobilizationLaw: "limited",
          reinforcementPriority: [],
          supplyPriority: []
        },
        modifiers: [],
        edictCooldowns: {},
        tradePolicy: "normal",
        tradePolicyCooldown: 0,
        pressures: { trade: 0, military: 0, fiscal: 0, exploration: 0 },
        ledger: [],
        priceIndex: 1,
        ideas: 0,
        capital: 0,
        exploration: { points: 0, done: [] },
        agenda: null,
        agendaOffer: null,
        missionsDone: [],
        chronicle: [],
        report: null,
        trend: [],
        revolt: null,
        collapse: 0,
        eliminated: false,
        stats: { warsWon: 0, battlesWon: 0, revoltsQuelled: 0, peakTiles: territory.length },
        initialTiles: territory.length,
        log: [`${name}进入 1337 年的时代棋局。`]
      };
    }

    function createDiplomacyState(world) {
      const initialWars = INITIAL_WARS.map((war, index) => {
        const goalTile = war.name === "百年战争"
          ? world.tiles.find(tile => tile.city === "巴黎")
          : world.tiles
              .filter(tile => !tile.isSea && tile.controller === "拜占庭帝国" && tile.city !== "君士坦丁堡")
              .sort((a, b) => Math.hypot(a.lon - 29.9, a.lat - 40.8) - Math.hypot(b.lon - 29.9, b.lat - 40.8))[0]
            || world.tiles.find(tile => tile.city === "君士坦丁堡");
        if (!goalTile) throw new Error(`战争目标缺少地图地块：${war.name}`);
        const participants = {};
        for (const polity of war.attackers) participants[polity] = { side:"attacker", contribution:0, warWill:85 };
        for (const polity of war.defenders) participants[polity] = { side:"defender", contribution:0, warWill:85 };
        return {
          id: `war-${index + 1}`,
          name: war.name,
          attackers: [...war.attackers],
          defenders: [...war.defenders],
          warLeaderAttack: war.attackers[0],
          warLeaderDefense: war.defenders[0],
          primaryGoal: {
            type:"target_territory",
            tileId:goalTile.id,
            claimant:war.attackers[0],
            label:`控制${goalTile.city || goalTile.name}`
          },
          secondaryDemands: [],
          participants,
          score: 0,
          startedTurn: 1,
          truceUntilTurn: null,
          source: war.source
        };
      });
      return {
        nextId: 1,
        relations: {},
        borderCache: {},
        wars: initialWars,
        truces: [],
        treaties: [],
        missions: [],
        subjects: [],
        organizations: [{
          id: "hre",
          name: "神圣罗马帝国",
          leader: "神圣罗马帝国",
          members: { "神圣罗马帝国":"皇帝" }
        }]
      };
    }

    const COMBAT_TYPES = new Set(["infantry", "cavalry", "artillery"]);
    const SERVICE_TYPES = new Set(["guard", "professional", "standing", "levy", "mercenary"]);

    function armyUnit(combatType, serviceType, soldiers, sourceTileId, sourceEstate, experience = 0, maxSoldiers = soldiers) {
      return { combatType, serviceType, soldiers, maxSoldiers, sourceTileId, sourceEstate, experience };
    }

    function armyTotalSoldiers(army) {
      return army.units.reduce((sum, unit) => sum + unit.soldiers, 0);
    }

    function armyAverageExperience(army) {
      const soldiers = armyTotalSoldiers(army);
      return soldiers
        ? army.units.reduce((sum, unit) => sum + unit.experience * unit.soldiers, 0) / soldiers
        : 0;
    }

    function validateArmy(army) {
      if (!army || !army.id || !army.owner || !Number.isInteger(army.tileId)) return false;
      if (!Array.isArray(army.units) || !army.units.length) return false;
      return army.units.every(unit =>
        COMBAT_TYPES.has(unit.combatType)
        && SERVICE_TYPES.has(unit.serviceType)
        && Number.isFinite(unit.soldiers)
        && unit.soldiers > 0
        && Number.isFinite(unit.maxSoldiers)
        && unit.maxSoldiers >= unit.soldiers
      );
    }

    function canRecruitCombatType(world, polity, combatType) {
      if (!COMBAT_TYPES.has(combatType)) return false;
      if (combatType !== "artillery") return true;
      return world.countries[polity]?.technology?.artillery === true;
    }

    function tileForInitialArmy(world, regionName) {
      const candidates = world.tiles.filter(tile => tile.name === regionName && !tile.isSea);
      return candidates.find(tile => tile.city) || candidates.sort((a, b) => b.control - a.control)[0] || null;
    }

    function addArmy(world, config) {
      const id = `army-${world.warfare.nextArmyId++}`;
      const army = {
        id,
        owner: config.owner,
        tileId: config.tileId,
        name: config.name,
        units: config.units,
        generalId: null,
        morale: config.morale ?? 80,
        organization: config.organization ?? 80,
        supply: config.supply ?? 100,
        status: "ready",
        plannedPath: [],
        order: "hold",
        experience: config.experience ?? 0
      };
      if (army.units.every(unit => unit.serviceType === "mercenary")) {
        army.mercenaryLoyalty = config.mercenaryLoyalty ?? 70;
        army.mercenaryWage = config.mercenaryWage ?? 2;
        army.contractEndsTurn = config.contractEndsTurn ?? world.turn + 8;
      }
      if (!validateArmy(army)) throw new Error(`无效军团配置：${config.name}`);
      world.warfare.armies[id] = army;
      return army;
    }

    function manageableArmy(world, armyId) {
      const army = world.warfare.armies[armyId];
      if (!army) throw new Error("军团不存在");
      if (army.status === "routed" || army.status === "retreating") throw new Error("溃退或撤退中的军团不能整编");
      if (hostileArmiesAtTile(world, army.owner, army.tileId).length) throw new Error("交战中的军团不能整编");
      return army;
    }

    function splitArmy(world, armyId) {
      const army = manageableArmy(world, armyId);
      if (army.supply < 50 || army.plannedPath.length) throw new Error("军团需停止行军并保持正常补给后才能拆分");
      if (armyTotalSoldiers(army) < 2000) throw new Error("军团兵力不足，无法继续拆分");
      const splitUnits = [];
      for (const unit of army.units) {
        const soldiers = Math.floor(unit.soldiers / 2);
        if (soldiers < 1) continue;
        const maxSoldiers = Math.floor(unit.maxSoldiers / 2);
        unit.soldiers -= soldiers;
        unit.maxSoldiers -= maxSoldiers;
        splitUnits.push(armyUnit(
          unit.combatType,
          unit.serviceType,
          soldiers,
          unit.sourceTileId,
          unit.sourceEstate,
          unit.experience,
          Math.max(soldiers, maxSoldiers)
        ));
      }
      if (!splitUnits.length) throw new Error("军团没有可拆分的单位");
      const splitWage = army.mercenaryWage === undefined ? undefined : army.mercenaryWage / 2;
      if (splitWage !== undefined) army.mercenaryWage -= splitWage;
      const split = addArmy(world, {
        owner:army.owner,
        tileId:army.tileId,
        name:`${army.name}分遣军`,
        units:splitUnits,
        morale:army.morale,
        organization:army.organization,
        supply:army.supply,
        experience:army.experience,
        mercenaryLoyalty:army.mercenaryLoyalty,
        mercenaryWage:splitWage,
        contractEndsTurn:army.contractEndsTurn
      });
      army.plannedPath = [];
      army.order = "hold";
      return split;
    }

    function consolidateArmyUnits(units) {
      const groups = new Map();
      for (const unit of units) {
        const key = [
          unit.combatType,
          unit.serviceType,
          unit.sourceTileId,
          unit.sourceEstate
        ].join(":");
        const existing = groups.get(key);
        if (!existing) {
          groups.set(key, { ...unit });
          continue;
        }
        const total = existing.soldiers + unit.soldiers;
        existing.experience = total
          ? (existing.experience * existing.soldiers + unit.experience * unit.soldiers) / total
          : 0;
        existing.soldiers = total;
        existing.maxSoldiers += unit.maxSoldiers;
      }
      return [...groups.values()];
    }

    function mergeArmies(world, targetArmyId, sourceArmyId) {
      const target = manageableArmy(world, targetArmyId);
      const source = manageableArmy(world, sourceArmyId);
      if (target.id === source.id) throw new Error("不能合并同一支军团");
      if (target.owner !== source.owner || target.tileId !== source.tileId) throw new Error("只能合并同格的本国军团");
      if ((target.mercenaryLoyalty === undefined) !== (source.mercenaryLoyalty === undefined)) {
        throw new Error("佣兵团与本国军团不能直接合并");
      }
      if (target.supply < 50 || source.supply < 50 || target.plannedPath.length || source.plannedPath.length) {
        throw new Error("军团需停止行军并保持正常补给后才能合并");
      }
      if (target.generalId && source.generalId && target.generalId !== source.generalId) {
        throw new Error("两支军团均有将领，需先撤下一人");
      }
      const targetSoldiers = armyTotalSoldiers(target);
      const sourceSoldiers = armyTotalSoldiers(source);
      const total = targetSoldiers + sourceSoldiers;
      for (const key of ["morale","organization","supply","experience"]) {
        target[key] = total
          ? (target[key] * targetSoldiers + source[key] * sourceSoldiers) / total
          : target[key];
      }
      target.units = consolidateArmyUnits([...target.units, ...source.units]);
      target.generalId = target.generalId || source.generalId;
      if (target.mercenaryLoyalty !== undefined || source.mercenaryLoyalty !== undefined) {
        target.mercenaryLoyalty = Math.min(
          target.mercenaryLoyalty ?? 100,
          source.mercenaryLoyalty ?? 100
        );
        target.mercenaryWage = (target.mercenaryWage || 0) + (source.mercenaryWage || 0);
        target.contractEndsTurn = Math.min(
          target.contractEndsTurn ?? Infinity,
          source.contractEndsTurn ?? Infinity
        );
      }
      target.plannedPath = [];
      target.order = "hold";
      delete world.warfare.armies[source.id];
      if (world.selectedUnit === source.id) world.selectedUnit = target.id;
      return target;
    }

    function reinforceArmy(world, armyId) {
      const army = manageableArmy(world, armyId);
      const country = world.countries[army.owner];
      if (country.military < 10) throw new Error("补员需要 10 军需");
      let remaining = 1000;
      let reinforced = 0;
      for (const unit of army.units) {
        if (remaining <= 0 || unit.serviceType === "mercenary") continue;
        const missing = unit.maxSoldiers - unit.soldiers;
        if (missing <= 0) continue;
        const source = world.tiles[unit.sourceTileId];
        if (!source || source.occupation >= 100 && source.occupier !== army.owner) continue;
        const addition = Math.min(remaining, missing);
        const popCost = addition / 1000;
        if ((source.pop[unit.sourceEstate] || 0) < popCost) continue;
        source.pop[unit.sourceEstate] -= addition / 1000;
        unit.soldiers += addition;
        remaining -= addition;
        reinforced += addition;
      }
      if (!reinforced) throw new Error("来源地没有可用兵源");
      country.military -= 10;
      army.organization = clamp(army.organization - 5);
      return reinforced;
    }

    function trainArmy(world, armyId) {
      const army = manageableArmy(world, armyId);
      const country = world.countries[army.owner];
      if (country.actionPoints.military < 1 || country.money < 10 || country.military < 10) {
        throw new Error("训练需要 1 军事点、1 金钱和 1 军需");
      }
      country.actionPoints.military -= 1;
      country.money -= 10;
      country.military -= 10;
      for (const unit of army.units) unit.experience = clamp(unit.experience + .2, 0, 2);
      army.experience = clamp(army.experience + .2, 0, 2);
      army.organization = clamp(army.organization + 10);
      return army;
    }

    function demobilizeLevies(world, armyId) {
      const army = manageableArmy(world, armyId);
      let returned = 0;
      const returns = new Map();
      const retained = [];
      for (const unit of army.units) {
        if (unit.serviceType !== "levy") {
          retained.push(unit);
          continue;
        }
        const source = world.tiles[unit.sourceTileId];
        const popKey = ["peasants","burghers","nobles","clergy"].includes(unit.sourceEstate)
          ? unit.sourceEstate
          : "peasants";
        const returnPop = Math.round(unit.soldiers / 10) / 100;
        const key = `${unit.sourceTileId}:${popKey}`;
        returns.set(key, (returns.get(key) || 0) + returnPop);
        returned += returnPop;
      }
      if (!returned) throw new Error("军团没有可复员的征召兵");
      for (const [key, amount] of returns) {
        const [tileId, popKey] = key.split(":");
        const source = world.tiles[Number(tileId)];
        if (source) source.pop[popKey] += amount;
      }
      army.units = retained;
      if (!army.units.length) delete world.warfare.armies[army.id];
      if (!world.warfare.armies[army.id] && world.selectedUnit === army.id) world.selectedUnit = null;
      return returned;
    }

    function rulerGeneralProfile(world, polity) {
      const country = world.countries[polity];
      if (!country) throw new Error("国家不存在");
      const id = `ruler-general:${polity}`;
      const ability = country.leader.abilities.military;
      return {
        id,
        owner:polity,
        name:country.leader.name,
        title:country.leader.title,
        command:ability,
        maneuver:Math.ceil(ability / 2),
        siege:Math.floor(ability / 3),
        isRuler:true
      };
    }

    function rulerGeneral(world, polity) {
      const general = rulerGeneralProfile(world, polity);
      world.warfare.generals[general.id] = general;
      return general;
    }

    function assignGeneral(world, armyId, generalId) {
      const army = manageableArmy(world, armyId);
      const general = world.warfare.generals[generalId];
      if (!general || general.owner !== army.owner) throw new Error("将领不属于该国");
      if (army.mercenaryLoyalty !== undefined) throw new Error("佣兵团使用自带首领，不能任命本国将领");
      for (const candidate of Object.values(world.warfare.armies)) {
        if (candidate.generalId === generalId) candidate.generalId = null;
      }
      army.generalId = generalId;
      return army;
    }

    function dismissGeneral(world, armyId) {
      const army = manageableArmy(world, armyId);
      army.generalId = null;
      return army;
    }

    function renewMercenaryContract(world, armyId) {
      const army = manageableArmy(world, armyId);
      if (army.mercenaryLoyalty === undefined) throw new Error("该军团不是佣兵团");
      const country = world.countries[army.owner];
      if (country.money < army.mercenaryWage) throw new Error(`续约需要 ${army.mercenaryWage} 金钱`);
      country.money -= army.mercenaryWage;
      army.contractEndsTurn = Math.max(world.turn, army.contractEndsTurn) + 8;
      army.mercenaryLoyalty = clamp(army.mercenaryLoyalty + 5);
      return army;
    }

    function releaseMercenary(world, armyId) {
      const army = manageableArmy(world, armyId);
      if (army.mercenaryLoyalty === undefined) throw new Error("该军团不是佣兵团");
      delete world.warfare.armies[army.id];
      if (world.selectedUnit === army.id) world.selectedUnit = null;
      return army;
    }

    function processMercenaryContracts(world, polity) {
      const country = world.countries[polity];
      const mercenaries = Object.values(world.warfare.armies)
        .filter(army => army.owner === polity && army.mercenaryLoyalty !== undefined);
      for (const army of mercenaries) {
        if (world.turn >= army.contractEndsTurn || army.mercenaryLoyalty <= 0) {
          delete world.warfare.armies[army.id];
          if (world.selectedUnit === army.id) world.selectedUnit = null;
          country.log.unshift(`${calendarLabel(world.turn)} · ${army.name}契约结束并离队。`);
          continue;
        }
        if (country.money >= army.mercenaryWage) {
          country.money -= army.mercenaryWage;
        } else {
          army.mercenaryLoyalty = clamp(army.mercenaryLoyalty - 15);
          army.morale = clamp(army.morale - 10);
          country.log.unshift(`${calendarLabel(world.turn)} · ${army.name}欠饷，忠诚与士气下降。`);
        }
      }
    }

    function mobilizeArmy(world, polity, tileId, combatType) {
      const allowed = ["infantry","cavalry"];
      if (world.countries[polity]?.technology.artillery) allowed.push("artillery");
      if (!allowed.includes(combatType)) throw new Error("尚未掌握该兵种的动员技术");
      const tile = world.tiles[tileId];
      if (!tile || tile.isSea || tile.controller !== polity) throw new Error("只能在本国地块动员");
      if (tile.occupation >= 100 && tile.occupier !== polity) throw new Error("不能在被占领地块动员");
      const sourceEstate = combatType === "cavalry" ? "nobles" : combatType === "artillery" ? "burghers" : "peasants";
      if (tile.pop[sourceEstate] < 1) throw new Error(`${combatType === "cavalry" ? "贵族" : "农民"}兵源不足`);
      tile.pop[sourceEstate] -= 1;
      adjustEstateForCountry(world.countries[polity], sourceEstate, { satisfaction:-7 }, "征召兵役");
      return addArmy(world, {
        owner:polity,
        tileId,
        name:`${tile.city || tile.name}${combatType === "cavalry" ? "骑兵征召军" : "步兵征召军"}`,
        units:[armyUnit(combatType, "levy", 1000, tileId, sourceEstate)]
      });
    }

    function hireMercenary(world, polity, tileId) {
      const tile = world.tiles[tileId];
      const country = world.countries[polity];
      if (!tile || tile.controller !== polity || !tile.city) throw new Error("佣兵团只能在本国城市招募");
      if (tile.occupation >= 100 && tile.occupier !== polity) throw new Error("不能在被占领城市招募佣兵");
      if (country.money < 40) throw new Error("招募佣兵团需要 40 金钱");
      country.money -= 40;
      return addArmy(world, {
        owner:polity,
        tileId,
        name:`${tile.city}佣兵团`,
        mercenaryLoyalty:70,
        mercenaryWage:20,
        contractEndsTurn:world.turn + 8,
        units:[
          armyUnit("infantry", "mercenary", 1500, tileId, "burghers", 1),
          armyUnit("cavalry", "mercenary", 500, tileId, "nobles", 1)
        ]
      });
    }

    function createWarfareState(world) {
      const warfare = {
        nextArmyId: 1,
        nextBattleId: 1,
        armies: {},
        generals: {},
        orders: {},
        battles: [],
        prisoners: [],
        pendingPeace: null
      };
      world.warfare = warfare;
      const france = tileForInitialArmy(world, "巴黎盆地");
      const england = tileForInitialArmy(world, "英属加斯科涅");
      const ottoman = tileForInitialArmy(world, "奥斯曼比提尼亚");
      if (!france || !england || !ottoman) throw new Error("初始军团缺少部署地块");
      const franceArmy = addArmy(world, {
        owner: "法兰西王国",
        tileId: france.id,
        name: "法兰西王家军",
        units: [
          armyUnit("infantry", "levy", 5200, france.id, "peasants"),
          armyUnit("cavalry", "guard", 1200, france.id, "nobles", 1)
        ]
      });
      const englandArmy = addArmy(world, {
        owner: "英格兰王国",
