        tileId: england.id,
        name: "加斯科涅远征军",
        units: [
          armyUnit("infantry", "professional", 3600, england.id, "peasants", 1),
          armyUnit("cavalry", "levy", 900, england.id, "nobles")
        ]
      });
      const ottomanArmy = addArmy(world, {
        owner: "奥斯曼贝伊国",
        tileId: ottoman.id,
        name: "奥尔汗军团",
        units: [
          armyUnit("infantry", "professional", 4000, ottoman.id, "peasants", 1),
          armyUnit("cavalry", "guard", 1300, ottoman.id, "nobles", 1)
        ]
      });
      for (const army of [franceArmy, englandArmy, ottomanArmy]) {
        for (const unit of army.units.filter(candidate => candidate.serviceType === "levy")) {
          const source = world.tiles[unit.sourceTileId];
          const popCost = unit.soldiers / 1000;
          source.pop[unit.sourceEstate] = Math.max(0, source.pop[unit.sourceEstate] - popCost);
        }
      }
      return warfare;
    }

    function armiesAtTile(world, tileId) {
      return Object.values(world.warfare?.armies || {}).filter(army => army.tileId === tileId);
    }

    function worldNeighbors(world, id) {
      const tile = world.tiles[id];
      return world.tiles
        .filter(other => other.id !== id && Math.hypot(other.x - tile.x, other.y - tile.y) < HEX_R * 2.15)
        .map(other => other.id);
    }

    function terrainMoveCost(world, fromId, toId) {
      const target = world.tiles[toId];
      if (!target || target.isSea) return Infinity;
      if (target.terrain === "mountains" && target.climate === "alpine") return Infinity;
      if (world.roads.has(roadKey(fromId, toId))) return .5;
      return TERRAIN[target.terrain]?.move ?? Infinity;
    }

    function armyCanEnterTile(world, army, tile) {
      if (!tile || tile.isSea) return false;
      if (tile.controller === army.owner || areAtWar(army.owner, tile.controller, world)) return true;
      return hasMilitaryAccess(army.owner, tile.controller, world);
    }

    function planArmyRoute(world, armyId, targetTileId) {
      const army = world.warfare.armies[armyId];
      const target = world.tiles[targetTileId];
      if (!army || !target || !armyCanEnterTile(world, army, target)) return [];
      if (army.tileId === targetTileId) {
        army.plannedPath = [];
        army.order = "hold";
        return [];
      }
      const distances = new Map([[army.tileId, 0]]);
      const previous = new Map();
      const queue = [{ id: army.tileId, distance: 0 }];
      while (queue.length) {
        queue.sort((a, b) => a.distance - b.distance);
        const current = queue.shift();
        if (current.distance !== distances.get(current.id)) continue;
        if (current.id === targetTileId) break;
        for (const neighborId of worldNeighbors(world, current.id)) {
          const neighbor = world.tiles[neighborId];
          if (!armyCanEnterTile(world, army, neighbor)) continue;
          const cost = terrainMoveCost(world, current.id, neighborId);
          if (!Number.isFinite(cost)) continue;
          const nextDistance = current.distance + cost;
          if (nextDistance >= (distances.get(neighborId) ?? Infinity)) continue;
          distances.set(neighborId, nextDistance);
          previous.set(neighborId, current.id);
          queue.push({ id: neighborId, distance: nextDistance });
        }
      }
      if (!previous.has(targetTileId)) return [];
      const path = [];
      let cursor = targetTileId;
      while (cursor !== army.tileId) {
        path.unshift(cursor);
        cursor = previous.get(cursor);
      }
      army.plannedPath = path;
      army.order = "march";
      return path;
    }

    function planAiWarOrders(world) {
      for (const army of Object.values(world.warfare.armies)) {
        if (army.owner === world.playerPolity || army.status === "routed" || army.plannedPath.length) continue;
        const war = world.diplomacy.wars.find(item =>
          item.attackers.includes(army.owner) || item.defenders.includes(army.owner)
        );
        if (!war) continue;
        let targetTileId = null;
        if (war.attackers.includes(army.owner)) {
          targetTileId = war.primaryGoal.tileId;
        } else {
          const hostileOwners = war.attackers;
          const hostileArmies = Object.values(world.warfare.armies).filter(candidate =>
            hostileOwners.includes(candidate.owner)
          );
          const origin = world.tiles[army.tileId];
          const nearest = hostileArmies.sort((left, right) => {
            const leftTile = world.tiles[left.tileId];
            const rightTile = world.tiles[right.tileId];
            return Math.hypot(leftTile.x - origin.x, leftTile.y - origin.y)
              - Math.hypot(rightTile.x - origin.x, rightTile.y - origin.y);
          })[0];
          targetTileId = nearest?.tileId ?? war.primaryGoal.tileId;
        }
        if (targetTileId !== null) planArmyRoute(world, army.id, targetTileId);
      }
    }

    function hostileArmiesAtTile(world, owner, tileId) {
      return armiesAtTile(world, tileId).filter(army => areAtWar(owner, army.owner, world));
    }

    function enemyControlZone(world, owner, tileId) {
      return worldNeighbors(world, tileId).some(neighborId =>
        hostileArmiesAtTile(world, owner, neighborId).some(army => army.status !== "routed")
      );
    }

    function executeMovementPhase(world) {
      const moved = [];
      const encounters = [];
      const encounterKeys = new Set();
      const engagedArmyIds = new Set();
      const armies = Object.values(world.warfare.armies).sort((a, b) => a.id.localeCompare(b.id));
      for (const army of armies) {
        if (engagedArmyIds.has(army.id) || army.status === "routed" || !army.plannedPath.length) continue;
        let movement = army.order === "forced_march" ? 4 : 3;
        while (army.plannedPath.length) {
          const targetId = army.plannedPath[0];
          const cost = terrainMoveCost(world, army.tileId, targetId);
          if (!Number.isFinite(cost) || cost > movement) break;
          const defenders = hostileArmiesAtTile(world, army.owner, targetId);
          if (
            !defenders.length
            && enemyControlZone(world, army.owner, army.tileId)
            && enemyControlZone(world, army.owner, targetId)
          ) break;
          if (defenders.length) {
            const armyIds = [army.id, ...defenders.map(defender => defender.id)].sort();
            const key = `${targetId}:${armyIds.join(",")}`;
            if (!encounterKeys.has(key)) {
              encounterKeys.add(key);
              for (const armyId of armyIds) engagedArmyIds.add(armyId);
              encounters.push({
                id: `encounter-${world.turn}-${encounters.length + 1}`,
                tileId: targetId,
                armyIds,
                attackerIds: [army.id],
                defenderIds: defenders.map(defender => defender.id),
                terrain: world.tiles[targetId].terrain
              });
            }
            break;
          }
          const from = army.tileId;
          army.tileId = targetId;
          army.plannedPath.shift();
          movement -= cost;
          moved.push({ armyId: army.id, from, to: targetId });
          if (enemyControlZone(world, army.owner, targetId)) break;
        }
        if (!army.plannedPath.length) army.order = "hold";
      }
      return { moved, encounters };
    }

    function deterministicRandom(seed) {
      let value = (Number(seed) || 1) >>> 0;
      return () => {
        value = (Math.imul(value, 1664525) + 1013904223) >>> 0;
        return value / 4294967296;
      };
    }

    function battleWidth(terrain) {
      if (terrain === "mountains") return 6000;
      if (terrain === "forest" || terrain === "hills" || terrain === "wetland") return 8000;
      return 12000;
    }

    function combatUnitModifier(world, army, unit, tile, defending) {
      if (unit.combatType === "artillery" && !canRecruitCombatType(world, army.owner, "artillery")) return 0;
      if (unit.combatType === "infantry") {
        if (defending && ["forest","hills","mountains","wetland"].includes(tile.terrain)) return 1.12;
        return 1;
      }
      if (unit.combatType === "cavalry") {
        if (tile.terrain === "plains" || tile.terrain === "steppe") return 1.28;
        if (tile.terrain === "mountains" || tile.terrain === "forest" || tile.terrain === "wetland") return .62;
        return .9;
      }
      return tile.terrain === "mountains" ? .8 : 1.18;
    }

    function combatSidePower(world, armies, tile, defending) {
      const width = battleWidth(tile.terrain);
      const available = armies.reduce((sum, army) => sum + armyTotalSoldiers(army), 0);
      const engagedRatio = available > 0 ? Math.min(1, width / available) : 0;
      return armies.reduce((armyTotal, army) => {
        const readiness = (army.morale / 100) * .45 + (army.organization / 100) * .4 + (army.supply / 100) * .15;
        const general = army.generalId ? world.warfare.generals[army.generalId] : null;
        const command = general ? 1 + general.command * .02 : 1;
        const unitPower = army.units.reduce((total, unit) => {
          const experience = 1 + clamp(unit.experience, 0, 2) * .08;
          return total + unit.soldiers * engagedRatio
            * combatUnitModifier(world, army, unit, tile, defending)
            * experience;
        }, 0);
        return armyTotal + unitPower * readiness * command;
      }, 0);
    }

    function applyArmyCasualties(world, armies, casualties) {
      const total = armies.reduce((sum, army) => sum + armyTotalSoldiers(army), 0);
      if (!total || casualties <= 0) return;
      for (const army of armies) {
        const armyShare = armyTotalSoldiers(army) / total;
        let remainingLoss = Math.max(1, Math.round(casualties * armyShare));
        const unitTotal = armyTotalSoldiers(army);
        let actualLoss = 0;
        for (const unit of army.units) {
          const loss = Math.min(unit.soldiers - 1, Math.round(remainingLoss * unit.soldiers / unitTotal));
          unit.soldiers -= Math.max(0, loss);
          remainingLoss -= Math.max(0, loss);
          actualLoss += Math.max(0, loss);
          unit.experience = clamp(unit.experience + .08, 0, 2);
          const sourceTile = world.tiles[unit.sourceTileId];
          if (sourceTile && loss > 0) {
            sourceTile.warLosses = (sourceTile.warLosses || 0) + loss;
          }
        }
        if (army.mercenaryLoyalty !== undefined && actualLoss > 0) {
          army.mercenaryLoyalty = clamp(
            army.mercenaryLoyalty - Math.ceil(actualLoss / Math.max(1, unitTotal) * 30)
          );
        }
        const ownerCountry = world.countries[army.owner];
        if (ownerCountry) {
          ownerCountry.warfare.quarterCasualties =
            (ownerCountry.warfare.quarterCasualties || 0) + Math.round(casualties * armyShare);
        }
      }
    }

    function retreatArmy(world, army, battleTileId) {
      const destination = worldNeighbors(world, battleTileId)
        .map(id => world.tiles[id])
        .find(tile =>
          !tile.isSea
          && tile.controller === army.owner
          && !hostileArmiesAtTile(world, army.owner, tile.id).length
        );
      if (destination) {
        army.tileId = destination.id;
        army.status = army.morale <= 15 ? "routed" : "retreating";
      } else {
        army.status = "routed";
      }
      army.plannedPath = [];
      army.order = "hold";
    }

    function warForArmies(world, attackerArmies, defenderArmies) {
      for (const attacker of attackerArmies) {
        for (const defender of defenderArmies) {
          const war = world.diplomacy.wars.find(item =>
            item.attackers.includes(attacker.owner) && item.defenders.includes(defender.owner)
            || item.attackers.includes(defender.owner) && item.defenders.includes(attacker.owner)
          );
          if (war) return war;
        }
      }
      return null;
    }

    function resolveEncounter(world, encounter, seed = world.turn * 1000 + world.warfare.nextBattleId) {
      const tile = world.tiles[encounter.tileId];
      const attackers = encounter.attackerIds.map(id => world.warfare.armies[id]).filter(Boolean);
      const defenders = encounter.defenderIds.map(id => world.warfare.armies[id]).filter(Boolean);
      if (!attackers.length || !defenders.length) throw new Error("遭遇战缺少交战军团");
      const random = deterministicRandom(seed);
      const attackerPower = combatSidePower(world, attackers, tile, false);
      const defenderPower = combatSidePower(world, defenders, tile, true);
      const attackerOpportunity = .92 + random() * .16;
      const defenderOpportunity = .92 + random() * .16;
      const attackerScore = attackerPower * attackerOpportunity;
      const defenderScore = defenderPower * defenderOpportunity;
      const winner = attackerScore > defenderScore ? "attackers" : "defenders";
      const ratio = Math.max(attackerScore, defenderScore) / Math.max(1, Math.min(attackerScore, defenderScore));
      const upset = winner === "attackers" ? attackerPower < defenderPower : defenderPower < attackerPower;
      const attackerRate = winner === "attackers" ? .045 + random() * .025 : Math.min(.2, .09 + ratio * .025 + random() * .03);
      const defenderRate = winner === "defenders" ? .045 + random() * .025 : Math.min(.2, .09 + ratio * .025 + random() * .03);
      const attackerCasualties = Math.max(1, Math.round(attackers.reduce((sum, army) => sum + armyTotalSoldiers(army), 0) * attackerRate));
      const defenderCasualties = Math.max(1, Math.round(defenders.reduce((sum, army) => sum + armyTotalSoldiers(army), 0) * defenderRate));
      applyArmyCasualties(world, attackers, attackerCasualties);
      applyArmyCasualties(world, defenders, defenderCasualties);
      for (const army of attackers) {
        army.morale = clamp(army.morale - (winner === "attackers" ? 12 : 38));
        army.organization = clamp(army.organization - (winner === "attackers" ? 16 : 34));
      }
      for (const army of defenders) {
        army.morale = clamp(army.morale - (winner === "defenders" ? 12 : 38));
        army.organization = clamp(army.organization - (winner === "defenders" ? 16 : 34));
      }
      const losers = winner === "attackers" ? defenders : attackers;
      for (const army of losers) retreatArmy(world, army, encounter.tileId);
      const winners = winner === "attackers" ? attackers : defenders;
      for (const army of winners) {
        army.tileId = encounter.tileId;
        army.status = "ready";
        army.plannedPath = [];
        army.order = "hold";
      }
      const battle = {
        id:`battle-${world.warfare.nextBattleId++}`,
        turn:world.turn,
        tileId:encounter.tileId,
        winner,
        attackerOwners:[...new Set(attackers.map(army => army.owner))],
        defenderOwners:[...new Set(defenders.map(army => army.owner))],
        casualties:{ attackers:attackerCasualties, defenders:defenderCasualties },
        report:[
          `战场：${tile.name}，${TERRAIN[tile.terrain].label}，正面宽度 ${battleWidth(tile.terrain)}`,
          `进攻方有效战力 ${Math.round(attackerPower)}，防守方有效战力 ${Math.round(defenderPower)}`,
          `战机修正：进攻 ${attackerOpportunity.toFixed(2)}，防守 ${defenderOpportunity.toFixed(2)}`,
          upset ? "条件战机引发低概率逆转。" : "优势方保持了战场主动。",
          `伤亡：进攻方 ${attackerCasualties}，防守方 ${defenderCasualties}`
        ]
      };
      tile.devastation = clamp(tile.devastation + (attackerCasualties + defenderCasualties) / 150);
      world.warfare.battles.unshift(battle);
      const war = warForArmies(world, attackers, defenders);
      if (war) {
        const attackerWonForWar = battle.attackerOwners.some(owner => war.attackers.includes(owner))
          ? winner === "attackers"
          : winner === "defenders";
        war.score = clamp(war.score + (attackerWonForWar ? 6 : -6), -100, 100);
        for (const owner of winner === "attackers" ? battle.attackerOwners : battle.defenderOwners) {
          if (war.participants[owner]) war.participants[owner].contribution += 6;
        }
      }
      return battle;
    }

    function applyOccupation(world, army) {
      const tile = world.tiles[army.tileId];
      if (army.status === "routed" || army.status === "retreating") return false;
      if (!tile || tile.isSea || tile.controller === army.owner) return false;
      if (!areAtWar(army.owner, tile.controller, world)) return false;
      if (hostileArmiesAtTile(world, army.owner, tile.id).length) return false;
      tile.occupier = army.owner;
      if (tile.buildings.includes("fort") && tile.occupation < 100) {
        const general = army.generalId ? world.warfare.generals[army.generalId] : null;
        const artillerySoldiers = army.units.filter(u => u.combatType === "artillery").reduce((sum, u) => sum + u.soldiers, 0);
        let siegeGain = clamp(
          Math.floor(armyTotalSoldiers(army) / 1000) * 3 + (general?.siege || 0) * 2 + Math.floor(artillerySoldiers / 400) * 4,
          8,
          32
        );
        if (world.countries[tile.controller]?.technology.bastions) siegeGain = Math.round(siegeGain * .6);
        if (tile.city === "君士坦丁堡") siegeGain = Math.max(2, Math.round(siegeGain / 2));
        siegeGain = Math.max(2, siegeGain);
        tile.occupation = clamp(tile.occupation + siegeGain);
        tile.devastation = clamp(tile.devastation + .5);
        return tile.occupation >= 100;
      }
      tile.occupation = 100;
      return true;
    }

    function processOccupations(world) {
      for (const tile of world.tiles) {
        if (tile.isSea || !tile.occupier) continue;
        const occupyingArmies = armiesAtTile(world, tile.id).filter(army => army.owner === tile.occupier);
        if (occupyingArmies.length) {
          if (!tile.buildings.includes("fort") || tile.occupation >= 100) {
            tile.occupation = clamp(tile.occupation + 15);
          }
          tile.devastation = clamp(tile.devastation + 1);
          continue;
        }
        tile.occupation = clamp(tile.occupation - 15);
        if (tile.occupation <= 0) {
          tile.occupation = 0;
          tile.occupier = null;
        }
      }
    }

    function countryOccupiedPopulation(world, polity) {
      const owned = world.tiles.filter(tile => !tile.isSea && tile.controller === polity);
      const total = owned.reduce((sum, tile) => sum + sumPop(tile), 0);
      const occupied = owned
        .filter(tile => tile.occupier && tile.occupier !== polity && tile.occupation >= 100)
        .reduce((sum, tile) => sum + sumPop(tile), 0);
      return total ? occupied / total : 0;
    }

    function processWarState(world) {
      const participants = new Set(world.diplomacy.wars.flatMap(war => [...war.attackers, ...war.defenders]));
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!participants.has(polity)) {
          country.warfare.warExhaustion = clamp(country.warfare.warExhaustion - 1);
          country.warfare.quarterCasualties = 0;
          continue;
        }
        const casualties = country.warfare.quarterCasualties || 0;
        const occupiedShare = countryOccupiedPopulation(world, polity);
        country.warfare.warExhaustion = clamp(
          country.warfare.warExhaustion + casualties / 1000 + occupiedShare * 8 + .5
        );
        country.warfare.quarterCasualties = 0;
      }
      for (const war of world.diplomacy.wars) {
        if (!war.primaryGoal || !war.participants) continue;
        const goal = world.tiles[war.primaryGoal.tileId];
        const goalHeld = goal.occupation >= 100 && goal.occupier && war.attackers.includes(goal.occupier);
        if (goalHeld) war.score = clamp(war.score + 10, -100, 100);
        else if (goal.controller && war.defenders.includes(goal.controller) && !goal.occupier) {
          war.score = clamp(war.score - 1, -100, 100);
        }
        for (const [polity, participation] of Object.entries(war.participants)) {
          const country = world.countries[polity];
          const capitalTile = capital(polity, world);
          const capitalLost = capitalTile?.occupation >= 100
            && capitalTile.occupier
            && capitalTile.occupier !== polity;
          const goalEffect = participation.side === "attacker"
            ? (goalHeld ? 8 : -3)
            : (goalHeld ? -12 : 5);
          participation.warWill = clamp(
            85
            - country.warfare.warExhaustion * 1.4
            - (capitalLost ? 25 : 0)
            + goalEffect
          );
        }
      }
    }

    function peaceTermsCost(world, war, terms) {
      return terms.reduce((total, term) => {
        if (term.type === "status_quo") return total;
        if (term.type === "target_territory") {
          const tile = world.tiles[war.primaryGoal.tileId];
          return total + 30 + sumPop(tile) * 2;
        }
        if (term.type === "reparations") return total + Math.max(10, Math.ceil((term.amount || 0) * .2));
        throw new Error(`未知和平条款：${term.type}`);
      }, 0);
    }

    function canConcludePeace(world, war, actor, terms) {
      const actorIsAttacker = war.attackers.includes(actor);
      const availableScore = actorIsAttacker ? war.score : -war.score;
      const cost = peaceTermsCost(world, war, terms);
      if (cost > availableScore) return false;
      const statusQuoOnly = terms.every(term => term.type === "status_quo");
      if (!statusQuoOnly || actorIsAttacker) return true;
      const opposingLeader = war.warLeaderAttack;
      const opposingWill = war.participants[opposingLeader]?.warWill ?? 100;
      return opposingWill <= 45 || availableScore >= 10;
    }

    function concludePeace(world, warId, actor, terms) {
      const war = world.diplomacy.wars.find(item => item.id === warId);
      if (!war) throw new Error("战争不存在");
      const actorIsAttacker = war.attackers.includes(actor);
      const availableScore = actorIsAttacker ? war.score : -war.score;
      const cost = peaceTermsCost(world, war, terms);
      if (cost > availableScore) throw new Error("战争分数不足");
      if (!canConcludePeace(world, war, actor, terms)) throw new Error("对方尚未接受维持现状");
      for (const term of terms) {
        if (term.type === "target_territory") {
          const tile = world.tiles[war.primaryGoal.tileId];
          tile.controller = war.primaryGoal.claimant;
          tile.polity = war.primaryGoal.claimant;
          tile.occupier = null;
          tile.occupation = 0;
          tile.control = Math.min(tile.control, 35);
        }
        if (term.type === "reparations") {
          const payer = actorIsAttacker ? war.warLeaderDefense : war.warLeaderAttack;
          const receiver = actor;
          const amount = Math.min(term.amount || 0, world.countries[payer].money);
          world.countries[payer].money -= amount;
          world.countries[receiver].money += amount;
        }
      }
      const parties = [...new Set([...war.attackers, ...war.defenders])];
      for (const tile of world.tiles) {
        if (tile.occupier && parties.includes(tile.occupier) && parties.includes(tile.controller)) {
          tile.occupier = null;
          tile.occupation = 0;
        }
      }
      for (const party of parties) {
        const partyCountry = world.countries[party];
        if (partyCountry) pushChronicle(partyCountry, "battle", `${calendarLabel(world.turn)}：${war.name}议和`);
      }
      if (terms.some(term => term.type !== "status_quo") && world.countries[actor]) {
        world.countries[actor].stats.warsWon += 1;
      }
      world.diplomacy.wars = world.diplomacy.wars.filter(item => item.id !== warId);
      world.diplomacy.truces.push({
        id:`truce-${world.diplomacy.nextId++}`,
        parties,
        startsTurn:world.turn,
        endsTurn:world.turn + 20
      });
      return { warId, actor, terms, cost };
    }

    function devastationOutputFactor(tile) {
      return Math.max(.5, 1 - clamp(tile.devastation || 0) / 200);
    }

    function diplomacyPairKey(a, b) {
      if (!a || !b || a === b) throw new Error("双边外交关系需要两个不同国家");
      return [a, b].sort((x, y) => x.localeCompare(y, "zh-Hans-CN")).join("::");
    }

    function countryStrength(polity, world = state) {
      const country = world.countries[polity];
      if (!country) return 0;
      const territory = controlledTiles(polity, world);
      const population = territory.reduce((total, tile) => total + sumPop(tile), 0);
      const supportUnits = world.tiles.flatMap(tile => tile.units).filter(unit => unit.owner === polity).length;
      const soldiers = Object.values(world.warfare?.armies || {})
        .filter(army => army.owner === polity)
        .reduce((total, army) => total + armyTotalSoldiers(army), 0);
      return Math.round(population / 5 + territory.length * 2 + supportUnits * 2 + soldiers / 1000 * 4 + country.military * 2);
    }

    function countriesShareBorder(a, b, world = state) {
      const key = diplomacyPairKey(a, b);
      if (key in world.diplomacy.borderCache) return world.diplomacy.borderCache[key];
      const aTiles = controlledTiles(a, world);
      const bTiles = controlledTiles(b, world);
      const shares = aTiles.some(left => bTiles.some(right =>
        Math.hypot(left.x - right.x, left.y - right.y) < HEX_R * 2.15
      ));
      world.diplomacy.borderCache[key] = shares;
      return shares;
    }

    function areAtWar(a, b, world = state) {
      if (!a || !b || a === b || b === "海域" || !world?.diplomacy) return false;
      const rebelA = rebelTargetOf(a);
      const rebelB = rebelTargetOf(b);
      if (rebelA || rebelB) return rebelA === b || rebelB === a;
      return world.diplomacy.wars.some(war =>
        war.attackers.includes(a) && war.defenders.includes(b)
        || war.attackers.includes(b) && war.defenders.includes(a)
      );
    }

    function commonEnemies(a, b, world = state) {
      return playableCountries(world).filter(country =>
        country !== a && country !== b && areAtWar(a, country, world) && areAtWar(b, country, world)
      );
    }

    function initialRelationSide(viewer, target, world) {
      const viewerTiles = controlledTiles(viewer, world);
      const targetTiles = controlledTiles(target, world);
      const border = countriesShareBorder(viewer, target, world);
      const war = areAtWar(viewer, target, world);
      const viewerReligion = dominantValue(viewerTiles, tile => tile.religion);
      const targetReligion = dominantValue(targetTiles, tile => tile.religion);
      const sameGovernment = world.countries[viewer].government.type === world.countries[target].government.type;
      const ownStrength = Math.max(1, countryStrength(viewer, world));
      const targetStrength = countryStrength(target, world);
      const strengthPressure = clamp(Math.round((targetStrength / ownStrength - .75) * 18), 0, 35);
      return {
        trust: war ? 12 : 45,
        threat: clamp((border ? 12 : 4) + strengthPressure + (war ? 28 : 0), 0, 100),
        favor: 0,
        territorialConflict: war ? 55 : border ? 10 : 0,
        institutionalConflict: (viewerReligion === targetReligion ? 0 : 14) + (sameGovernment ? 0 : 5),
        strategicInterest: border ? 8 : 3,
        recentRefusalUntil: 0
      };
    }

    function emptyLeaderRelation() {
      return { friendship:0, respect:0, fear:0, grudge:0, kinship:false, promise:null };
    }

    function relationFor(a, b, world = state) {
      const key = diplomacyPairKey(a, b);
      if (!world.diplomacy.relations[key]) {
        world.diplomacy.relations[key] = {
          key,
          countries:[a, b],
          sides:{
            [a]:initialRelationSide(a, b, world),
            [b]:initialRelationSide(b, a, world)
          },
          leaders:{
            [a]:emptyLeaderRelation(),
            [b]:emptyLeaderRelation()
          }
        };
      }
      return world.diplomacy.relations[key];
    }

    function relationView(viewer, target, world = state) {
      return relationFor(viewer, target, world).sides[viewer];
    }

    function leaderRelationView(viewer, target, world = state) {
      return relationFor(viewer, target, world).leaders[viewer];
    }

    function relationshipScore(viewer, target, world = state) {
      if (areAtWar(viewer, target, world)) return -100;
      const relation = relationView(viewer, target, world);
      return Math.round(
        (relation.trust - 50)
        + relation.strategicInterest * .7
        + relation.favor * .25
        - relation.threat * .65
        - relation.territorialConflict * .75
        - relation.institutionalConflict * .35
      );
    }

    function diplomaticAttitude(viewer, target, world = state) {
      if (areAtWar(viewer, target, world)) return "war";
      const score = relationshipScore(viewer, target, world);
      if (score >= 28) return "close";
      if (score >= 10) return "cooperative";
      if (score >= -12) return "neutral";
      if (score >= -30) return "wary";
      if (score >= -52) return "rival";
      return "hostile";
    }

    function attitudeLabel(viewer, target, world = state) {
      return DIPLOMATIC_ATTITUDES[diplomaticAttitude(viewer, target, world)].label;
    }

    function diplomaticCapacity(polity, world = state) {
      const country = world.countries[polity];
      return 3
        + Math.floor(country.leader.abilities.diplomatic / 2)
        + Math.floor((country.government.reforms.political || 0) / 2)
        + (world.flags?.peaceOfFaith ? 1 : 0);
    }

    function treatiesFor(polity, world = state) {
      return world.diplomacy.treaties.filter(treaty => treaty.parties.includes(polity));
    }

    function treatyBetween(a, b, type = null, world = state) {
      return world.diplomacy.treaties.find(treaty =>
        treaty.parties.includes(a) && treaty.parties.includes(b) && (!type || treaty.type === type)
      );
    }

    function subjectsFor(polity, world = state) {
      return world.diplomacy.subjects.filter(subject => subject.overlord === polity || subject.subject === polity);
    }

    function subjectBetween(a, b, world = state) {
      return world.diplomacy.subjects.find(subject =>
        subject.overlord === a && subject.subject === b
        || subject.overlord === b && subject.subject === a
      );
    }

    function diplomaticCapacityUsed(polity, world = state) {
      const treatyCost = treatiesFor(polity, world).reduce((total, treaty) =>
        total + (TREATY_TYPES[treaty.type]?.capacity || 0), 0);
      const subjectCost = world.diplomacy.subjects.reduce((total, subject) =>
        total + (subject.overlord === polity ? SUBJECT_TYPES[subject.type].capacity : 0), 0);
      return treatyCost + subjectCost;
    }

    function activeMissions(polity, world = state) {
      return world.diplomacy.missions.filter(mission => mission.actor === polity);
    }

    function freeEnvoys(polity, world = state) {
      return Math.max(0, world.countries[polity].diplomacy.envoys - activeMissions(polity, world).length);
    }

    function organizationMemberships(polity, world = state) {
      return world.diplomacy.organizations
        .filter(organization => organization.members[polity])
        .map(organization => ({ organization, role:organization.members[polity] }));
    }

    function canRoyalMarriage(a, b, world = state) {
      const allowed = new Set(["monarchy", "empire", "tribal"]);
      return allowed.has(world.countries[a].government.type) && allowed.has(world.countries[b].government.type);
    }

    function independentDiplomacyRestriction(polity, counterpart, world = state) {
      const relation = world.diplomacy.subjects.find(subject => subject.subject === polity);
      if (!relation || relation.overlord === counterpart || relation.terms.diplomacy === "完全独立") return "";
      return `${polity}的独立外交受${relation.overlord}限制`;
    }

    function proposalEvaluation(actor, target, type, world = state) {
      const treatyType = TREATY_TYPES[type];
      const subjectType = SUBJECT_TYPES[type];
      if (!treatyType && !subjectType) throw new Error(`未知外交提案：${type}`);
      if (actor === target) return { available:false, reason:"不能对本国提出外交提案", score:0, threshold:999, parts:[] };
      if (areAtWar(actor, target, world)) return { available:false, reason:"交战期间不能提出该提案", score:0, threshold:999, parts:[] };
      if (treatyType && treatyBetween(actor, target, type, world)) {
        return { available:false, reason:"该契约已经存在", score:0, threshold:999, parts:[] };
      }
      if (subjectType && subjectBetween(actor, target, world)) {
        return { available:false, reason:"双方已经存在从属关系", score:0, threshold:999, parts:[] };
      }
      if (subjectType && world.diplomacy.subjects.some(subject => subject.subject === target)) {
        return { available:false, reason:"目标已经是其他国家的附属国", score:0, threshold:999, parts:[] };
      }
      if (subjectType) {
        const actorRestriction = independentDiplomacyRestriction(actor, target, world);
        if (actorRestriction) return { available:false, reason:actorRestriction, score:0, threshold:999, parts:[] };
      }
      if (treatyType) {
        const actorRestriction = independentDiplomacyRestriction(actor, target, world);
        if (actorRestriction) return { available:false, reason:actorRestriction, score:0, threshold:999, parts:[] };
        const targetRestriction = independentDiplomacyRestriction(target, actor, world);
        if (targetRestriction) return { available:false, reason:targetRestriction, score:0, threshold:999, parts:[] };
      }
      if (type === "marriage" && !canRoyalMarriage(actor, target, world)) {
        return { available:false, reason:"双方政体不支持王室联姻", score:0, threshold:999, parts:[] };
      }

      const relation = relationView(target, actor, world);
      const leader = leaderRelationView(target, actor, world);
      const targetStrength = Math.max(1, countryStrength(target, world));
      const actorStrength = countryStrength(actor, world);
      const strengthDifference = Math.round((actorStrength - targetStrength) / 5);
      const commonThreat = commonEnemies(actor, target, world).length * 12;
      const definition = treatyType || subjectType;
      const parts = [
        ["提案本身", definition.base],
        ["国家信任", Math.round((relation.trust - 50) * .7)],
        ["战略利益", Math.round(relation.strategicInterest * .55)],
        ["共同威胁", commonThreat],
        ["领导人关系", Math.round(leader.friendship * .35 + leader.respect * .25 - leader.grudge * .4)],
        ["国家威胁", -Math.round(relation.threat * .38)],
        ["领土矛盾", -Math.round(relation.territorialConflict * .42)],
        ["制度冲突", -Math.round(relation.institutionalConflict * .25)]
      ];
      if (type === "alliance") parts.push(["我方实力", Math.round(actorStrength / Math.max(18, targetStrength) * 8)]);
      if (subjectType) {
        parts.push(["实力差距", strengthDifference]);
        parts.push(["领导人恐惧", Math.round(leader.fear * .5)]);
        parts.push(["主权损失", type === "tributary" ? -10 : type === "vassal" ? -24 : -42]);
      }
      if (relation.recentRefusalUntil > world.turn) parts.push(["近期拒绝", -18]);
      const score = parts.reduce((total, [, value]) => total + value, 0);
      return {
        available:true,
        reason:"",
        score,
        threshold:definition.threshold,
        accepted:score >= definition.threshold,
        parts
      };
    }

    function addCountryLog(polity, message, world = state) {
      const country = world.countries[polity];
      if (!country) return;
      country.log.unshift(`${calendarLabel(world.turn)} · ${message}`);
      country.log = country.log.slice(0, 14);
    }

    function spendDiplomaticPoints(cost) {
      const country = activeCountry();
      if (country.actionPoints.diplomatic < cost) {
        toast(`需要外交点 ${cost}。`);
        return false;
      }
      country.actionPoints.diplomatic -= cost;
      return true;
    }

    function startDiplomaticMission(target, type = "improve") {
      const actor = state.playerPolity;
      if (actor === target) return toast("不能向本国派遣使节。");
      if (areAtWar(actor, target)) return toast("交战期间无法执行该使节任务。");
      if (activeMissions(actor).some(mission => mission.target === target && mission.type === type)) {
        return toast("该使节任务已经在执行。");
      }
      if (freeEnvoys(actor) <= 0) return toast("没有空闲使节。");
      if (type === "calm_subject") {
        const subject = state.diplomacy.subjects.find(item => item.overlord === actor && item.subject === target);
        if (!subject) return toast("目标不是本国附属国。");
      }
      if (!spendDiplomaticPoints(1)) return;
      state.diplomacy.missions.push({
        id:`mission-${state.diplomacy.nextId++}`,
        actor,
        target,
        type,
        startedTurn:state.turn
      });
      addCountryLog(actor, `向${target}派遣使节：${type === "calm_subject" ? "安抚附属国" : "改善关系"}。`);
      markTutorialFlag("envoySent");
      render();
    }

    function withdrawDiplomaticMission(id) {
      const mission = state.diplomacy.missions.find(item => item.id === id);
      if (!mission || mission.actor !== state.playerPolity) return;
      state.diplomacy.missions = state.diplomacy.missions.filter(item => item.id !== id);
      addCountryLog(state.playerPolity, `撤回驻${mission.target}使节。`);
      render();
    }

    function performLeaderDiplomacy(target, action) {
      const actor = state.playerPolity;
      if (areAtWar(actor, target)) return toast("交战期间不能执行该领导人行动。");
      const actorCountry = activeCountry();
      const targetView = relationView(target, actor);
      const targetLeader = leaderRelationView(target, actor);
      const actorLeader = leaderRelationView(actor, target);
      if (action === "gift") {
        if (actorCountry.money < 20) return toast("赠礼需要金钱 20。");
        if (!spendDiplomaticPoints(1)) return;
        actorCountry.money -= 20;
        targetView.trust = clamp(targetView.trust + 8);
        targetLeader.friendship = clamp(targetLeader.friendship + 5);
        const subject = state.diplomacy.subjects.find(item => item.overlord === actor && item.subject === target);
        if (subject) subject.loyalty = clamp(subject.loyalty + 5);
        addCountryLog(actor, `向${target}赠礼，改善国家与领导人关系。`);
      } else if (action === "meeting") {
        if (!spendDiplomaticPoints(1)) return;
        targetLeader.friendship = clamp(targetLeader.friendship + 7);
        targetLeader.respect = clamp(targetLeader.respect + 6);
        actorLeader.friendship = clamp(actorLeader.friendship + 4);
        actorLeader.respect = clamp(actorLeader.respect + 4);
        addCountryLog(actor, `与${target}领导人举行私人会晤。`);
      } else if (action === "threaten") {
        if (!spendDiplomaticPoints(1)) return;
        targetView.threat = clamp(targetView.threat + 9);
        targetLeader.fear = clamp(targetLeader.fear + 10);
        targetLeader.grudge = clamp(targetLeader.grudge + 7);
        targetView.trust = clamp(targetView.trust - 5);
        const subject = state.diplomacy.subjects.find(item => item.overlord === actor && item.subject === target);
        if (subject) subject.loyalty = clamp(subject.loyalty - 8);
        addCountryLog(actor, `公开威慑${target}，对方恐惧与宿怨上升。`);
      } else {
        throw new Error(`未知领导人外交行动：${action}`);
      }
      render();
      openCountryDetails(target, "diplomacy");
    }

    function proposeTreaty(target, type) {
      const actor = state.playerPolity;
      const definition = TREATY_TYPES[type];
      const evaluation = proposalEvaluation(actor, target, type);
      if (!evaluation.available) return toast(evaluation.reason);
      if (!spendDiplomaticPoints(definition.actionCost)) return;
      if (!evaluation.accepted) {
        const relation = relationView(target, actor);
        relation.trust = clamp(relation.trust - 2);
        relation.recentRefusalUntil = state.turn + 4;
        addCountryLog(actor, `${target}拒绝了${definition.label}提案。`);
        render();
        openCountryDetails(target, "diplomacy");
        return toast("对方拒绝提案。");
      }
      state.diplomacy.treaties.push({
        id:`treaty-${state.diplomacy.nextId++}`,
        type,
        parties:[actor, target],
        startedTurn:state.turn,
        minimumUntilTurn:state.turn + 4,
        endsTurn:state.turn + definition.duration,
        autoRenew:false
      });
      relationView(actor, target).trust = clamp(relationView(actor, target).trust + 5);
      relationView(target, actor).trust = clamp(relationView(target, actor).trust + 5);
      if (type === "marriage") {
        leaderRelationView(actor, target).kinship = true;
        leaderRelationView(target, actor).kinship = true;
      }
      addCountryLog(actor, `${target}接受${definition.label}。`);
      addCountryLog(target, `与${actor}签订${definition.label}。`);
      render();
      openCountryDetails(target, "diplomacy");
      toast(`${definition.label}已生效。`);
    }

    function terminateTreaty(id) {
      const treaty = state.diplomacy.treaties.find(item => item.id === id);
      if (!treaty || !treaty.parties.includes(state.playerPolity)) return;
      const other = treaty.parties.find(party => party !== state.playerPolity);
      const early = state.turn < treaty.minimumUntilTurn;
      const sanctity = state.flags.peaceOfFaith ? 2 : 1;
      relationView(other, state.playerPolity).trust = clamp(
        relationView(other, state.playerPolity).trust - (early ? 16 : 5) * sanctity
      );
      leaderRelationView(other, state.playerPolity).grudge = clamp(
        leaderRelationView(other, state.playerPolity).grudge + (early ? 10 : 3)
      );
      state.diplomacy.treaties = state.diplomacy.treaties.filter(item => item.id !== id);
      addCountryLog(state.playerPolity, `${early ? "提前撕毁" : "退出"}与${other}的${TREATY_TYPES[treaty.type].label}。`);
      render();
    }

    function proposeSubject(target, type) {
      const actor = state.playerPolity;
      const definition = SUBJECT_TYPES[type];
      const evaluation = proposalEvaluation(actor, target, type);
      if (!evaluation.available) return toast(evaluation.reason);
      if (!spendDiplomaticPoints(definition.actionCost)) return;
      if (!evaluation.accepted) {
        relationView(target, actor).trust = clamp(relationView(target, actor).trust - 5);
        relationView(target, actor).threat = clamp(relationView(target, actor).threat + 5);
        relationView(target, actor).recentRefusalUntil = state.turn + 6;
        addCountryLog(actor, `${target}拒绝成为${definition.label}。`);
        render();
        openCountryDetails(target, "diplomacy");
        return toast("对方拒绝从属要求。");
      }
      state.diplomacy.subjects.push({
        id:`subject-${state.diplomacy.nextId++}`,
        type,
        overlord:actor,
        subject:target,
        autonomy:definition.autonomy,
        loyalty:definition.loyalty,
        tribute:definition.tribute,
        terms:{ ...definition.terms },
        startedTurn:state.turn
      });
      addCountryLog(actor, `${target}成为本国的${definition.label}。`);
      addCountryLog(target, `本国成为${actor}的${definition.label}。`);
      render();
      openCountryDetails(target, "diplomacy");
      toast(`从属关系建立：${definition.label}。`);
    }

    function adjustSubjectControl(id, direction) {
      const subject = state.diplomacy.subjects.find(item => item.id === id);
      if (!subject || subject.overlord !== state.playerPolity) return;
      if (!spendDiplomaticPoints(1)) return;
      if (direction === "tighten") {
        subject.autonomy = clamp(subject.autonomy - 10);
        subject.loyalty = clamp(subject.loyalty - 12);
        subject.tribute = Math.min(4, subject.tribute + 1);
        relationView(subject.subject, subject.overlord).trust = clamp(
          relationView(subject.subject, subject.overlord).trust - 6
        );
        addCountryLog(subject.overlord, `收紧对${subject.subject}的控制：自主权下降，贡赋提高。`);
      } else if (direction === "loosen") {
        subject.autonomy = clamp(subject.autonomy + 10);
        subject.loyalty = clamp(subject.loyalty + 12);
        subject.tribute = Math.max(0, subject.tribute - 1);
        relationView(subject.subject, subject.overlord).trust = clamp(
          relationView(subject.subject, subject.overlord).trust + 5
        );
        addCountryLog(subject.overlord, `放宽${subject.subject}自治：忠诚提高，贡赋降低。`);
      } else {
        throw new Error(`未知从属控制方向：${direction}`);
      }
      updateSubjectTermsByAutonomy(subject);
      render();
      openCountryDetails(subject.subject, "diplomacy");
    }

    function updateSubjectTermsByAutonomy(subject) {
      if (subject.autonomy >= 70) {
        Object.assign(subject.terms, {
          diplomacy:"完全独立",
          war:"自由宣战",
          military:"不强制参战",
          finance:"固定贡赋",
          market:"独立市场",
          succession:"独立继承"
        });
        return;
      }
      if (subject.autonomy >= 40) {
        Object.assign(subject.terms, {
          diplomacy:"需宗主批准",
          war:"需宗主批准",
          military:"应召参战",
          finance:"固定贡赋",
          market:"优先宗主市场",
          succession:"宗主确认"
        });
        return;
      }
      Object.assign(subject.terms, {
        diplomacy:"禁止独立外交",
        war:"仅可防御",
        military:"强制参战",
        finance:"收入比例",
        market:"强制并入",
        succession:"宗主任命"
      });
    }

    function hasMilitaryAccess(actor, target, world = state) {
      return !!treatyBetween(actor, target, "access", world)
        || world.diplomacy.subjects.some(subject =>
          subject.overlord === actor && subject.subject === target
          || subject.overlord === target && subject.subject === actor
        );
    }

    function decayLeaderRelations(world, polity) {
      for (const relation of Object.values(world.diplomacy.relations)) {
        if (!relation.countries.includes(polity)) continue;
        for (const country of relation.countries) {
          const personal = relation.leaders[country];
          personal.friendship = Math.round(personal.friendship * .35);
          personal.respect = Math.round(personal.respect * .5);
          personal.fear = Math.round(personal.fear * .5);
          personal.grudge = Math.round(personal.grudge * .6);
          personal.promise = null;
        }
      }
    }

    function applyDefensiveAlliances(world) {
      for (const treaty of world.diplomacy.treaties.filter(item => item.type === "alliance")) {
        const [left, right] = treaty.parties;
        for (const war of world.diplomacy.wars) {
          if (war.defenders.includes(left) && !war.attackers.includes(right) && !war.defenders.includes(right)) {
            war.defenders.push(right);
            addCountryLog(right, `履行与${left}的防御同盟，加入${war.name}。`, world);
          }
          if (war.defenders.includes(right) && !war.attackers.includes(left) && !war.defenders.includes(left)) {
            war.defenders.push(left);
            addCountryLog(left, `履行与${right}的防御同盟，加入${war.name}。`, world);
          }
        }
      }
    }

    function processDiplomacy(world = state) {
      for (const mission of world.diplomacy.missions) {
        if (mission.type === "improve") {
          const relation = relationView(mission.target, mission.actor, world);
          relation.trust = clamp(relation.trust + 4);
          relation.threat = clamp(relation.threat - 2);
          relation.strategicInterest = clamp(relation.strategicInterest + 1, -100, 100);
        }
        if (mission.type === "calm_subject") {
          const subject = world.diplomacy.subjects.find(item =>
            item.overlord === mission.actor && item.subject === mission.target
          );
          if (subject) subject.loyalty = clamp(subject.loyalty + 4);
        }
      }

      const activeTreaties = [];
      for (const treaty of world.diplomacy.treaties) {
        if (world.turn >= treaty.endsTurn && !treaty.autoRenew) {
          for (const party of treaty.parties) {
            addCountryLog(party, `${TREATY_TYPES[treaty.type].label}到期。`, world);
          }
          continue;
        }
        if (treaty.type === "trade") {
          for (const party of treaty.parties) world.countries[party].money += 10;
        }
        activeTreaties.push(treaty);
      }
      world.diplomacy.treaties = activeTreaties;

      const survivingSubjects = [];
      for (const subject of world.diplomacy.subjects) {
        const subjectCountry = world.countries[subject.subject];
        const overlordCountry = world.countries[subject.overlord];
        if (subject.loyalty < 10) {
          if (!areAtWar(subject.subject, subject.overlord, world)) {
            const subjectCapital = capital(subject.subject, world);
            world.diplomacy.wars.push({
              id:`war-${world.diplomacy.nextId++}`,
              name:`${subject.subject}独立战争`,
              attackers:[subject.subject],
              defenders:[subject.overlord],
              warLeaderAttack: subject.subject,
              warLeaderDefense: subject.overlord,
              primaryGoal: subjectCapital ? { tileId: subjectCapital.id, label: `保卫${subjectCapital.name}`, claimant: subject.subject } : null,
              secondaryDemands: [],
              startedTurn: world.turn,
              truceUntilTurn: null,
              score: 0,
              participants: {
                [subject.subject]: { side: "attacker", contribution: 0, warWill: 85 },
                [subject.overlord]: { side: "defender", contribution: 0, warWill: 85 }
              }
            });
            pushWorldEvent(world, `${subject.subject}对${subject.overlord}发动独立战争`, "war");
          }
          addCountryLog(subject.subject, `拒绝宗主权并发动独立战争。`, world);
          addCountryLog(subject.overlord, `${subject.subject}宣布独立。`, world);
          continue;
        }
        const refusesTribute = subject.loyalty < 25;
        const paid = refusesTribute ? 0 : Math.min(subject.tribute, Math.max(0, subjectCountry.money));
        subjectCountry.money -= paid;
        overlordCountry.money += paid;
        if (refusesTribute) {
          subject.autonomy = clamp(subject.autonomy + 3);
          addCountryLog(subject.subject, `因忠诚过低拒绝向${subject.overlord}进贡。`, world);
        }
        subject.loyalty = clamp(subject.loyalty + (subject.type === "tributary" ? 1 : subject.type === "puppet" ? -2 : -1));
        if (subject.loyalty < 25) {
          relationView(subject.subject, subject.overlord, world).trust = clamp(
            relationView(subject.subject, subject.overlord, world).trust - 2
          );
        }
        survivingSubjects.push(subject);
      }
      world.diplomacy.subjects = survivingSubjects;
      applyDefensiveAlliances(world);

      for (const polity of playableCountries(world)) {
        const used = diplomaticCapacityUsed(polity, world);
        const total = diplomaticCapacity(polity, world);
        if (used <= total) continue;
        world.countries[polity].actionPoints.diplomatic = Math.max(
          0,
          world.countries[polity].actionPoints.diplomatic - 1
        );
        const partners = new Set([
          ...treatiesFor(polity, world).flatMap(treaty => treaty.parties),
          ...subjectsFor(polity, world).flatMap(subject => [subject.overlord, subject.subject])
        ]);
        partners.delete(polity);
        for (const partner of partners) {
          relationView(partner, polity, world).trust = clamp(relationView(partner, polity, world).trust - 1);
        }
      }
    }

    function genericEstateKey(kind, country = activeCountry()) {
      const keys = GOVERNMENT_TYPES[country?.government?.type || "monarchy"].estateKeys;
      const preferred = {
        nobles: ["nobles","patricians","orders","clans","port_nobles","princes"],
        merchants: ["merchants","citizens","guilds","companies","cities"],
        church: ["church","clergy","shamans","imperial_church"],
        peasants: ["peasants","commons","faithful","herders","sailors"],
        bureaucrats: ["bureaucrats","speaker","legate","kin","oligarchs","court","governors"]
      }[kind] || [];
      return preferred.find(k => keys.includes(k)) || keys[0];
    }

    function estateLabel(key) {
      const country = state?.countries ? activeCountry() : null;
      return country?.estates?.[key]?.label || ESTATE_LIBRARY[key]?.label || "无";
    }

    function estateColor(key) {
      return ESTATE_LIBRARY[key]?.color || "#d8cda8";
    }

    function estatePower(key) {
      const country = activeCountry();
      const direct = country.estates[key];
      if (direct) return direct.power;
      const generic = genericEstateKey(key, country);
      return country.estates[generic]?.power || 0;
    }

    function adjustEstate(key, delta, reason = "") {
      adjustEstateForCountry(activeCountry(), key, delta, reason);
    }

    function adjustEstateForCountry(country, key, delta, reason = "") {
      const actual = country.estates[key] ? key : genericEstateKey(key, country);
      const e = country.estates[actual];
      if (!e) return;
      if (delta.power) e.power = clamp(e.power + delta.power, 0, 100);
      if (delta.satisfaction) {
        const before = e.satisfaction;
        e.satisfaction = clamp(e.satisfaction + delta.satisfaction, -100, 100);
        const applied = e.satisfaction - before;
        if (applied && country.report) {
          country.report.estates.push({ key: actual, label: e.label, satisfaction: applied, reason: reason || "未注明" });
        }
        if (applied) {
          if (!country.echoLog) country.echoLog = [];
          country.echoLog.unshift({ turn: state?.turn || 0, kind: "estate", label: e.label, reason: reason || "未注明", amount: applied });
          country.echoLog = country.echoLog.slice(0, 30);
        }
        if (applied <= -5 && country.name === state?.playerPolity) {
          addCountryLog(country.name, `${e.label}满意度 ${applied}：${reason || "未注明"}。`);
        }
      }
      if (delta.privilege && !e.privileges.includes(delta.privilege)) e.privileges.push(delta.privilege);
    }

    function dominantEstateFor(tileLike) {
      if (tileLike.isSea) return null;
      if (tileLike.buildings?.includes("market") || tileLike.hydro === "coast" || tileLike.pop?.burghers >= 4) return "merchants";
      if (tileLike.buildings?.includes("monastery") || tileLike.pop?.clergy >= 3) return "church";
      if (tileLike.buildings?.includes("fort") || ["hills","mountains"].includes(tileLike.terrain) || tileLike.pop?.nobles >= 2) return "nobles";
      return "peasants";
    }

    function holdingForEstate(genericKey, tileLike) {
      if (tileLike.isSea) return null;
      if (genericKey === "merchants") return tileLike.hydro === "coast" ? "company_post" : "guildhall";
      if (genericKey === "church") return "church_land";
      if (genericKey === "nobles") return tileLike.terrain === "steppe" ? "tribal_camp" : "manor";
      if (genericKey === "peasants") return "free_commune";
      return null;
    }

    function localDemandFor(tile) {
      if (tile.isSea) return "";
      if (tile.control < 45) return "要求恢复秩序";
      const kind = canonicalEstateKind(tile.dominantEstate);
      if (kind === "merchants") return "要求贸易特权";
      if (kind === "nobles") return "要求保留地方司法";
      if (kind === "church") return "要求维护宗教权威";
      return "要求减轻劳役";
    }

    function newState() {
      const tiles = generateTiles();
      assignRegionLabels(tiles);
      placeUnit(tiles, "巴黎盆地", "admin", "法兰西王国");
      placeUnit(tiles, "诺曼底", "fleet", "法兰西王国");
      placeUnit(tiles, "英格兰南部", "fleet", "英格兰王国");
      const world = {
        turn: 1,
        playerPolity: "法兰西王国",
        countries: {},
        tiles,
        roads: new Set(),
        neighborCache: new Map(),
        selectedTile: tiles.find(t => t.city === "巴黎")?.id || tiles.find(t => t.name === "巴黎盆地").id,
        selectedUnit: null,
        nextUnit: 10,
        mapMode: "political",
        legendOpen: false,
        zoom: 1,
        viewCenter: { x: VIEW.w / 2, y: VIEW.h / 2 },
        pendingElection: null,
        diplomacy: null,
        warfare: null,
        gameOver: false,
        situations: [],
        worldEvents: [],
        trade: null,
        flags: {},
        eraIndex: 0,
        faithWarCount: 0,
        playerEvents: [],
        pendingCouncil: false,
        tutorial: { step: 0, flags: {} }
      };
      world.countries = Object.fromEntries(
        playableCountries(world).map(name => [name, createCountryState(name, tiles)])
      );
      world.diplomacy = createDiplomacyState(world);
      createWarfareState(world);
      resolveTradeNodes(world);
      processTrade(world);
      return world;
    }

    function assignRegionLabels(tiles) {
      const names = [...new Set(regionSeeds.map(s => s[0]))];
      for (const name of names) {
        const seed = regionSeeds.find(s => s[0] === name);
        if (!seed) continue;
        const cityName = CITY_BY_REGION[name] || "";
        const target = CITY_COORDS[cityName] || [seed[1], seed[2]];
        let best = null;
        let bestD = Infinity;
        for (const tile of tiles) {
          if (tile.name !== name) continue;
          const dx = (tile.lon - target[0]) * Math.cos(target[1] * Math.PI / 180);
          const dy = tile.lat - target[1];
          const d = dx*dx + dy*dy;
          if (d < bestD) {
            bestD = d;
            best = tile;
          }
        }
        if (best) {
          best.regionLabel = name;
          best.city = cityName;
          best.cityLon = target[0];
          best.cityLat = target[1];
          best.isCapitalArea = Boolean(cityName && CAPITAL_BY_POLITY[best.polity] === cityName);
          best.capitalMarker = best.isCapitalArea;
        }
      }
      placeConstantinople(tiles);
    }

    function placeConstantinople(tiles) {
      const target = CITY_COORDS["君士坦丁堡"];
      const candidates = tiles.filter(tile => !tile.isSea && isConstantinopleTargetTile(tile.lon, tile.lat));
      if (!candidates.length) throw new Error("未生成君士坦丁堡目标城市地块。");
      const best = candidates.sort((a, b) => {
        const ad = Math.hypot((a.lon - target[0]) * Math.cos(target[1] * Math.PI / 180), a.lat - target[1]);
        const bd = Math.hypot((b.lon - target[0]) * Math.cos(target[1] * Math.PI / 180), b.lat - target[1]);
        return ad - bd;
      })[0];
      for (const tile of tiles) {
        if (tile.city === "君士坦丁堡") {
          tile.city = "";
          tile.cityLon = null;
          tile.cityLat = null;
          tile.isCapitalArea = false;
          tile.capitalMarker = false;
          tile.regionLabel = "";
        }
      }
      Object.assign(best, {
        name: "君士坦丁堡",
        terrain: "coast",
        climate: "mediterranean",
        hydro: "coast",
        good: "spices",
        culture: "希腊",
        religion: "东正教",
        polity: "拜占庭帝国",
        controller: "拜占庭帝国",
        control: Math.max(best.control, 45),
        unrest: 0,
        buildings: ["market","port","fort"],
        city: "君士坦丁堡",
        cityLon: target[0],
        cityLat: target[1],
        isCapitalArea: true,
        capitalMarker: true,
        regionLabel: "君士坦丁堡"
      });
      best.dominantEstate = "merchants";
      best.estateControl = Math.max(best.estateControl || 0, 72);
      best.estateHolding = "guildhall";
      best.localDemand = localDemandFor(best);
    }

    function placeUnit(tiles, name, type, owner) {
      const candidates = tiles.filter(t => t.name === name);
      const tile = candidates.find(t => t.city) || candidates.sort((a,b) => b.control - a.control)[0];
      if (tile) tile.units.push({ id: Math.floor(Math.random()*100000), type, owner });
    }

    function sumPop(t) {
      return t.pop.peasants + t.pop.burghers + t.pop.nobles + t.pop.clergy;
    }

    function formatPop(value) {
      return Number.isInteger(value) ? String(value) : value.toFixed(1);
    }

    function clamp(v, min=0, max=100) {
      return Math.max(min, Math.min(max, v));
    }

    function hexPoints(cx, cy, r) {
      const pts = [];
      for (let i=0; i<6; i++) {
        const a = Math.PI / 180 * (60 * i + 30);
        pts.push(`${(cx + r*Math.cos(a)).toFixed(1)},${(cy + r*Math.sin(a)).toFixed(1)}`);
      }
      return pts.join(" ");
    }

    function neighbors(id) {
      if (state.neighborCache.has(id)) return state.neighborCache.get(id);
      const t = state.tiles[id];
      const result = state.tiles
        .filter(o => o.id !== id && Math.hypot(o.x - t.x, o.y - t.y) < HEX_R * 2.15)
        .map(o => o.id);
      state.neighborCache.set(id, result);
      return result;
    }

    function roadKey(a,b) {
      return [a,b].sort((x,y)=>x-y).join("-");
    }

    function areHostile(a, b) {
      return areAtWar(a, b);
    }

    function tileRelation(tile, polity = state.playerPolity) {
      if (tile.isSea) return "sea";
      if (tile.controller === polity) return "player";
      return areHostile(polity, tile.controller) ? "enemy" : "neutral";
    }

    function capital(polity = state.playerPolity, world = state) {
      const capitalName = CAPITAL_BY_POLITY[polity];
      return world.tiles.find(tile => tile.city === capitalName && tile.controller === polity)
        || world.tiles.find(tile => tile.controller === polity && !tile.isSea);
    }

    function proximity(tile, polity = state.playerPolity, distanceMap = null) {
      if (distanceMap) return distanceMap.get(tile.id) ?? 9;
      const cap = capital(polity);
      if (!cap || tile.isSea) return tile.isSea ? 1 : 9;
      const q = [{ id: cap.id, d: 0 }];
      const seen = new Set([cap.id]);
      while (q.length) {
        const cur = q.shift();
        if (cur.id === tile.id) return cur.d;
        for (const n of neighbors(cur.id)) {
          if (seen.has(n)) continue;
          const nt = state.tiles[n];
          if (nt.isSea) continue;
          const cost = state.roads.has(roadKey(cur.id,n)) ? 1 : TERRAIN[nt.terrain].move;
          seen.add(n);
          q.push({ id:n, d:cur.d + cost });
        }
      }
      return 9;
    }

    function buildProximityMap(polity) {
      const cap = capital(polity);
      const distances = new Map();
      if (!cap) return distances;
      const heap = [{ id: cap.id, distance: 0 }];
      distances.set(cap.id, 0);
      while (heap.length) {
        const current = popDistanceHeap(heap);
        if (current.distance !== distances.get(current.id)) continue;
        for (const neighborId of neighbors(current.id)) {
          const tile = state.tiles[neighborId];
          if (tile.isSea) continue;
          const cost = state.roads.has(roadKey(current.id, neighborId)) ? 1 : TERRAIN[tile.terrain].move;
          const nextDistance = current.distance + cost;
          if (nextDistance >= (distances.get(neighborId) ?? Infinity)) continue;
          distances.set(neighborId, nextDistance);
          pushDistanceHeap(heap, { id: neighborId, distance: nextDistance });
        }
      }
      return distances;
    }

    function pushDistanceHeap(heap, item) {
      heap.push(item);
      let index = heap.length - 1;
      while (index > 0) {
        const parent = Math.floor((index - 1) / 2);
        if (heap[parent].distance <= item.distance) break;
        heap[index] = heap[parent];
        index = parent;
      }
      heap[index] = item;
    }

    function popDistanceHeap(heap) {
      const root = heap[0];
      const tail = heap.pop();
      if (!heap.length) return root;
      let index = 0;
      while (true) {
        const left = index * 2 + 1;
        const right = left + 1;
        if (left >= heap.length) break;
        const child = right < heap.length && heap[right].distance < heap[left].distance ? right : left;
        if (heap[child].distance >= tail.distance) break;
        heap[index] = heap[child];
        index = child;
      }
      heap[index] = tail;
      return root;
    }

    function output(tile, polity = state.playerPolity, distanceMap = null) {
      if (tile.controller !== polity) return { food:0, money:0, military:0, control:tile.control, proximity: proximity(tile, polity, distanceMap) };
      if (tile.occupation >= 100 && tile.occupier && tile.occupier !== polity) {
        return { food:0, money:0, military:0, control:tile.control, proximity: proximity(tile, polity, distanceMap) };
      }
      if (tile.isSea) {
        const portBonus = neighbors(tile.id).some(n => state.tiles[n].controller === polity && state.tiles[n].buildings.includes("port")) ? 1 : 0;
        return { food: 1, money: portBonus, military: 0, control: tile.control, proximity: 1 };
      }
      const terrain = TERRAIN[tile.terrain];
      const climate = CLIMATE[tile.climate];
      const good = GOODS[tile.good][1];
      const buildings = tile.buildings.reduce((acc,b) => {
        const x = BUILDINGS[b];
        acc.food += x.food; acc.money += x.money; acc.military += x.military; acc.control += x.control;
        return acc;
      }, { food:0, money:0, military:0, control:0 });
      const prox = proximity(tile, polity, distanceMap);
      const marketAccess = tile.buildings.includes("market") || tile.hydro === "coast" ? 1 : prox <= 4 ? 0 : -1;
      const controlRate = clamp(tile.control + buildings.control, 0, 100) / 100;
      const hydroFood = tile.hydro === "river" || tile.hydro === "coast" ? 1 : 0;
      const hydroMoney = tile.hydro === "coast" ? 1 : 0;
      const food = terrain.food + climate.food + hydroFood + tile.pop.peasants + buildings.food + (good === "food" ? 2 : 0) - (tile.tempPenalty || 0);
      const money = terrain.money + hydroMoney + tile.pop.burghers + buildings.money + (good === "money" ? 2 : 0) + marketAccess;
      const military = terrain.military + tile.pop.nobles + buildings.military + (good === "military" ? 2 : 0);
      const devastationFactor = devastationOutputFactor(tile);
      return {
        food: Math.max(0, Math.floor(food * controlRate * devastationFactor)),
        money: Math.max(0, Math.floor(money * controlRate * devastationFactor)),
        military: Math.max(0, Math.floor(military * controlRate * devastationFactor)),
        control: Math.round(controlRate * 100),
        proximity: prox
      };
    }

    function governmentColorForTile(tile, world = state) {
      if (tile.isSea || tile.controller === "海域") return POLITY_COLORS["海域"];
      const governmentType = world.countries[tile.controller]?.government.type;
      if (!governmentType) throw new Error(`地块控制国缺少国家状态：${tile.controller}`);
      return GOVERNMENT_COLORS[governmentType];
    }

    function dynastyColor(dynasty) {
      if (!dynasty) throw new Error("家族地图缺少家族名称");
      let hash = 2166136261;
      for (let i = 0; i < dynasty.length; i++) {
        hash ^= dynasty.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      const unsigned = hash >>> 0;
      const hue = unsigned % 360;
      const saturation = 45 + ((unsigned >>> 8) % 21);
      const lightness = 43 + ((unsigned >>> 16) % 17);
      return `hsl(${hue} ${saturation}% ${lightness}%)`;
    }

    function dynastyColorForTile(tile, world = state) {
      if (tile.isSea || tile.controller === "海域") return POLITY_COLORS["海域"];
      const dynasty = world.countries[tile.controller]?.leader.dynasty;
      if (!dynasty) throw new Error(`地块控制国缺少领导人家族：${tile.controller}`);
      return dynastyColor(dynasty);
    }

    function selectedUnitData() {
      if (!state.selectedUnit) return null;
      const army = state.warfare?.armies[state.selectedUnit];
      if (army) {

      for (const t of state.tiles) {

        if (u) return { kind:"support", unit: u, tile: t };
      }
      return null;
    }

    function renderMap() {
      const svg = document.getElementById("mapSvg");
      svg.innerHTML = "";
      applyZoomViewBox();
      renderMapFog(svg);
      svg.appendChild(node("rect", { x:0, y:0, width:VIEW.w, height:VIEW.h, class:"map-base" }));
      for (const poly of landPolygons) {
        const pts = poly.map(([lon,lat]) => {
          const p = project(lon,lat);
          return `${p.x.toFixed(1)},${p.y.toFixed(1)}`;
        }).join(" ");
        svg.appendChild(node("polygon", { points: pts, class: "coastline" }));
      }
      for (const key of state.roads) {
        const [a,b] = key.split("-").map(Number);
        const line = node("line", { x1:state.tiles[a].x, y1:state.tiles[a].y, x2:state.tiles[b].x, y2:state.tiles[b].y, class:"road" });

      for (const t of state.tiles) {
        const occupationClass = t.occupation >= 100 ? "occupied" : t.occupier ? "sieged" : "";

        const poly = node("polygon", {
          points: hexPoints(t.x,t.y,HEX_R),
          fill: tileFill(t),
          class: cls,
          "data-tile-id": t.id

      if (state.mapMode === "trade" && state.trade) renderTradeOverlay(svg);
      for (const t of state.tiles) {

        const text = node("text", { x:p.x, y:p.y+8, class:`hex-label ${t.isSea ? "sea-text" : ""}` });
        text.textContent = t.isSea ? shortName(t.name) : shortName(t.city || t.name);
        svg.appendChild(text);
      }
      for (const t of state.tiles) {
        t.units.forEach((u, idx) => {
          const ux = t.x - 11 + idx * 18;

          const c = node("circle", {
            cx:ux, cy:uy, r:11,

            class:`unit ${state.selectedUnit === u.id ? "active" : ""}`
          });
          c.onclick = ev => {
            ev.stopPropagation();
            if (u.owner !== state.playerPolity) return toast("只能选择当前国家的单位。");

            state.selectedTile = t.id;
            render();
          };
          svg.appendChild(c);
          const label = node("text", { x:ux, y:uy+1, class:"unit-text" });
          label.textContent = u.type === "army" ? "兵" : u.type === "admin" ? "官" : "舰";
          svg.appendChild(label);
        });
      }
      for (const army of Object.values(state.warfare.armies)) {
        const tile = state.tiles[army.tileId];
        if (!tile) continue;
        const c = node("circle", {
          cx:tile.x + 8,
          cy:tile.y + 15,
          r:12,
          fill: army.owner === state.playerPolity ? "#c16b4a" : areHostile(state.playerPolity, army.owner) ? "#9a4433" : "#8d8776",
          class:`unit ${state.selectedUnit === army.id ? "active" : ""}`
        });
        c.onclick = ev => {
          ev.stopPropagation();
          state.selectedUnit = army.id;
          state.selectedTile = army.tileId;
          render();
          openArmyDrawer();
        };
        svg.appendChild(c);
        const label = node("text", { x:tile.x + 8, y:tile.y + 16, class:"unit-text" });
        label.textContent = `${Math.max(1, Math.round(armyTotalSoldiers(army) / 1000))}`;
        svg.appendChild(label);
      }
      for (const [name, lon, lat] of labels) {
        const p = project(lon,lat);
        const tx = node("text", { x:p.x, y:p.y, class:"label-major" });
        tx.textContent = name;
        svg.appendChild(tx);
      }

    function renderTradeOverlay(svg) {
      for (const route of TRADE_ROUTES) {
        if (route.locked) continue;
        const data = state.trade.routes[route.key];
        if (!data) continue;
        const color = TRADE_ROUTE_COLORS[route.key] || "#888";
        const nodeTiles = route.nodes
          .filter(n => n.tileId !== null && n.tileId !== undefined)
          .map(n => ({ spec: n, tile: state.tiles[n.tileId] }));
        if (!nodeTiles.length) continue;
        const points = nodeTiles.map(({ tile }) => ({ x: tile.x, y: tile.y }));
        const entry = TRADE_MAP_ENTRY[route.key];
        if (entry) points.unshift(tradeEntryPoint(entry.side, points[0]));
        const width = Math.min(6, 1.2 + (data.flow || 0) / 35);
        const path = node("polyline", {
          points: points.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(" "),
          fill: "none",
          stroke: color,
          "stroke-width": width.toFixed(1),
          "stroke-linecap": "round",
          "stroke-linejoin": "round",
          opacity: ".82",
          "stroke-dasharray": (data.cost || 1) >= 1.3 ? "7 5" : "none",
          style: "pointer-events:visibleStroke;cursor:pointer"
        });
        const tip = node("title", {});
        tip.textContent = `${route.label}：流量 ${data.flow || 0} · 成本 ×${(data.cost || 1).toFixed(2)}${(data.cost || 1) >= 1.3 ? "（受阻）" : ""}`;
        path.appendChild(tip);
        path.onclick = () => openDrawer("trade");
        svg.appendChild(path);
        if (entry) {
          const p0 = points[0];
          svg.appendChild(node("circle", { cx: p0.x, cy: p0.y, r: 3.4, fill: color, stroke: "#2b2116", "stroke-width": ".8", opacity: ".9" }));
          const lbl = node("text", {
            x: clamp(p0.x, 30, VIEW.w - 30),
            y: clamp(p0.y - 7, 14, VIEW.h - 6),
            "text-anchor": "middle",
            style: `font-size:11px;font-weight:700;fill:${color};paint-order:stroke;stroke:#f4ead0;stroke-width:3px;pointer-events:none`
          });
          lbl.textContent = entry.label;
          svg.appendChild(lbl);
        }
        for (const { spec, tile } of nodeTiles) {
          const controller = tile.controller;
          const policy = tradePolicyOf(controller, state);
          const mult = policy === "high" ? 1.5 : policy === "low" ? .7 : 1;
          const gain = Math.round((data.flow || 0) * spec.share * mult);
          const dot = node("circle", {
            cx: tile.x, cy: tile.y,
            r: Math.min(8, 2.6 + gain / 5),
            fill: color,
            stroke: controller === state.playerPolity ? "#c99a31" : "#2b2116",
            "stroke-width": controller === state.playerPolity ? "2" : ".9",
            opacity: ".88",
            style: "pointer-events:visible;cursor:pointer"
          });
          const dotTip = node("title", {});
          dotTip.textContent = `${tile.city}（${controller}）：${route.label}节点收益 +${gain}/季`;
          dot.appendChild(dotTip);
          dot.onclick = () => onTile(tile.id);
          svg.appendChild(dot);
        }
      }
    }

    function renderMapFog(svg) {
      const m = 1800;
      const fogRects = [
        { x:-m, y:-m, width:VIEW.w + m * 2, height:m },
        { x:-m, y:VIEW.h, width:VIEW.w + m * 2, height:m },
        { x:-m, y:0, width:m, height:VIEW.h },
        { x:VIEW.w, y:0, width:m, height:VIEW.h }
      ];
      for (const rect of fogRects) svg.appendChild(node("rect", { ...rect, class:"map-fog" }));
    }

    function renderZoom() {
      document.getElementById("zoomRead").textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function setZoom(nextZoom, focus) {
      const oldZoom = state.zoom;
      const clamped = Math.max(0.65, Math.min(2.8, nextZoom));
      if (Math.abs(clamped - oldZoom) < 0.001) return;
      if (focus) {
        const oldW = VIEW.w / oldZoom;
        const oldH = VIEW.h / oldZoom;
        const oldLeft = state.viewCenter.x - oldW / 2;
        const oldTop = state.viewCenter.y - oldH / 2;
        const fx = oldLeft + focus.rx * oldW;
        const fy = oldTop + focus.ry * oldH;
        const newW = VIEW.w / clamped;
        const newH = VIEW.h / clamped;
        state.viewCenter.x = fx - focus.rx * newW + newW / 2;
        state.viewCenter.y = fy - focus.ry * newH + newH / 2;
      }
      state.zoom = clamped;
      clampViewCenter();
      applyZoomViewBox();
      renderZoom();
    }

    function panView(dx, dy) {
      state.viewCenter.x += dx;
      state.viewCenter.y += dy;
      clampViewCenter();
      applyZoomViewBox();
    }

    function panByScreenDelta(dx, dy) {
      const svg = document.getElementById("mapSvg");
      const box = svg.getBoundingClientRect();
      const viewW = VIEW.w / state.zoom;
      const viewH = VIEW.h / state.zoom;
      panView(-dx / box.width * viewW, -dy / box.height * viewH);
    }

    function focusFromClient(svg, clientX, clientY) {
      const box = svg.getBoundingClientRect();
      return {
        rx: (clientX - box.left) / box.width,
        ry: (clientY - box.top) / box.height
      };
    }

    function clampViewCenter() {
      const w = VIEW.w / state.zoom;
      const h = VIEW.h / state.zoom;
      state.viewCenter.x = w >= VIEW.w
        ? VIEW.w / 2
        : Math.max(w / 2, Math.min(VIEW.w - w / 2, state.viewCenter.x));
      state.viewCenter.y = h >= VIEW.h
        ? VIEW.h / 2
        : Math.max(h / 2, Math.min(VIEW.h - h / 2, state.viewCenter.y));
    }

    function applyZoomViewBox() {
      const svg = document.getElementById("mapSvg");
      const w = VIEW.w / state.zoom;
      const h = VIEW.h / state.zoom;
      clampViewCenter();
      const x = state.viewCenter.x - w / 2;
      const y = state.viewCenter.y - h / 2;
      svg.setAttribute("viewBox", `${x.toFixed(1)} ${y.toFixed(1)} ${w.toFixed(1)} ${h.toFixed(1)}`);
    }

    function renderModebar() {
      const bar = document.getElementById("modebar");
      bar.innerHTML = Object.entries(MAP_MODES).map(([key, label]) =>

          .map(polity => state.countries[polity].leader.dynasty))]

        el.innerHTML = dynasties
          .map(dynasty => `<span><i class="sw" style="background:${dynastyColor(dynasty)}"></i>${dynasty}</span>`)
          .join("");

      }
      if (mode === "population") {
        el.innerHTML = `
          <span><i class="sw" style="background:#f0ead6"></i>0</span>
          <span><i class="sw" style="background:#d8d59d"></i>1-3</span>
          <span><i class="sw" style="background:#b8c783"></i>4-7</span>
          <span><i class="sw" style="background:#7fa760"></i>8-11</span>

          <span>颜色越深 POP 越多</span>
        `;

      if (mode === "estates") {
        const visible = [...new Set(state.tiles.map(t => t.dominantEstate).filter(Boolean))];
        el.innerHTML = visible
          .map(key => `<span><i class="sw" style="background:${estateColor(key)}"></i>${estateLabel(key)}</span>`)
          .join("") + "<span>颜色表示地块主导阶层</span>";

        .map(([k,v]) => `<span><i class="sw" style="background:${GOODS_COLORS[k]}"></i>${v[0]}</span>`)
