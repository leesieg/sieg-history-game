        { label: "威望", value: country.missionsDone.length * 25 + country.stats.battlesWon * 5 + country.stats.warsWon * 15 + country.stats.revoltsQuelled * 10, hint: "使命·战功·安内" }
      ];
    }

    function openEpic(reasonTitle) {
      const country = activeCountry();
      document.getElementById("epicTitle").textContent = reasonTitle || (country.eliminated ? "帝国落幕" : "国家史诗");
      const calendar = calendarForTurn(state.turn);
      document.getElementById("epicSub").textContent = `${country.name} · 1337 年春 — ${calendar.year} 年${seasonName(calendar.quarter)}`;
      const timeline = country.chronicle.slice(-14).map(c => `<div class="gl-epic-line"><b>${calendarLabel(c.turn)}</b> ${c.text.replace(/^[^：]*：/, "")}</div>`).join("") || '<div class="gl-epic-line">这个国家安静地度过了它的岁月。</div>';
      const scores = epicScores(country).map(score => `<div class="gl-score"><small>${score.label}</small><strong>${score.value}</strong><small>${score.hint}</small></div>`).join("");
      let causeHtml = "";
      if (country.eliminated) {
        const causeChain = country.chronicle.filter(c => ["revolt", "estate", "end", "battle", "situation"].includes(c.type)).slice(-5);
        causeHtml = `<div class="gl-section"><h3>死因解剖</h3>${causeChain.map(c => `<div class="gl-epic-line">${c.text}</div>`).join("")}<div class="gl-row gl-warn-red"><span>终局裁定：${state.endingCause || "王统断绝"}</span></div></div>`;
      }
      const hook = country.eliminated ? "若当初在御前会议上多听一句预警，历史是否会转向？" : "功业未竟，王国仍在。";
      const others = playableCountries().filter(p => p !== country.name && !state.countries[p]?.eliminated);
      const suggestion = others.length ? others[(state.turn * 7) % others.length] : "英格兰王国";
      document.getElementById("epicBody").innerHTML = `
        <div class="gl-section"><h3>四轴评分</h3><div class="gl-score-grid">${scores}</div></div>
        <div class="gl-section"><h3>编年史</h3>${timeline}</div>
        ${causeHtml}
        <div class="gl-section"><h3>编年史家曰</h3><div>${hook} 下一局不妨执掌「${suggestion}」，从另一端改写这段历史。</div></div>
      `;
      document.getElementById("epicWrap").classList.add("show");
    }

    function polityHash(name) {
      let hash = 0;
      for (const ch of name) hash = (hash * 31 + ch.codePointAt(0)) % 997;
      return hash;
    }

    function spendAiPoint(country, type) {
      if (country.actionPoints[type] > 0) { country.actionPoints[type] -= 1; return true; }
      return false;
    }

    function aiPickBuilding(tile) {
      if (tile.hydro === "coast" && !tile.buildings.includes("port")) return "port";
      if (["iron","gold","salt"].includes(tile.good) && !tile.buildings.includes("mine")) return "mine";
      if (sumPop(tile) >= 7 && !tile.buildings.includes("market")) return "market";
      if (!tile.buildings.includes("fort")) return "fort";
      if (!tile.buildings.includes("farm")) return "farm";
      return null;
    }

    function runAiGovernance(world) {
      for (const polity of playableCountries(world)) {
        if (polity === world.playerPolity) continue;
        const country = world.countries[polity];
        if (!country || country.eliminated) continue;
        aiGovernCountry(world, polity, country);
      }
    }

    function aiGovernCountry(world, polity, country) {
      const territory = controlledTiles(polity, world);
      if (!territory.length) return;
      const worst = Object.entries(country.estates)
        .map(([key, estate]) => ({ key, estate }))
        .sort((a, b) => a.estate.satisfaction - b.estate.satisfaction)[0];
      if (worst && worst.estate.satisfaction <= -30 && spendAiPoint(country, "administrative")) {
        const kind = canonicalEstateKind(worst.key);
        if (kind === "peasants" && country.food >= 30) {
          country.food -= 30;
          adjustEstateForCountry(country, worst.key, { satisfaction: 12 }, "减免劳役");
        } else if (country.money >= 30) {
          country.money -= 30;
          adjustEstateForCountry(country, worst.key, { satisfaction: 10 }, "厚赏安抚");
        }
      }
      if (country.food < 20 && !militaryWarsFor(polity, world).length) {
        const levyArmy = Object.values(world.warfare.armies).find(army =>
          army.owner === polity && army.units.some(unit => unit.serviceType === "levy"));
        if (levyArmy) { try { demobilizeLevies(world, levyArmy.id); } catch (error) {} }
      }
      if (country.money >= 60 && spendAiPoint(country, "administrative")) {
        const tile = territory.slice().sort((a, b) => sumPop(b) - sumPop(a)).find(t => aiPickBuilding(t));
        if (tile) {
          const building = aiPickBuilding(tile);
          country.money -= 20;
          tile.buildings.push(building);
          if (building === "market") {
            tile.dominantEstate = "merchants";
            adjustEstateForCountry(country, "merchants", { satisfaction: 4, power: 2 }, "兴建市场");
          }
          if (building === "fort") {
            tile.dominantEstate = "nobles";
            adjustEstateForCountry(country, "nobles", { satisfaction: 4, power: 2 }, "兴建要塞");
          }
        }
      }
      const low = territory.filter(t => t.control < 50).sort((a, b) => a.control - b.control)[0];
      if (low && spendAiPoint(country, "administrative")) {
        low.control = clamp(low.control + 15);
        low.unrest = Math.max(0, low.unrest - 1);
      }
      if (country.legitimacy < 40 && country.money >= 40 && spendAiPoint(country, "administrative")) {
        country.money -= 40;
        changeLegitimacy(country, 8, "加冕巡游");
      }
      if (country.plagueTouched && !country.laborSettled && world.turn - (country.plagueTouchedTurn || 0) >= 8) {
        const structure = laborStructure(polity, world);
        if (structure.west >= .3 || structure.east >= .25) {
          applyLaborPath(world, country, structure.east > structure.west ? "serfdom" : "free");
        }
      }
      if (world.flags.reformation && !country.stateProtestant) {
        const share = convertedShare(polity, world);
        const churchKey = Object.keys(country.estates).find(k => canonicalEstateKind(k) === "church");
        const churchPower = churchKey ? country.estates[churchKey].power : 30;
        if (share >= .5 && churchPower < 45) {
          for (const tile of controlledTiles(polity, world)) tile.religion = "新教";
          country.stateProtestant = true;
          country.money += 80;
          setLaw(country, "religion", "新教国教");
          adjustEstateForCountry(country, "church", { satisfaction: -25, power: -10 }, "与罗马决裂");
          pushWorldEvent(world, `${polity}改宗新教国教`, "era");
        } else if (share > 0 && share < .3 && churchPower >= 50 && country.military >= 20) {
          country.military -= 20;
          const target = controlledTiles(polity, world).find(t => t.religion === "新教");
          if (target) { target.religion = "天主教"; target.unrest += 3; }
          adjustEstateForCountry(country, "church", { satisfaction: 4 }, "重申正信");
        }
      }
      aiMobilize(world, polity, country);
      aiConsiderWar(world, polity, country);
    }

    function aiMobilize(world, polity, country) {
      const wars = militaryWarsFor(polity, world);
      if (!wars.length && !country.revolt) return;
      const own = Object.values(world.warfare.armies).filter(army => army.owner === polity);
      const driveWar = world.diplomacy.wars.some(war => war.attackers.includes(polity) && STRATEGIC_DRIVES[polity] && war.name === STRATEGIC_DRIVES[polity].warName);
      if (own.length >= (driveWar ? 5 : 3) || country.military < (driveWar ? 10 : 20)) return;
      const tile = controlledTiles(polity, world)
        .filter(t => t.pop.peasants >= 2 && !(t.occupation >= 100 && t.occupier !== polity))
        .sort((a, b) => sumPop(b) - sumPop(a))[0];
      if (!tile) return;
      if (!spendAiPoint(country, "military")) return;
      country.military -= 10;
      try { mobilizeArmy(world, polity, tile.id, "infantry"); } catch (error) {}
    }

    function aiConsiderWar(world, polity, country) {
      if (aiStrategicWar(world, polity, country)) return;
      if (world.turn < 8) return;
      if (world.diplomacy.wars.length >= (currentEra(world).key === "faith" ? 5 : 3)) return;
      if (militaryWarsFor(polity, world).length || country.revolt) return;
      if (polityHash(polity) % 4 !== world.turn % 4) return;
      if (country.legitimacy < 45 || country.food < 60) return;
      const myStrength = countryStrength(polity, world);
      let target = null;
      for (const other of playableCountries(world)) {
        if (other === polity) continue;
        const otherCountry = world.countries[other];
        if (!otherCountry || otherCountry.eliminated) continue;
        if (!countriesShareBorder(polity, other, world)) continue;
        if (areAtWar(polity, other, world)) continue;
        if (world.diplomacy.truces.some(truce => truce.parties.includes(polity) && truce.parties.includes(other) && world.turn < truce.endsTurn)) continue;
        if (treatyBetween(polity, other, "nonaggression", world) || treatyBetween(polity, other, "alliance", world)) continue;
        const crossFaith = currentEra(world).key === "faith"
          && ["天主教", "新教"].includes(majorityReligion(polity, world))
          && ["天主教", "新教"].includes(majorityReligion(other, world))
          && majorityReligion(polity, world) !== majorityReligion(other, world);
        const attitude = diplomaticAttitude(polity, other, world);
        if (!crossFaith && attitude !== "hostile" && attitude !== "rival") continue;
        if (countryStrength(other, world) * (crossFaith ? 1.4 : 1.7) > myStrength) continue;
        target = other;
        break;
      }
      if (!target) return;
      const targetCapital = capital(target, world);
      const borderTile = controlledTiles(target, world).find(tile =>
        tile.city !== "君士坦丁堡"
        && worldNeighbors(world, tile.id).some(id => world.tiles[id].controller === polity)) || targetCapital;
      if (!borderTile || borderTile.city === "君士坦丁堡") return;
      world.diplomacy.wars.push({
        id: `war-${world.diplomacy.nextId++}`,
        name: `${polity}-${target}边境战争`,
        attackers: [polity],
        defenders: [target],
        warLeaderAttack: polity,
        warLeaderDefense: target,
        primaryGoal: { tileId: borderTile.id, label: `夺取${borderTile.name}`, claimant: polity },
        secondaryDemands: [],
        startedTurn: world.turn,
        truceUntilTurn: null,
        score: 0,
        participants: {
          [polity]: { side: "attacker", contribution: 0, warWill: 85 },
          [target]: { side: "defender", contribution: 0, warWill: 85 }
        }
      });
      const view = relationView(target, polity, world);
      view.threat = clamp(view.threat + 25);
      const isReligious = currentEra(world).key === "faith"
        && majorityReligion(polity, world) !== majorityReligion(target, world);
      if (isReligious) world.faithWarCount = (world.faithWarCount || 0) + 1;
      pushWorldEvent(world, `${polity}对${target}宣战${isReligious ? "（信仰之战）" : `（${borderTile.name}方向）`}`, "war");
      addCountryLog(polity, `对${target}宣战。`, world);
      addCountryLog(target, `${polity}对我国宣战！`, world);
      pushChronicle(world.countries[target], "battle", `${calendarLabel(world.turn)}：${polity}入侵`);
      if (target === world.playerPolity) toast(`${polity}对我国宣战！`);
    }

    function aiConsiderPeace(world) {
      for (const war of [...world.diplomacy.wars]) {
        if (!war.participants || !war.primaryGoal) continue;
        if (war.attackers.includes(world.playerPolity) || war.defenders.includes(world.playerPolity)) continue;
        const age = world.turn - war.startedTurn;
        if (age < 8) continue;
        const attacker = war.warLeaderAttack;
        const defender = war.warLeaderDefense;
        const attackWill = war.participants[attacker]?.warWill ?? 50;
        const defenseWill = war.participants[defender]?.warWill ?? 50;
        if (war.name === "海峡之战" && age < 40 && attackWill > 20) continue;
        if (attackWill >= 40 && defenseWill >= 40 && age <= 20) continue;
        try {
          const wantsTerritory = war.score >= 40;
          const actor = wantsTerritory ? attacker : (attackWill <= defenseWill ? attacker : defender);
          const terms = wantsTerritory && actor === attacker ? [{ type: "target_territory" }] : [{ type: "status_quo" }];
          if (canConcludePeace(world, war, actor, terms)) {
            concludePeace(world, war.id, actor, terms);
            if (terms[0].type === "target_territory") {
              world.countries[attacker].stats.warsWon += 1;
              pushWorldEvent(world, `${war.name}结束：${attacker}夺取战争目标`, "war");
            } else {
              pushWorldEvent(world, `${war.name}结束：双方维持现状`, "war");
            }
          }
        } catch (error) {}
      }
    }

    function processPopGrowth(world) {
      if (calendarForTurn(world.turn).quarter !== 2) return;
      for (const polity of playableCountries(world)) {
        const country = world.countries[polity];
        if (!country || country.eliminated || country.food < 100) continue;
        const tiles = controlledTiles(polity, world)
          .filter(t => t.control >= 50 && sumPop(t) < 14)
          .sort((a, b) => b.control - a.control)
          .slice(0, 2);
        for (const tile of tiles) tile.pop.peasants += 1;
        if (tiles.length && polity === world.playerPolity) {
          country.report?.events.push(`人口增长：${tiles.map(t => t.name).join("、")}`);
        }
      }
    }

    const SITUATION_DEFS = {
      black_death: {
        label: "黑死病",
        omen: "热那亚商人带来东方大疫的传闻，港口城市人心惶惶。",
        arrival: "黑死病登陆地中海港口，开始沿商路向北蔓延。",
        ended: "大疫退去，幸存者开始重建家园。",
        occurrences: [{ omen: [1345, 2], start: [1347, 2], end: [1353, 4] }]
      },
      little_ice_age: {
        label: "小冰期",
        omen: "连续的冷夏让北方农人忧心歉收。",
        arrival: "寒潮席卷北方，寒冷地区粮食产出下降。",
        ended: "气候转暖，北方田地恢复生机。",
        occurrences: [
          { omen: [1339, 3], start: [1340, 1], end: [1341, 4] },
          { omen: [1351, 3], start: [1352, 1], end: [1353, 4] },
          { omen: [1363, 3], start: [1364, 1], end: [1365, 4] }
        ]
      },
      peace_congress: {
        label: "诸国和会",
        omen: "",
        arrival: "列国代表齐聚和会。",
        ended: "教随国定、条约神圣、常驻使节——主权时代的三条新规生效。",
        occurrences: []
      },
      reformation: {
        label: "宗教改革",
        omen: "对教廷的不满正在印刷机上排版。",
        arrival: "新教义点燃了旧世界，改宗的火种沿商路蔓延。",
        ended: "信仰版图尘埃落定。",
        occurrences: []
      },
      constantinople: {
        label: "君堡易主",
        omen: "海峡的风声越来越紧。",
        arrival: "东方商路的钥匙换了主人，流量正在寻找新的出口。",
        ended: "世界逐渐习惯了新的贸易秩序。",
        occurrences: []
      },
      trade_boom: {
        label: "商贸繁荣",
        omen: "意大利银行家在各大市场扩张信贷。",
        arrival: "地中海与北海商路空前活跃，市场城市获利丰厚。",
        ended: "商路热潮回落，市场恢复平常。",
        occurrences: [
          { omen: [1342, 3], start: [1343, 1], end: [1343, 4] },
          { omen: [1350, 3], start: [1351, 1], end: [1351, 4] },
          { omen: [1358, 3], start: [1359, 1], end: [1359, 4] }
        ]
      }
    };

    function activeSituations(world = state) {
      return world.situations.filter(sit => sit.phase === "active");
    }

    function situationRecord(world, key, index) {
      return world.situations.find(sit => sit.key === key && sit.index === index);
    }

    function processSituations(world) {
      for (const [key, def] of Object.entries(SITUATION_DEFS)) {
        def.occurrences.forEach((occ, index) => {
          const omenTurn = turnForDate(occ.omen[0], occ.omen[1]);
          const startTurn = turnForDate(occ.start[0], occ.start[1]);
          const endTurn_ = turnForDate(occ.end[0], occ.end[1]);
          let record = situationRecord(world, key, index);
          if (!record && world.turn >= omenTurn && world.turn < startTurn) {
            record = { key, index, phase: "omen", label: def.label, sinceTurn: world.turn, data: {} };
            world.situations.push(record);
            pushWorldEvent(world, `传闻：${def.omen}`, "situation");
            addCountryLog(world.playerPolity, `传闻：${def.omen}`, world);
          }
          if (world.turn >= startTurn && world.turn <= endTurn_ && (!record || record.phase === "omen")) {
            if (!record) {
              record = { key, index, phase: "active", label: def.label, sinceTurn: world.turn, data: {} };
              world.situations.push(record);
            } else {
              record.phase = "active";
              record.sinceTurn = world.turn;
            }
            pushWorldEvent(world, def.arrival, "situation");
            addCountryLog(world.playerPolity, def.arrival, world);
          }
          if (record && record.phase === "active" && world.turn > endTurn_) {
            record.phase = "done";
            endSituation(world, key, record);
            pushWorldEvent(world, def.ended, "situation");
          }
          if (record && record.phase === "active") stepSituation(world, key, record);
        });
      }
      processConditionalSituations(world);
      world.situations = world.situations.filter(sit => sit.phase !== "done" || world.turn - sit.sinceTurn < 8);
    }

    function stepSituation(world, key, record) {
      if (key === "black_death") {
        record.data.wave = (record.data.wave || 0) + 1;
        const latBound = 36 + record.data.wave * 2.2;
        const hitByCountry = {};
        for (const tile of world.tiles) {
          if (tile.isSea || tile.plagueHitTurn || tile.lat > latBound || sumPop(tile) < 6) continue;
          const country = world.countries[tile.controller];
          if (country && hasModifier(country, "quarantine") && (tile.id % 2 === 0)) continue;
          tile.plagueHitTurn = world.turn;
          tile.pop.peasants = Math.max(1, tile.pop.peasants - 2);
          if (tile.pop.burghers >= 2) tile.pop.burghers -= 1;
          tile.devastation = clamp((tile.devastation || 0) + 6);
          if (tile.controller) hitByCountry[tile.controller] = (hitByCountry[tile.controller] || 0) + 1;
        }
        for (const [polity, count] of Object.entries(hitByCountry)) {
          const country = world.countries[polity];
          if (!country) continue;
          country.report?.events.push(`黑死病侵袭 ${count} 个地区，人口折损`);
          if (!country.plagueTouched) {
            country.plagueTouched = true;
            country.plagueTouchedTurn = world.turn;
            adjustEstateForCountry(country, "church", { satisfaction:10, power:3 }, "大疫之下信众转向教会");
            if (polity === world.playerPolity) pushChronicle(country, "situation", `${calendarLabel(world.turn)}：黑死病侵入国境`);
          }
        }
      }
      if (key === "little_ice_age") {
        for (const tile of world.tiles) {
          if (!tile.isSea && (tile.climate === "cold" || tile.climate === "alpine")) tile.tempPenalty = 1;
        }
      }
      if (key === "trade_boom") {
        if (world.trade) world.trade.poolBonus = { orient: 65, north: 30, west: 28, south: 18 };
        if (!record.data.announced) {
          record.data.announced = true;
          for (const polity of playableCountries(world)) {
            const country = world.countries[polity];
            if (!country || country.eliminated) continue;
            if ((world.trade?.income?.[polity] || 0) > 0) {
              adjustEstateForCountry(country, "merchants", { satisfaction:6, power:2 }, "商贸繁荣");
            }
          }
        }
      }
    }

    function endSituation(world, key, record) {
      if (key === "little_ice_age") {
        for (const tile of world.tiles) tile.tempPenalty = 0;
      }
      if (key === "trade_boom" && world.trade) {
        world.trade.poolBonus = {};
      }
    }

    function renderSituationsPanel() {
      const el = document.getElementById("eventsList");
      if (!el) return;
      const sits = state.situations.slice().reverse();
      const sitHtml = sits.length ? sits.map(sit => {
        const def = SITUATION_DEFS[sit.key];
        const phase = sit.phase === "omen" ? "预兆" : sit.phase === "active" ? "肆虐中" : "已平息";
        const text = sit.phase === "omen" ? def.omen : sit.phase === "active" ? def.arrival : def.ended;
        return `<div class="event-item"><b>${def.label} · ${phase}</b><br>${text}</div>`;
      }).join("") : '<div class="event-item"><b>时代平稳</b><br>暂无正在发生的重大情势。</div>';
      const worldHtml = state.worldEvents.slice(0, 10).map(event =>
        `<div class="event-item"><b>${calendarLabel(event.turn)}</b><br>${event.text}${event.chain ? `<details style="margin-top:4px"><summary style="cursor:pointer;font-size:12px;opacity:.75">为什么？</summary>${event.chain.map(step => `<div class="gl-epic-line">${step}</div>`).join("")}</details>` : ""}</div>`
      ).join("");
      el.innerHTML = `<h3 style="margin:4px 0">情势</h3>${sitHtml}<h3 style="margin:10px 0 4px">列国纪闻</h3>${worldHtml || '<div class="event-item">列国无事。</div>'}`;
    }

    function endTurn() {
      if (state.gameOver) return;
      if (state.pendingElection) {
        renderLeaderElection();
        return toast("必须先选出新的国家领导人。");
      }
      if (state.playerEvents.length) {
        renderPlayerEvents();
        return toast("必须先裁断紧急事件。");
      }
      for (const polity of playableCountries()) beginCountryReport(state.countries[polity]);
      runGovernor(state);
      planAiWarOrders(state);
      planRevoltOrders(state);
      const movement = executeMovementPhase(state);
      state.warfare.pendingEncounters = movement.encounters;
      for (const move of movement.moved) {
        const army = state.warfare.armies[move.armyId];
        addCountryLog(army.owner, `${army.name}行军至${state.tiles[move.to].name}。`, state);
      }
      for (const encounter of movement.encounters) {
        const battle = resolveEncounter(state, encounter);
        const summary = `${state.tiles[battle.tileId].name}战斗：${battle.winner === "attackers" ? "进攻方" : "防守方"}获胜`;
        const winners = battle.winner === "attackers" ? battle.attackerOwners : battle.defenderOwners;
        for (const owner of [...battle.attackerOwners, ...battle.defenderOwners]) {
          addCountryLog(owner, `${summary}。`, state);
          const involved = state.countries[owner];
          if (!involved) continue;
          involved.report?.events.push(summary);
          if (winners.includes(owner)) involved.stats.battlesWon += 1;
          if (owner === state.playerPolity) pushChronicle(involved, "battle", `${calendarLabel(state.turn)}：${summary}`);
        }
        pushWorldEvent(state, summary, "battle");
      }
      for (const army of Object.values(state.warfare.armies)) applyOccupation(state, army);
      processOccupations(state);
      processWarState(state);
      aiConsiderPeace(state);
      runAiGovernance(state);
      processTrade(state);
      for (const polity of playableCountries()) settleCountry(polity);
      processPopGrowth(state);
      processDiplomacy(state);
      processSituations(state);
      processReformation(state);
      processEnlightenment(state);
      checkEras(state);
      processAdvancesAi(state);
      processExploration(state);
      processEstateLadder(state);
      processRevolts(state);
      checkObjectives(state);
      for (const polity of [...playableCountries()]) checkCountryCollapse(state, polity);
      normalizeCountry(state.playerPolity);
      if (checkEnd()) return render();
      state.turn += 1;
      for (const polity of playableCountries()) {
        grantQuarterlyActionPoints(state.countries[polity]);
        processLeadership(state, polity);
      }
      snapshotTrends(state);
      state.pendingCouncil = true;
      state.selectedUnit = null;
      const nextCalendar = calendarForTurn(state.turn);
      log(`进入 ${nextCalendar.year} 年${seasonName(nextCalendar.quarter)}。`);
      if (activeCountry().report && activeCountry().report.food > 0) markTutorialFlag("surplus");
      advanceTutorial();
      if (state.regency) return;
      render();
      if (state.pendingTransition) {
        const transition = state.pendingTransition;
        state.pendingTransition = null;
        showTransition(transition.title, transition.sub, transition.chain);
      } else if (state.playerEvents.length) renderPlayerEvents();
      else if (state.pendingCouncil && !state.gameOver) openCouncil();
    }

    function settleCountry(polity) {
      const country = state.countries[polity];
      if (!country || country.eliminated) return;
      if (!country.report) beginCountryReport(country);
      const distanceMap = buildProximityMap(polity);
      const territory = controlledTiles(polity);
      let food = 0, money = 0, military = 0;
      let unrestHits = 0, heterodox = 0;
      const primaryReligion = dominantValue(territory, t => t.religion);
      for (const t of territory) {
        const o = output(t, polity, distanceMap);
        food += o.food; money += o.money; military += o.military;
        if (t.religion !== primaryReligion) heterodox += 1;
        if (t.control < 45) {
          t.unrest += 1;
          if (t.unrest >= 4) unrestHits += 1;
        } else if (t.unrest > 0 && state.turn % 2 === 0) {
          t.unrest -= 1;
        }
      }
      const penalty = estateKindPenalty(country);
      food = Math.round(food * penalty.factor.food);
      money = Math.round(money * penalty.factor.money);
      military = Math.round(military * penalty.factor.military);
      for (const cause of penalty.causes) country.report.events.push(cause);
      const priceIndex = country.priceIndex || 1;
      if (priceIndex > 1.02) {
        const erosion = Math.round(money * (1 - 1 / priceIndex));
        if (erosion >= 1) {
          money -= erosion;
          country.report.moneyParts.push({ label: "物价侵蚀", amount: -erosion });
        }
      }
      const armyUpkeep = Math.ceil(Object.values(state.warfare.armies)
        .filter(army => army.owner === polity)
        .reduce((total, army) => total + armyTotalSoldiers(army), 0) / 40);
      country.report.foodParts.push({ label: "地块产出", amount: food });
      if (armyUpkeep) country.report.foodParts.push({ label: "军队维护", amount: -armyUpkeep });
      country.report.moneyParts.push({ label: "地块产出", amount: money });
      country.report.militaryParts.push({ label: "地块产出", amount: military });
      country.food += food - armyUpkeep;
      country.money += money;
      country.military += military;
      const tradeDetail = state.trade?.detail?.[polity] || [];
      let silverIncome = 0;
      for (const part of tradeDetail) {
        country.money += part.amount;
        if (part.silver) silverIncome += part.amount;
        country.report.moneyParts.push({ label: `商路·${part.route}（${part.city}）`, amount: part.amount });
      }
      if (silverIncome > 0) {
        country.priceIndex = Math.min(2, (country.priceIndex || 1) + silverIncome / 600);
      } else {
        country.priceIndex = Math.max(1, (country.priceIndex || 1) - .01);
      }
      const tradeTotal = tradeDetail.reduce((sum, part) => sum + part.amount, 0);
      if (tradeTotal > 0) {
        country.capital = (country.capital || 0) + Math.round(tradeTotal * .15);
      }
      const orientCostNow = state.trade?.orientCostIndex || 1;
      if (orientCostNow >= 1.35 && state.turn % 4 === 2 && !hasOrientNode(polity)) {
        adjustEstateForCountry(country, "nobles", { satisfaction: -1 }, "东方奢侈品腾贵");
        country.report.events.push(`东方商路成本 ×${orientCostNow.toFixed(2)}：香料与丝绸的价格刺痛了宫廷`);
      }
      if (country.fiscalState === "absolutist") {
        const bonus = Math.round(money * .15);
        if (bonus) { country.money += bonus; country.report.moneyParts.push({ label: "王室专卖", amount: bonus }); }
      }
      if (country.technology.accounting) {
        const bonus = Math.round(money * .1);
        if (bonus) { country.money += bonus; country.report.moneyParts.push({ label: "复式记账", amount: bonus }); }
      }
      if (country.technology.triangleTrade && tradeTotal > 0) {
        const bonus = Math.round(tradeTotal * .25);
        country.money += bonus;
        country.report.moneyParts.push({ label: "三角贸易", amount: bonus });
        country.capital = (country.capital || 0) + Math.round(bonus * .2);
      }
      if (country.technology.railways) {
        const bonus = Math.round(military * .15);
        if (bonus) { country.military += bonus; country.report.militaryParts.push({ label: "铁路动员", amount: bonus }); }
      }
      applyQuarterModifiers(country);
      const mercBefore = country.money;
      processMercenaryContracts(state, polity);
      if (country.money !== mercBefore) {
        country.report.moneyParts.push({ label: "佣兵军饷", amount: country.money - mercBefore });
      }
      if (unrestHits) changeLegitimacy(country, -Math.min(3, Math.ceil(unrestHits / 3)), "低控制地区动乱");
      if (heterodox >= 5) changeLegitimacy(country, -(state.flags.peaceOfFaith ? 1 : Math.min(2, Math.floor(heterodox / 5))), "异教治理压力");
      if (penalty.legitimacyDrain) changeLegitimacy(country, -penalty.legitimacyDrain, "教会不满");
      if (country.technology.printing && eraAtLeast("discovery") && !state.flags.peaceOfFaith
        && state.turn % 4 === 0 && majorityReligion(polity) === "天主教") {
        adjustEstateForCountry(country, "church", { satisfaction: -1 }, "印刷小册子动摇教会权威");
      }
      if (country.technology.printing) {
        country.money += 4;
        country.report.moneyParts.push({ label: "印刷与文书", amount: 4 });
      }
      if (country.technology.standingArmy) {
        const bonus = Math.round(military * .2);
        if (bonus) { country.military += bonus; country.report.militaryParts.push({ label: "常备军体系", amount: bonus }); }
      }
      if (country.technology.steamEngine) {
        const moneyBonus = Math.round(money * .3);
        const militaryBonus = Math.round(military * .3);
        if (moneyBonus) { country.money += moneyBonus; country.report.moneyParts.push({ label: "工业产能", amount: moneyBonus }); }
        if (militaryBonus) { country.military += militaryBonus; country.report.militaryParts.push({ label: "工业产能", amount: militaryBonus }); }
      }
      if (country.legitimacy < 50 && publicMorale(country) >= 55 && country.food >= 0) {
        changeLegitimacy(country, 1, "民心安定");
      }
      country.stats.peakTiles = Math.max(country.stats.peakTiles, territory.length);
      refreshPolitics(polity);
      normalizeCountry(polity);
      country.report.food = country.report.foodParts.reduce((sum, part) => sum + part.amount, 0);
      country.report.money = country.report.moneyParts.reduce((sum, part) => sum + part.amount, 0);
      country.report.military = country.report.militaryParts.reduce((sum, part) => sum + part.amount, 0);
      country.pressures = computePressures(state, polity);
      country.log.unshift(`${calendarLabel(state.turn)} · 季度结算：粮 ${formatSigned(country.report.food)}，钱 ${formatSigned(country.report.money)}，军需 ${formatSigned(country.report.military)}。`);
      country.log = country.log.slice(0, 14);
    }

    function normalizeCountry(polity) {
      const country = state.countries[polity];
      if (country.food < 0) {
        const hit = Math.min(6, Math.ceil(-country.food / 40));
        changeLegitimacy(country, -hit, "粮食赤字");
        adjustEstateForCountry(country, "peasants", { satisfaction:-6 }, "饥馑蔓延");
        country.food = Math.max(country.food, -120);
      }
      const farms = controlledTiles(polity).filter(t => t.buildings.includes("farm")).length;
      const granaryCap = 300 + farms * 30;
      if (country.food > granaryCap) {
        if (country.name === state.playerPolity && country.report) {
          country.report.events.push(`粮仓已满（上限 ${granaryCap}），余粮折损`);
        }
        country.food = granaryCap;
      }
      country.legitimacy = clamp(country.legitimacy, 0, 100);
      country.government.centralPower = clamp(country.government.centralPower, 0, 100);
      country.government.legitimacy = clamp(country.government.legitimacy, 0, 100);
      for (const k in country.estates) {
        country.estates[k].power = clamp(country.estates[k].power, 0, 100);
        country.estates[k].satisfaction = clamp(country.estates[k].satisfaction, -100, 100);
      }
    }

    function checkEnd() {
      const country = activeCountry();
      if (country.eliminated) {
        return showEnd("帝国落幕", `${state.endingCause || "王统断绝"}。`);
      }
      return false;
    }

    function showEnd(title, text) {
      state.gameOver = true;
      pushWorldEvent(state, `${state.playerPolity}：${text}`, "end");
      openEpic(title);
      return true;
    }

    function start() {
      state = newState();
      for (const polity of playableCountries()) refreshPolitics(polity);
      document.getElementById("modalWrap").classList.remove("show");
      document.getElementById("leaderElectionWrap").classList.remove("show");
      for (const id of ["councilWrap", "previewWrap", "redEventWrap", "epicWrap", "regentWrap", "transitionWrap"]) {
        document.getElementById(id).classList.remove("show");
      }
      closeCountryDetails();
      document.getElementById("tileDrawer").classList.remove("open");
      render();
      openCountrySelector(true);
    }

    document.getElementById("endTurnBtn").onclick = openPreview;
    document.getElementById("previewBack").onclick = () => document.getElementById("previewWrap").classList.remove("show");
    document.getElementById("previewConfirm").onclick = () => { document.getElementById("previewWrap").classList.remove("show"); endTurn(); };
    document.getElementById("councilBtn").onclick = openCouncil;
    document.getElementById("councilConfirm").onclick = closeCouncil;
    document.getElementById("legacyBtn").onclick = () => openEpic("国家史诗");
    document.getElementById("epicAgain").onclick = () => { document.getElementById("epicWrap").classList.remove("show"); start(); };
    document.getElementById("epicClose").onclick = () => document.getElementById("epicWrap").classList.remove("show");
    document.getElementById("regencyBtn").onclick = startRegencyUI;
    document.getElementById("regentClose").onclick = () => { document.getElementById("regentWrap").classList.remove("show"); if (state.pendingCouncil && !state.gameOver) openCouncil(); };
    document.getElementById("transitionClose").onclick = () => {
      document.getElementById("transitionWrap").classList.remove("show");
      if (state.playerEvents.length) renderPlayerEvents();
      else if (state.pendingCouncil && !state.gameOver) openCouncil();
    };

    start();
  </script>
</body>
</html>
