<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>帝国的代价｜高保真界面原型</title>
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/layout.css">
  <link rel="stylesheet" href="styles/components.css">
</head>
<body>
  <main class="game-shell" id="game">
    <section class="map-stage" aria-label="欧洲与北非地图">
      <svg class="map-svg" id="mapSvg" viewBox="0 0 1050 720" preserveAspectRatio="xMidYMid slice" aria-label="真实轮廓六边形地图"></svg>
      <div class="map-wash"></div>
    </section>

    <button class="ruler-plaque" id="rulerPlaque" aria-label="查看法兰西王国">
      <img class="ruler-portrait" id="rulerPortrait" src="../../assets/ui/ruler-philip-vi.png" alt="腓力六世">
      <span class="ruler-level">三</span>
    </button>

    <header class="top-command-bar">
      <div class="brand-block">
        <div class="shield" id="countryShield" aria-label="法兰西王国盾徽"><span>⚜</span><span>⚜</span><span>⚜</span><span>⚜</span></div>
        <div class="game-title">帝国的代价</div>
      </div>
      <div class="chronicle">
        <div class="date-plaque">
          <div class="date-main" id="dateMain">1337年 · 春</div>
          <div class="date-era" id="dateEra">封建纪元 · 瓦卢瓦王朝</div>
        </div>
        <button class="top-pending" id="topPending">待办 3 ›</button>
      </div>
      <div class="resource-strip" aria-label="国家资源">
        <div class="resource-token" data-resource="food"><span class="resource-icon">⌂</span><span class="resource-total">120</span><span class="resource-trend">粮食</span></div>
        <div class="resource-token" data-resource="administrative"><span class="resource-icon">✦</span><span class="resource-total">4</span><span class="resource-trend">行政点</span></div>
        <div class="resource-token" data-resource="diplomatic"><span class="resource-icon">◇</span><span class="resource-total">3</span><span class="resource-trend">外交点</span></div>
        <div class="resource-token" data-resource="militaryPoint"><span class="resource-icon">⚔</span><span class="resource-total">3</span><span class="resource-trend">军事点</span></div>
        <div class="resource-token" data-resource="money"><span class="resource-icon">●</span><span class="resource-total">812</span><span class="resource-trend">金钱</span></div>
        <div class="resource-token" data-resource="military"><span class="resource-icon">▣</span><span class="resource-total">240</span><span class="resource-trend">军需</span></div>
        <div class="resource-token" data-resource="legitimacy"><span class="resource-icon">♛</span><span class="resource-total">78</span><span class="resource-trend">合法性</span></div>
      </div>
    </header>

    <nav class="system-rail" aria-label="主要系统">
      <button class="system-button" data-system="国家"><span class="system-glyph">♜</span><span class="system-label">国家</span></button>
      <button class="system-button" data-system="经济"><span class="system-glyph">●</span><span class="system-label">经济</span></button>
      <button class="system-button" data-system="外交"><span class="system-glyph">◇</span><span class="system-label">外交</span></button>
      <button class="system-button" data-system="军事"><span class="system-glyph">⚔</span><span class="system-label">军事</span></button>
      <button class="system-button" data-system="发展"><span class="system-glyph">▥</span><span class="system-label">发展</span></button>
    </nav>

    <aside class="system-drawer metal-frame rivet" id="systemDrawer" aria-hidden="true">
      <div class="drawer-title"><span id="drawerTitle">国家</span><button class="drawer-close" id="drawerClose" aria-label="关闭">×</button></div>
      <div id="drawerBody"></div>
    </aside>

    <aside class="issue-panel metal-frame" id="issuePanel">
      <div class="issue-heading">问题与对象</div>
      <div id="issueList"></div>
    </aside>
    <aside class="army-drawer metal-frame" id="armyDrawer" aria-hidden="true">
      <div class="drawer-title"><span id="armyDrawerTitle">军团</span><button class="drawer-close" id="armyDrawerClose" aria-label="关闭">×</button></div>
      <div id="armyDrawerBody"></div>
    </aside>

    <aside class="province-panel metal-frame" id="provincePanel" aria-hidden="false">
      <div class="province-banner" id="provinceBanner">
        <button class="province-close" id="provinceClose" type="button" aria-label="关闭地块详情" title="关闭地块详情">×</button>
        <div class="province-name" id="provinceName">巴黎</div>
        <div class="province-region" id="provinceRegion">法兰西王国 · 巴黎盆地</div>
      </div>
      <div class="province-data">
        <div class="data-row"><span>气候</span><b id="provinceClimate">温带</b><i></i></div>
        <div class="data-row"><span>人口</span><b id="provincePopulation">50.4万</b><i></i></div>
        <div class="data-row"><span>产出</span><b id="provinceOutput">谷物</b><i></i></div>
        <div class="data-row"><span>控制度</span><b id="provinceControl">85%</b><i></i></div>
        <div class="data-row"><span>发展度</span><b id="provinceDevelopment">64</b><i></i></div>
        <div class="data-row"><span>文化</span><b id="provinceCulture">法兰西</b><i></i></div>
        <div class="data-row"><span>宗教</span><b id="provinceReligion">天主教</b><i></i></div>
      </div>
      <div class="province-actions">
        <button class="province-action" data-open-system="经济" data-focus-sel="[data-building]"><span>⚒</span>建设</button>
        <button class="province-action" data-open-system="军事" data-focus-sel="[data-mobilize='infantry']"><span>♞</span>征兵</button>
        <button class="province-action" data-open-system="国家" data-focus-sel="[data-integrate]"><span>✜</span>整合</button>
        <button class="province-action" data-open-system="军事" data-focus-sel="[data-army-open]"><span>⚑</span>派驻</button>
      </div>
    </aside>

    <div class="command-dock metal-frame" aria-label="高频命令">
      <button class="command" data-open-system="外交" data-focus-sel="[data-diplomatic-action='war:declare']"><span>⚔</span>宣战</button>
      <button class="command" data-open-system="军事" data-focus-sel="[data-peace-war]"><span>✦</span>议和</button>
      <button class="command" data-open-system="外交" data-focus-sel="[data-diplomatic-action='treaty:trade']"><span>⚖</span>贸易</button>
      <button class="command" data-open-system="外交" data-focus-sel="[data-diplomatic-action='treaty:alliance']"><span>◇</span>结盟</button>
      <button class="command" data-open-system="外交" data-focus-sel="[data-diplomatic-action='treaty:marriage']"><span>♛</span>联姻</button>
      <button class="command" data-open-system="外交" data-focus-sel="[data-diplomatic-action='treaty:access']"><span>▤</span>通行权</button>
    </div>

    <aside class="map-tools metal-frame">
      <div class="lens-row">
        <button class="lens active" data-mode="political"><span>⚜</span>政治</button>
        <button class="lens" data-mode="terrain"><span>▲</span>地形</button>
        <button class="lens" data-mode="population"><span>人</span>人口</button>
        <button class="lens" data-mode="goods"><span>●</span>产出</button>
        <button class="lens" data-mode="trade"><span>⇄</span>贸易</button>
        <button class="lens" data-mode="religion"><span>✝</span>宗教</button>
        <button class="lens" data-mode="dynasty"><span>♛</span>家族</button>
        <button class="lens" data-mode="government"><span>◆</span>政体</button>
        <button class="lens" data-mode="estates"><span>♟</span>阶层</button>
        <button class="lens" data-mode="military"><span>⚔</span>军事</button>
      </div>
      <div class="mini-map"><svg class="mini-map-svg" id="miniMapSvg" viewBox="0 0 1050 720" aria-label="地图缩略图"></svg></div>
      <div class="map-tool-footer">
        <button id="legendToggle" title="展开图例">图</button>
        <button id="zoomReset" title="复位地图">◎</button>
        <span class="zoom-readout" id="zoomReadout">100%</span>
        <button id="zoomOut" title="缩小">−</button>
        <button id="zoomIn" title="放大">+</button>
      </div>
      <div class="map-legend" id="mapLegend"></div>
    </aside>

    <button class="season-control" id="seasonControl">
      <span class="season-seal"><span>✧</span></span>
      <span class="season-text" id="seasonText">处理待办 3</span>
      <span class="season-end">◇</span>
    </button>

    <div class="toast metal-frame" id="toast" role="status"></div>
  </main>

  <div class="modal-layer" id="countryModal" aria-hidden="true">
    <section class="state-dialog metal-frame" role="dialog" aria-modal="true" aria-labelledby="countryModalTitle">
      <button class="dialog-close" data-close-dialog="countryModal" aria-label="关闭">×</button>
      <header class="state-dialog-head">
        <div class="dialog-emblem" id="countryModalEmblem">⚜</div>
        <div><h2 id="countryModalTitle">法兰西王国</h2><p id="countryModalSubtitle"></p></div>
      </header>
      <div class="state-dialog-body" id="countryModalBody"></div>
      <footer class="state-dialog-actions"><button class="dialog-command" id="openCountrySelect">切换国家</button></footer>
    </section>
  </div>

  <div class="modal-layer" id="countrySelectModal" aria-hidden="true">
    <section class="country-select-dialog metal-frame" role="dialog" aria-modal="true" aria-labelledby="countrySelectTitle">
      <button class="dialog-close" data-close-dialog="countrySelectModal" aria-label="关闭">×</button>
      <header><h2 id="countrySelectTitle">选择扮演国家</h2></header>
      <input class="country-search" id="countrySearch" type="search" placeholder="搜索国家或政体">
      <div class="country-choice-strip" id="countryChoiceStrip"></div>
      <div class="country-choice-preview" id="countryChoicePreview"></div>
      <footer class="state-dialog-actions"><button class="dialog-command primary" id="confirmCountryChoice">确认国家</button></footer>
    </section>
  </div>

  <div class="modal-layer" id="leaderElectionModal" aria-hidden="true">
    <section class="state-dialog metal-frame" role="dialog" aria-modal="true" aria-labelledby="leaderElectionTitle">
      <header><h2 id="leaderElectionTitle">选举国家领导人</h2><p id="leaderElectionReason"></p></header>
      <div class="leader-candidate-list" id="leaderCandidateList"></div>
    </section>
  </div>
  <div class="modal-layer" id="councilModal" aria-hidden="true">
    <section class="state-dialog metal-frame" role="dialog" aria-modal="true" aria-labelledby="councilTitle">
      <button class="dialog-close" data-close-dialog="councilModal" aria-label="关闭">×</button>
      <header><h2 id="councilTitle">御前会议</h2><p id="councilSubtitle"></p></header>
      <div class="state-dialog-body" id="councilBody"></div>
    </section>
  </div>
  <div class="modal-layer" id="historyEventModal" aria-hidden="true">
    <section class="state-dialog metal-frame" role="dialog" aria-modal="true" aria-labelledby="historyEventTitle">
      <header><h2 id="historyEventTitle"></h2></header>
      <div class="state-dialog-body" id="historyEventBody"></div>
    </section>
  </div>

  <div class="orientation"><div><strong>请横屏体验</strong><br><small>地图与界面以横屏操作为准。</small></div></div>

  <script src="scripts/data/geography.js?v=4"></script>
  <script src="scripts/data/countries.js?v=4"></script>
  <script src="scripts/data/codex.js?v=1"></script>
  <script src="scripts/data/rules.js?v=4"></script>
  <script src="scripts/data/trade.js?v=1"></script>
  <script src="scripts/engine/world.js?v=5"></script>
  <script src="scripts/engine/turn.js?v=5"></script>
  <script src="scripts/engine/politics.js?v=8"></script>
  <script src="scripts/engine/economy.js?v=10"></script>
  <script src="scripts/engine/diplomacy.js?v=5"></script>
  <script src="scripts/engine/warfare.js?v=9"></script>
  <script src="scripts/engine/trade.js?v=3"></script>
  <script src="scripts/engine/history.js?v=7"></script>
  <script src="scripts/engine/strategy.js?v=1"></script>
  <script src="scripts/ui/store.js?v=4"></script>
  <script src="scripts/ui/map.js?v=6"></script>
  <script src="scripts/ui/drawers.js?v=12"></script>
  <script src="scripts/ui/codex.js?v=1"></script>
  <script src="scripts/ui/dialogs.js?v=8"></script>
  <script src="scripts/main.js?v=9"></script>
</body>
</html>
